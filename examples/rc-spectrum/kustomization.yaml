#
# v0.1.9 RC1 spectrum scenario bundle. Apply with:
#
#   kubectl apply -k examples/rc-spectrum/
#
# Resources land in the `kagent-rc-spectrum` namespace. Create that
# namespace before a standalone `kubectl apply -k`. The bundle assumes
# the `kagent-operator` chart is already installed in
# `kagent-system` (or wherever the operator runs), and that the
# `kagent-llm-gateway-token` + Langfuse + OTLP-headers secrets are
# mirrored into kagent-rc-spectrum (the new_localai overlay's
# `rc-spectrum-secrets.yaml` does this in production).
#
# See README.md for the full runbook + per-scenario expected
# evidence.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kagent-rc-spectrum

# Shared labels stamp every CR so the workbench evidence collector
# and reviewers can filter the bundle as a unit. Same shape as
# rc-pilot — `tenant=rc-spectrum` for namespace-of-purpose audit.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/managed-by: kagent-rc-spectrum
      app.kubernetes.io/created-by: rc-spectrum-runbook
      kagent.knuteson.io/role: rc-spectrum
      kagent.knuteson.io/tenant: rc-spectrum

commonAnnotations:
  kagent.knuteson.io/evidence-bundle: rc-spectrum-1
  # Run identifier stamped onto all resources for evidence filtering.
  # Do not make AgentTasks Argo hooks: long-running runtime CRs must not
  # be deleted/recreated by hook lifecycle.
  kagent.knuteson.io/rc-run: rc-spectrum-1

resources:
  - 01-agents.yaml
  - 10-research-deep.yaml
  - 20-code-generator.yaml
  - 30-long-running.yaml
  - 40-model-compare-scout.yaml
  - 41-model-compare-llama70.yaml
  - 50-multi-step-fanout.yaml
