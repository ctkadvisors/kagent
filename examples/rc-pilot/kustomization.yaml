#
# Enterprise Pilot RC evidence-pack scenario bundle. See README.md for
# the full runbook + checklist mapping. Apply with:
#
#   kubectl apply -k examples/rc-pilot/
#
# Resources land in the `kagent-rc-pilot` namespace. Cleanup with
# `kubectl delete -k examples/rc-pilot/`. The bundle assumes the
# `kagent-operator` chart is already installed in `kagent-system`
# (or wherever the operator runs) with the feature gates enumerated
# in the runbook §1 already turned on.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kagent-rc-pilot

# All scenario CRs are stamped with shared labels so the Workbench
# evidence collector and reviewers can filter the bundle as a unit.
# The `kagent.knuteson.io/tenant=enterprise-pilot` stamp is also what
# the audit-stamps scenario verifies against `pilotEvidence.audit.tenant`.
# `labels` (with `includeSelectors: false`) replaces the deprecated
# `commonLabels` on Kustomize 5.x; we keep selectors clean so the
# operator's parent/child label-selector LIST paths are unaffected.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/managed-by: kagent-rc-pilot
      app.kubernetes.io/created-by: rc-pilot-runbook
      kagent.knuteson.io/role: rc-pilot
      kagent.knuteson.io/tenant: enterprise-pilot

commonAnnotations:
  kagent.knuteson.io/evidence-bundle: enterprise-pilot-rc1

resources:
  - 00-namespace.yaml
  - 01-agents.yaml
  - 10-happy-path.yaml
  - 20-forced-timeout.yaml
  - 30-pod-boot-fail.yaml
  - 40-delegation.yaml
  - 50-artifact-producer.yaml
  - 60-verifier.yaml
  - 70-policy-cap.yaml
  - 80-audit-stamps.yaml

# AgentTask CRs are run-once: once they reach a terminal phase
# (Completed / Failed) the operator does not re-spawn the underlying
# Job, even if `spec` changes. To make this RC bundle reproducible
# under ArgoCD — i.e. every git-commit triggers a fresh re-run of all
# scenarios — stamp every AgentTask with
# `argocd.argoproj.io/sync-options: Replace=true`. On the next sync
# Argo deletes the existing terminal CR and recreates it, the
# operator observes the new CR, and a fresh agent-pod Job spawns.
#
# Patch is scoped to AgentTask only (Agent CRs are stable specs that
# patch in place fine). Without this, model-bumps or prompt-tweaks
# in 01-agents.yaml stay visible only in newly-created tasks; the
# previously-completed AgentTasks remain frozen on the old model.
patches:
  - target:
      kind: AgentTask
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-options
        value: Replace=true
