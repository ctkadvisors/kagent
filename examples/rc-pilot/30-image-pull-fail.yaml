#
# Scenario 30 — Forced platform failure. Targets the
# `rc-pilot-bad-image` Agent declared in 01-agents.yaml.
#
# CRD-LEVEL CONSTRAINT: v0.1's Agent CRD does NOT carry an `image`
# field — the operator's job-spec builder sources the agent-pod
# image from chart Helm values, so we cannot force ImagePullBackOff
# from a scenario manifest alone. Instead, the rc-pilot-bad-image
# Agent declares `tools: ['nonexistent_tool_for_testing']`, which
# the agent-pod's `resolveBuiltinTools` validator rejects at boot
# with a clear "unknown built-in tool" error. The pod's container
# transitions to terminal Error/Failed state and the operator
# transitions the AgentTask to Failed with a readable reason.
#
# Same checklist row, different mechanism — the evidence captures
# a real "platform failure visible in container terminated reason"
# without the cluster-admin gymnastics of two operator deployments.
# To exercise the original ImagePullBackOff path, swap
# `agentPod.image.repository` to a non-resolvable path in the
# operator chart values for a one-shot sync.
#
# Expected Workbench detail evidence:
#   status.phase        == 'Failed'
#   status.podName      populated
#   detail.containerStatuses[*].state.terminated.exitCode != 0
#   status.error contains "unknown built-in tool"
#   pilotEvidence.audit.labels carries the rc-pilot tenant stamp.
#
# Maps to docs/GA-EVIDENCE-CHECKLIST.md row "Image pull or pod failure".
apiVersion: kagent.knuteson.io/v1alpha1
kind: AgentTask
metadata:
  name: rc-pilot-image-pull-fail
  labels:
    kagent.knuteson.io/role: rc-pilot
    kagent.knuteson.io/scenario: image-pull-fail
spec:
  targetAgent: rc-pilot-bad-image
  payload:
    smokeTest: true
  originalUserMessage: 'This task should never reach the agent loop.'
  runConfig:
    timeoutSeconds: 60
    maxIterations: 1
