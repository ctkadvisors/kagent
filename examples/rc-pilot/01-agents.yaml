#
# Reusable Agent CRs the RC scenarios target. The operator chart already
# bakes the agent-pod image (ghcr.io/ctkadvisors/kagent-agent-pod) into
# spawned Jobs via the Helm values pipeline, so these Agents do NOT
# carry a `spec.image` field — they let the operator's job-spec builder
# pick up the chart-configured default. Only the bad-image scenario
# (30-image-pull-fail.yaml) uses an `Agent` whose targeted Job-spec
# image is overridden by an annotation hook (see that file's comments).
#
# Every Agent declares its model with the LiteLLM provider prefix per
# CLAUDE.md (Cloudflare AI Gateway is the homelab default endpoint).
# Tune the model in your local install via `kubectl edit agent ...` or
# a kustomize patch overlay if your cluster prefers a different backend.

# ---------------------------------------------------------------------
# rc-pilot-orchestrator — parent agent for delegation scenarios.
# Uses capabilityClaims + the legacy allowedChild* surface so reviewers
# can see both shapes side-by-side in pilotEvidence.policy.
# ---------------------------------------------------------------------
apiVersion: kagent.knuteson.io/v1alpha1
kind: Agent
metadata:
  name: rc-pilot-orchestrator
  labels:
    kagent.knuteson.io/role: rc-pilot
    kagent.knuteson.io/scenario: orchestrator
spec:
  model: nemotron-3-nano:4b
  version: 0.1.0
  systemPrompt: |
    You orchestrate child agents for an enterprise pilot. Decompose the
    user request into 2-3 small subtasks and dispatch them via the
    spawn_child_task tool. Then summarize the children's results.
  tools:
    - spawn_child_task
  allowedChildAgents:
    - rc-pilot-summarizer
    - rc-pilot-artifact-writer
  maxConcurrentChildren: 3
  sandboxProfile: default
  llmParams:
    temperature: 0.2
    maxTokens: 1024
---
# ---------------------------------------------------------------------
# rc-pilot-summarizer — generic child agent used by delegation +
# happy-path scenarios. Smallest viable agent shape: model + prompt.
# ---------------------------------------------------------------------
apiVersion: kagent.knuteson.io/v1alpha1
kind: Agent
metadata:
  name: rc-pilot-summarizer
  labels:
    kagent.knuteson.io/role: rc-pilot
    kagent.knuteson.io/scenario: summarizer
spec:
  model: nemotron-3-nano:4b
  version: 0.1.0
  systemPrompt: 'You are a precise technical assistant. Answer in one sentence.'
  sandboxProfile: default
  llmParams:
    temperature: 0.0
    maxTokens: 256
---
# ---------------------------------------------------------------------
# rc-pilot-artifact-writer — writes one artifact via the substrate
# write_artifact built-in tool (see packages/agent-pod/src/builtin-tools.ts).
#
# OPEN QUESTION (see README.md §"Open questions"): the v0.1 substrate
# only has the artifact PVC writer enabled when
# `agentPod.artifacts.enabled=true` AND the agent has the tool wired
# into Agent.spec.tools. The README enumerates the values overlay you
# need; if write_artifact is not yet wired in your build, the scenario
# still produces evidence (the `pilotEvidence.artifacts.count` field
# will read 0) — explicitly mark that row reviewed in summary.md.
# ---------------------------------------------------------------------
apiVersion: kagent.knuteson.io/v1alpha1
kind: Agent
metadata:
  name: rc-pilot-artifact-writer
  labels:
    kagent.knuteson.io/role: rc-pilot
    kagent.knuteson.io/scenario: artifact-producer
spec:
  model: nemotron-3-nano:4b
  version: 0.1.0
  systemPrompt: |
    Produce a short markdown report and persist it as an artifact via
    the write_artifact tool with name="report.md" and mediaType="text/markdown".
    Then return a one-line confirmation.
  tools:
    - write_artifact
  sandboxProfile: default
  llmParams:
    temperature: 0.0
    maxTokens: 512
---
# ---------------------------------------------------------------------
# rc-pilot-verifier-gated — used by 60-verifier.yaml. The Agent itself
# is generic; the AgentTask carries the verifyContract that triggers
# the substrate-level post-completion gate (CRD field
# AgentTaskSpec.verifyContract; status field AgentTaskStatus.verification).
# ---------------------------------------------------------------------
apiVersion: kagent.knuteson.io/v1alpha1
kind: Agent
metadata:
  name: rc-pilot-verifier-gated
  labels:
    kagent.knuteson.io/role: rc-pilot
    kagent.knuteson.io/scenario: verifier
spec:
  model: nemotron-3-nano:4b
  version: 0.1.0
  systemPrompt: |
    Answer the user's question in valid JSON of the shape
    {"answer": "<single sentence>"}. Do not add any prose outside JSON.
  sandboxProfile: default
  llmParams:
    temperature: 0.0
    maxTokens: 256
---
# ---------------------------------------------------------------------
# rc-pilot-policy-capped — exercises the policy fields the reviewer
# checklist demands (`maxConcurrentChildren`, `maxInFlightTasks`,
# `allowedChildAgents`, `allowedChildTemplates`). The matching task in
# 70-policy-cap.yaml runs a single invocation; the cap fields surface
# in pilotEvidence.policy regardless of whether the cap is triggered.
# ---------------------------------------------------------------------
apiVersion: kagent.knuteson.io/v1alpha1
kind: Agent
metadata:
  name: rc-pilot-policy-capped
  labels:
    kagent.knuteson.io/role: rc-pilot
    kagent.knuteson.io/scenario: policy-cap
spec:
  model: nemotron-3-nano:4b
  version: 0.1.0
  systemPrompt: 'You are constrained by an enterprise policy. Answer in one sentence.'
  tools:
    - spawn_child_task
  allowedChildAgents:
    - rc-pilot-summarizer
  allowedChildTemplates:
    - rc-pilot-research-template
  maxConcurrentChildren: 2
  maxInFlightTasks: 4
  sandboxProfile: strict
  llmParams:
    temperature: 0.0
    maxTokens: 256
---
# ---------------------------------------------------------------------
# rc-pilot-bad-image — Agent for the image-pull-fail scenario. v0.1
# Agent.spec does NOT carry an `image` field; per docs/SUBSTRATE-V1.md
# the operator's job-spec builder sources the agent-pod image from
# Helm values (`agentPod.image.repository:tag`).
#
# OPEN QUESTION (see README.md §"Open questions"): there is no
# CRD-level `Agent.spec.image` override in v0.1, so the canonical way
# to force an ImagePullBackOff is to set the AgentTask's image via a
# kustomize JSON-patch on the spawned Job, OR to deploy the operator
# with `agentPod.image.repository=ghcr.io/ctkadvisors/kagent-agent-pod-DOES-NOT-EXIST`
# in a dedicated test namespace overlay. The README enumerates both
# paths. The Agent CR below is just the address — the failure is
# induced via the values overlay enumerated in the runbook.
# ---------------------------------------------------------------------
apiVersion: kagent.knuteson.io/v1alpha1
kind: Agent
metadata:
  name: rc-pilot-bad-image
  labels:
    kagent.knuteson.io/role: rc-pilot
    kagent.knuteson.io/scenario: image-pull-fail
  annotations:
    # Documentation-only — the operator does NOT consume this. The
    # README explains how to force ImagePullBackOff via Helm values
    # overlay. Reviewers who want to confirm the failure mode without
    # touching Helm should temporarily edit the operator deployment's
    # `KAGENT_AGENT_POD_IMAGE_REPOSITORY` env var (set by the chart
    # from `agentPod.image.repository`) to a non-existent image.
    kagent.knuteson.io/rc-pilot-note: |
      Force ImagePullBackOff via operator values overlay (see README §3).
spec:
  model: nemotron-3-nano:4b
  version: 0.1.0
  systemPrompt: 'This agent intentionally fails to pull its container image.'
  sandboxProfile: default
