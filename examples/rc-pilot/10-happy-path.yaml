#
# Scenario 10 — Happy path. A single AgentTask targeting the summarizer.
# Expected terminal state:
#   status.phase                    == 'Completed'
#   status.structuralVerdict.suspicious == [] (empty)
#   status.result                   non-empty
#   pilotEvidence.runConfig         carries timeoutSeconds + maxIterations
#
# Maps to docs/GA-EVIDENCE-CHECKLIST.md row "Happy path".
apiVersion: kagent.knuteson.io/v1alpha1
kind: AgentTask
metadata:
  name: rc-pilot-happy-path
  labels:
    kagent.knuteson.io/role: rc-pilot
    kagent.knuteson.io/scenario: happy-path
spec:
  targetAgent: rc-pilot-summarizer
  payload:
    smokeTest: true
  originalUserMessage: 'In one sentence, what is K3s?'
  runConfig:
    timeoutSeconds: 120
    maxIterations: 4
