{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

ServiceAccount the workbench-api Pod runs as. The cluster-wide
read-only RBAC (clusterrole.yaml + clusterrolebinding.yaml) binds to
this SA.
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kagent-workbench.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-workbench.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
