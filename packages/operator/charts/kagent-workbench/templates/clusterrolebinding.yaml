{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kagent-workbench.fullname" . }}-reader
  labels:
    {{- include "kagent-workbench.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kagent-workbench.fullname" . }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "kagent-workbench.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
