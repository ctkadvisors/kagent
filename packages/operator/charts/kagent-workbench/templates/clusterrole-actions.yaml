{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

Role — WRITE surface for the workbench-api (WS-J), scoped to the
release namespace (H17 — was a ClusterRole, now namespaced). Filename
stays `clusterrole-actions.yaml` for git history continuity; it now
emits Role + RoleBinding (see clusterrolebinding-actions.yaml). The
"clusterrole" prefix in the filename is a misnomer kept to avoid
churning manifest paths in downstream tools that key by filename.

H17 motivation: prior to this change, the actions surface granted
`agenttasks: [create]` and `modelendpoints: [patch, update]`
cluster-wide (every namespace). Combined with B6's spoofable
`X-Forwarded-User` header, an authenticated workbench user could
create AgentTasks or mutate ModelEndpoint bounds in any namespace,
including tenant namespaces. Restricting to the release namespace
removes the cross-namespace blast radius. Multi-namespace dispatch is
a future feature behind an explicit values flag, NOT a default.

Emergency terminate is the one intentional exception: when
`rbac.actions.terminateAllNamespaces=true`, this template emits a
separate ClusterRole with ONLY `agenttasks: [delete]`. That lets the
Workbench kill runtime tasks listed from every namespace without
reopening cross-namespace create/patch/modelendpoint mutation.

Kept distinct from `clusterrole.yaml` so an install with
`actions.create=false` is provably write-proof: the read role grants
no `create`/`update`/`delete` verbs anywhere; the write Role does not
exist when actions are disabled. Drop-in: bind/unbind by toggling
`.Values.rbac.actions.create`.

Phase 4 (REV-01 / REV-02) extended this Role with:
  - `agenttasks: [patch]` — for annotation writes on accept/reject/request
    (review-decision, review-decided-by, review-decided-at, review-requested, etc.)
  - `agenttasks: [delete]` — for Workbench terminate; deleting the
    AgentTask is the substrate kill path because the Job/Pod are owned
    by that CR and Kubernetes GC tears them down.
  - `agenttemplates: [create]` — for AgentTemplate CR creation on accept
    of a candidate-template row (promotion path).
  - `agents: [create]` — for Architect `/try`, which materializes a
    draft Agent before creating the AgentTask.

The READ-SIDE verbs for agenttemplates ([get,list,watch]) live in
clusterrole.yaml — same split-by-function convention as existing
resources. An install with `actions.create=false` is provably
review-write-proof: neither the patch verb nor the create verb exists.

`/retry` (WORKBENCH.md §5) is not implemented in v0.1; when it lands it
extends this Role with the corresponding write verb on `agenttasks/status`.
*/}}
{{- if and .Values.rbac.create .Values.rbac.actions.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kagent-workbench.fullname" . }}-actions
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-workbench.labels" . | nindent 4 }}
    app.kubernetes.io/component: workbench-actions
rules:
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agenttasks']
    # Phase 4 (REV-01 / REV-02): `patch` added for annotation writes
    # (review-decision, review-requested, review-decided-by/at companions).
    # `create` pre-dates Phase 4 — serves POST /api/tasks.
    # `delete` serves DELETE /api/tasks/:ns/:name (terminate).
    verbs: ['create', 'patch', 'delete']
  # Phase 4 (REV-02): agenttemplates [create] — candidate-template accept
  # path promotes a reviewed artifact into an AgentTemplate CR.
  # Read-side [get,list,watch] lives in clusterrole.yaml (split-by-function).
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agenttemplates']
    verbs: ['create']
  # Architect `/api/architect/try`: materialize the draft Agent in the
  # release namespace when api.architect.draftNamespace is blank/default.
  # Cross-namespace Architect drafts use architect-draft-rbac.yaml.
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agents']
    verbs: ['create']
  # ModelEndpoint mutation — drives the Gateway page's
  # "save bounds" button. Patches `spec.inFlight.{seed,max,minSafe}`
  # via JSON merge-patch. Verbs are `patch` (mutation) + `update`
  # (the K8s API may downgrade certain server-side patches to
  # update internally) — explicit list prevents accidental over-grant.
  - apiGroups: ['kagent.knuteson.io']
    resources: ['modelendpoints']
    verbs: ['patch', 'update']
{{- end }}
{{- if and .Values.rbac.create .Values.rbac.actions.create .Values.rbac.actions.terminateAllNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent-workbench.fullname" . }}-terminate-all-namespaces
  labels:
    {{- include "kagent-workbench.labels" . | nindent 4 }}
    app.kubernetes.io/component: workbench-terminate
rules:
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agenttasks']
    verbs: ['delete']
{{- end }}
