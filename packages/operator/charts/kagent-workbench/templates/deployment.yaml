{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

Workbench Deployment — single Pod, two containers:

  - `api`: workbench-api (Bun/Node). Talks to the Kubernetes API
    server using the chart-managed ServiceAccount. Owns the read-only
    facade (Agent/AgentTask/AgentCapability + Job/Pod/Event watches)
    and serves SSE/JSON under /api/. Listens on api.port (8080).

  - `ui`: workbench-ui sidecar (nginx-alpine baking the React/Vite
    static `dist/` build). No K8s creds. Listens on ui.port
    (8081). The api container proxies non-/api requests to this
    sidecar over loopback (127.0.0.1:{ui.port}).

Why one Pod with a sidecar instead of two Deployments:
  - The api/ui contract is loopback-only (UI is a pure browser
    bundle once served — no in-cluster UI→service hop).
  - Lifecycle is coupled (no UI without API).
  - Avoids a second Service + a second pull spec for what is, in
    practice, one console.

Single-replica is fine for MVP — workbench holds only K8s-watch
state, which it rebuilds from the API server on restart. Bump
replicaCount once you care about brief restart-window blips during
rollouts.
*/}}
{{- include "kagent-workbench.validateValues" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kagent-workbench.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-workbench.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kagent-workbench.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kagent-workbench.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kagent-workbench.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # WS-A pod security baseline. Both containers run as non-root
      # under a RuntimeDefault seccomp profile.
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Writable mounts under readOnlyRootFilesystem=true:
      #   - tmp:    used by Node + tsx for transient files
      #   - nginx-cache + nginx-run: nginx-alpine's default config
      #     writes /var/cache/nginx + /var/run/nginx.pid; both must
      #     be writable for the ui sidecar to start.
      #   - nginx-conf-d: the nginx-alpine entrypoint expands
      #     /etc/nginx/templates/*.template via envsubst INTO
      #     /etc/nginx/conf.d/. Without a writable mount here the
      #     `20-envsubst-on-templates.sh` step fails with
      #     "/etc/nginx/conf.d is not writable", no server block is
      #     materialized, nginx starts listening on nothing, and the
      #     readiness probe to ui.port returns connection refused →
      #     CrashLoop. Empty emptyDir works because the entrypoint
      #     writes the rendered config there at boot.
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-conf-d
          emptyDir: {}
      containers:
        - name: api
          image: {{ include "kagent-workbench.api.image" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          # WS-A container security baseline.
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - name: api
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: WORKBENCH_PORT
              value: {{ .Values.api.port | quote }}
            - name: WORKBENCH_HOSTNAME
              value: '0.0.0.0'
            # Loopback URL for the api → ui static-asset proxy.
            - name: WORKBENCH_UI_UPSTREAM
              value: 'http://127.0.0.1:{{ .Values.ui.port }}'
            {{- with .Values.api.langfuseBaseUrl }}
            - name: LANGFUSE_BASE_URL
              value: {{ . | quote }}
            {{- end }}
            # Header-trust auth gate (X-Forwarded-User from Traefik
            # forward-auth). Default is 'true' (fail-closed); only the
            # literal string 'false' disables enforcement. workbench-api
            # logs a loud warning at boot when disabled. See
            # values.yaml `api.authRequired` and
            # packages/workbench-api/src/auth.ts.
            - name: WORKBENCH_AUTH_REQUIRED
              value: {{ .Values.api.authRequired | quote }}
            # Phase 1 / DISP-03 — `/api/dispositions` daily-counter
            # boundary timezone. Only 'UTC' is supported in v0.2;
            # non-UTC values log a warning at workbench-api boot.
            # Forward-compat hook for IANA names (e.g.
            # 'America/Chicago') once a multi-timezone deployment
            # justifies the implementation.
            - name: WORKBENCH_DISPOSITION_DAILY_BOUNDARY_TZ
              value: {{ .Values.api.disposition.dailyBoundaryTimezone | default "UTC" | quote }}
            # WS-J write surface gate. The workbench-api default-OFFs the
            # POST /api/tasks handler unless this is the literal string
            # `true`. Tied to `.Values.rbac.actions.create` so the chart
            # cannot ship "API enabled but RBAC missing" — they flip in
            # lockstep. When ON, the workbench-api also reads
            # WORKBENCH_DEFAULT_NAMESPACE for POSTs that omit `namespace`.
            - name: WORKBENCH_ACTIONS_ENABLED
              value: {{ and .Values.rbac.create .Values.rbac.actions.create | ternary "true" "false" | quote }}
            - name: WORKBENCH_DEFAULT_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            # Gateway page wiring — only emitted when the chart values
            # supply both the gateway URL and the admin-token Secret
            # reference. The workbench-api treats either env var being
            # absent / empty as "gateway page disabled" and the
            # /api/gateway/* routes 503 — UI degrades to an empty
            # state instead of crashing.
            {{- with .Values.api.gatewayAdmin }}
            {{- if .baseUrl }}
            - name: WORKBENCH_GATEWAY_BASE_URL
              value: {{ .baseUrl | quote }}
            {{- end }}
            {{- if .admin.secretName }}
            - name: WORKBENCH_GATEWAY_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .admin.secretName | quote }}
                  key: {{ .admin.secretKey | quote }}
            {{- end }}
            {{- end }}
            # kagent Studio Architect (chat-to-create) wiring — emitted
            # only when api.architect.enabled. URL + model are plain env;
            # the bearer token is sourced from the gateway token Secret.
            # When absent, the workbench-api does NOT mount /api/architect/*.
            # The /try write path additionally needs rbac.actions.create.
            # A blank draftNamespace defaults to the release namespace;
            # cross-namespace drafts need the architect-draft RoleBinding.
            {{- if .Values.api.architect.enabled }}
            {{- $architectDraftNamespace := default .Release.Namespace .Values.api.architect.draftNamespace }}
            - name: KAGENT_ARCHITECT_GATEWAY_URL
              value: {{ .Values.api.architect.gatewayUrl | quote }}
            - name: KAGENT_ARCHITECT_MODEL
              value: {{ .Values.api.architect.model | quote }}
            - name: KAGENT_ARCHITECT_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.architect.tokenSecret.name | quote }}
                  key: {{ .Values.api.architect.tokenSecret.key | quote }}
            - name: KAGENT_DRAFT_NAMESPACE
              value: {{ $architectDraftNamespace | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.healthPath }}
              port: api
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.api.healthPath }}
              port: api
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
        - name: ui
          image: {{ include "kagent-workbench.ui.image" . }}
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          # WS-A container security baseline. nginx-alpine writes its
          # cache to /var/cache/nginx + a pid to /var/run/nginx.pid;
          # both are mounted as emptyDirs below so the readOnly root
          # FS doesn't break boot.
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-conf-d
              mountPath: /etc/nginx/conf.d
          ports:
            - name: ui
              containerPort: {{ .Values.ui.port }}
              protocol: TCP
          env:
            # The UI image's nginx config reads PORT to know where to
            # bind. Sidecar contract — workbench-ui's Dockerfile honors
            # this.
            - name: PORT
              value: {{ .Values.ui.port | quote }}
          livenessProbe:
            httpGet:
              path: {{ .Values.ui.healthPath }}
              port: ui
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.ui.healthPath }}
              port: ui
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
