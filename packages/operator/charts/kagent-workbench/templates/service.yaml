{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

Single ClusterIP Service exposing both containers in the workbench
Pod. The service-side ports come from values (`service.port`,
`service.uiPort`); container-side ports come from `api.port` /
`ui.port` and are wired via the named targetPort:

  - {service.port}   → api container's api.port  (named `api`)
  - {service.uiPort} → ui  container's ui.port   (named `ui`)

The Ingress / IngressRoute targets the `api` port — the api container
proxies static-asset requests to the `ui` sidecar internally over
loopback. Exposing the `ui` port on the Service is intentional for
debugging / direct port-forward (`kubectl port-forward svc/...
8081:ui`), not for normal traffic flow.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kagent-workbench.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-workbench.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "kagent-workbench.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: {{ .Values.service.port }}
      targetPort: api
      protocol: TCP
    - name: ui
      port: {{ .Values.service.uiPort }}
      targetPort: ui
      protocol: TCP
