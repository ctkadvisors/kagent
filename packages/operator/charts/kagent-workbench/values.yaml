#
# kagent-workbench default values.
#
# The workbench is a read-only operator console over the kagent control
# plane (Agents, AgentTasks, AgentCapabilities + the Jobs/Pods the
# operator owns). It runs in the same namespace as the operator
# (`kagent-system` in the homelab) and shares the operator's pull
# secret. See:
#
#   - kagent/docs/WORKBENCH.md (especially §6 Deployment)
#   - new_localai/docs/kagent-workbench-rbac.md (RBAC + auth plan)
#   - new_localai/k8s/argocd-apps/kagent-workbench-app.yaml
#     (the ArgoCD Application that consumes this chart)
#
# Override at install time with `--set` or `-f values.local.yaml`.

# Number of replicas for the workbench Deployment. Single-replica is
# fine for MVP — the workbench holds only K8s-watch state, which it
# rebuilds from the API server on restart. Scale to 2+ once you care
# about brief restart-window blips during rollouts.
replicaCount: 1

# ---------------------------------------------------------------------
# Workbench API (thin Kubernetes-watch + DTO facade)
# ---------------------------------------------------------------------
# Container 1 in the Deployment. Talks to the Kubernetes API server
# using the chart-managed ServiceAccount (read-only RBAC). Serves the
# UI at `/` (proxies to the sidecar) and the JSON/SSE surface at `/api`.
api:
  image:
    repository: ghcr.io/ctkadvisors/kagent-workbench-api
    # Defaults to .Chart.appVersion when empty; override here for dev pins.
    tag: ''
    # `IfNotPresent` — ghcr.io publishes immutable per-tag artifacts,
    # so we only need to pull on first scheduling onto a node. Override
    # to `Always` if you're pinning to a moving tag like `:latest`
    # during development.
    pullPolicy: IfNotPresent
  # Container port the workbench-api listens on. The chart's Service
  # exposes this as port 80; the Ingress / IngressRoute routes / →
  # this port.
  port: 8080
  # Liveness/readiness probe path served by workbench-api. K8s probes
  # hit the pod's container port directly (bypassing the Ingress) so
  # the value is the API's bare HTTP path, not its public Ingress URL.
  # workbench-api/src/routes/healthz.ts mounts /healthz + /readyz at
  # the root — readiness probe should ideally use /readyz; v0.1 uses
  # /healthz for both for simplicity (informer warm-up grace is short).
  healthPath: '/healthz'
  # Optional — when set, the workbench-api will surface "open trace"
  # links pointing at this Langfuse base URL. Typical homelab value:
  # `https://langfuse.knuteson.io`. Leave blank to hide trace links.
  langfuseBaseUrl: ''
  # Optional — wires the Gateway page (`#/gateway` in the UI) to the
  # kagent LLM gateway's /admin/* surface. When unset, the page renders
  # an empty "gateway not configured" state.
  #
  # `baseUrl` is the in-cluster URL of the gateway pod's HTTP listener.
  # `admin.secretName` / `admin.secretKey` reference a Secret in the
  # release namespace whose value is the gateway's own admin bearer
  # token (from the gateway chart's `kagent-llm-gateway-token` Secret).
  # The workbench-api reads this token at boot, threads it through into
  # outbound /admin/capacity + /admin/usage calls.
  #
  # Homelab posture: same Secret as the gateway's adminApiToken (the
  # gateway issues the token; the workbench-api consumes it). Cross-
  # cluster operators wanting a separate token can mint one and use
  # /admin/keys to register it (out of scope for v0.1).
  gatewayAdmin:
    baseUrl: ''
    admin:
      secretName: ''
      secretKey: 'token'
  # kagent Studio Architect (chat-to-create). When enabled, the
  # workbench-api mounts `/api/architect/*` and routes generation through
  # the gateway's OpenAI-compatible `/v1` surface (model-agnostic). The
  # `/draft` generate path needs only this; the `/try` write path
  # additionally requires `rbac.actions.create` AND the kagent-draft Role
  # the GitOps overlay grants the workbench ServiceAccount. Token reuses
  # the gateway's `kagent-llm-gateway-token` Secret (same homelab posture
  # as gatewayAdmin). Leave `enabled: false` to omit the feature.
  architect:
    enabled: false
    gatewayUrl: '' # in-cluster OpenAI-compatible base, e.g. http://kagent-llm-gateway.kagent-system.svc.cluster.local:4000/v1
    model: '' # e.g. workers-ai/@cf/meta/llama-4-scout-17b-16e-instruct
    tokenSecret:
      name: 'kagent-llm-gateway-token'
      key: 'token'
    # Empty means the Helm release namespace. That keeps a packaged
    # chart install runnable with the release-scoped action Role and
    # agent-pod ServiceAccount. Set a namespace such as `kagent-draft`
    # for a separate live-iteration zone.
    draftNamespace: ''
    # When draftNamespace differs from the release namespace, render
    # the workbench-api Role + RoleBinding required by /api/architect/try
    # in that namespace. Runtime agent-pod prerequisites for that
    # namespace are still supplied by the operator chart or GitOps.
    draftRbac:
      create: true
  # Header-trust auth gate. The workbench-api requires every non-probe
  # request to carry an `X-Forwarded-User` header (set upstream by
  # Traefik forward-auth or oauth2-proxy). The default is `true` —
  # fail-closed; only the literal string `false` disables enforcement.
  # Disabling logs a loud warning at workbench-api boot. See WS-A
  # security baseline + packages/workbench-api/src/auth.ts for the
  # trust model.
  #
  # `/healthz` and `/readyz` ALWAYS bypass auth so kubelet probes
  # work regardless of upstream auth-shim health.
  authRequired: 'true'
  # Phase 1 / DISP-03 — `/api/dispositions` projection options.
  # The projection computes per-Agent disposition rows from existing
  # telemetry (gateway token-usage + the operator-written
  # `kagent.knuteson.io/proposals-today` annotation). NO new
  # persistence primitive — D2.
  disposition:
    # IANA timezone name for the daily counter boundary. Defaults to
    # 'UTC'. v0.2 only supports 'UTC' in code; non-UTC values log a
    # warning at workbench-api boot and fall back to UTC. The Helm
    # value is reserved for forward compatibility once a multi-
    # timezone deployment justifies the implementation (e.g.
    # 'America/Chicago').
    dailyBoundaryTimezone: 'UTC'
  # Per-container resource budget. Conservative MVP defaults — bump
  # when you start watching many AgentTasks (the in-memory cache scales
  # with the count of objects under watch).
  resources:
    requests:
      cpu: '50m'
      memory: '128Mi'
    limits:
      cpu: '500m'
      memory: '256Mi'

# ---------------------------------------------------------------------
# Workbench UI (React/Vite; static assets served by nginx-alpine)
# ---------------------------------------------------------------------
# Container 2 in the Deployment (sidecar). Pure browser bundle — owns
# no Kubernetes credentials. The workbench-ui image is the Vite
# build's `dist/` baked behind nginx-alpine on `ui.port`.
# The workbench-api proxies `/` requests to this sidecar; everything
# under `/api/*` stays in the API container.
#
# Why sidecar over single-container-static-assets: the workbench-api
# is a Bun/Node binary that doesn't ship a static-file server, and we
# don't want to bloat the API image with the UI build. Two containers
# in one Pod keeps the network hop loopback-only and the lifecycle
# coupled.
ui:
  image:
    repository: ghcr.io/ctkadvisors/kagent-workbench-ui
    tag: ''
    pullPolicy: IfNotPresent
  # Container port the UI sidecar (nginx-alpine) listens on.
  port: 8081
  # Path nginx serves a 200 on for liveness/readiness. nginx-alpine's
  # default `/` returns the index page, which is fine for probes.
  healthPath: '/'
  # Per-container resource budget. UI is a static-file server — tiny.
  resources:
    requests:
      cpu: '10m'
      memory: '32Mi'
    limits:
      cpu: '100m'
      memory: '64Mi'

# ---------------------------------------------------------------------
# Image pull secret(s). Defaults to none — `ghcr.io/ctkadvisors/...`
# images are published from a public GitHub repo and require no
# credentials. Override with `[{ name: ... }]` if pulling from a
# private mirror.
# ---------------------------------------------------------------------
imagePullSecrets: []

# ---------------------------------------------------------------------
# ServiceAccount the workbench-api Pod runs as. The cluster-wide
# read-only RBAC below binds to this SA.
# ---------------------------------------------------------------------
serviceAccount:
  create: true
  # Empty → defaults to `kagent-workbench`. Override here if you want
  # to bind a pre-existing SA.
  name: 'kagent-workbench'
  annotations: {}

# ---------------------------------------------------------------------
# RBAC. Cluster-scoped read-only ClusterRole + binding for the
# workbench-api ServiceAccount.
#
# `actions.create` (default true since v0.0.7-write-surface) gates a
# SEPARATE ClusterRole + binding for write verbs (POST /api/tasks).
# Set to false on installs where the workbench is read-only — the
# split keeps the read RBAC provably write-proof. The workbench-api
# also requires the `WORKBENCH_ACTIONS_ENABLED=true` env knob (set
# automatically when `actions.create=true`) before the POST handler
# wires the K8s client; without it, POST /api/tasks returns 503.
#
# Today actions covers AgentTask creation, same-namespace termination
# deletes, review annotation patches, Architect draft writes,
# ModelEndpoint bound patches, and Channel pause/resume patches. Set
# `terminateAllNamespaces=true` for the emergency-only ClusterRole that
# grants ONLY `agenttasks:delete` across namespaces; create/patch/
# modelendpoint/channel writes remain namespace-scoped. /retry
# (WORKBENCH.md §5) extends the same role when it lands.
# See new_localai/docs/kagent-workbench-rbac.md §2.2.
# ---------------------------------------------------------------------
rbac:
  create: true
  actions:
    create: true
    terminateAllNamespaces: false

# ---------------------------------------------------------------------
# Service. Exposes port `service.port` → api container's `api.port`
# and port `service.uiPort` → ui sidecar's `ui.port`. Defaults pair
# 80→8080 (api) and 81→8081 (ui) — the Service-side ports are what
# any Ingress / IngressRoute / port-forward target connects to. The
# Ingress in this chart targets the `api` Service port; the api
# container then proxies non-/api requests to the ui sidecar over
# loopback (see ui-proxy.ts).
#
# Override the Service-side port (e.g. `service.port: 8080`) when
# something else in the namespace already owns 80; container ports
# (`api.port` / `ui.port`) are independent and stay 8080 / 8081 by
# default.
# ---------------------------------------------------------------------
service:
  type: ClusterIP
  # Cluster-side port for the api container. Targets api.port.
  port: 80
  # Cluster-side port for the ui sidecar. Targets ui.port.
  uiPort: 81

# ---------------------------------------------------------------------
# Ingress. Two render paths:
#
#   1. `ingress.enabled=true` + `ingress.authMiddleware` BLANK → renders
#      a vanilla `networking.k8s.io/v1 Ingress`. Use this on clusters
#      where TLS / auth are handled outside the chart (cert-manager
#      annotations, oauth2-proxy front-door, etc.).
#
#   2. `ingress.enabled=true` + `ingress.authMiddleware` SET → renders a
#      Traefik `traefik.io/v1alpha1 IngressRoute` instead, with the
#      named Middleware referenced for auth. This is the homelab
#      pattern — Traefik IngressRoute under the wildcard `knuteson-tls`
#      cert with a `kagent-workbench-basic-auth` Middleware in front.
#
# See new_localai/docs/kagent-workbench-rbac.md §3 for the full auth
# rationale.
# ---------------------------------------------------------------------
ingress:
  enabled: false
  # `traefik` for the homelab IngressRoute path; standard ingress class
  # name (e.g. `nginx`) for the vanilla Ingress path.
  className: 'traefik'
  # Public hostname (e.g. `kagent.knuteson.io`) or Tailscale-only host
  # (e.g. `kagent.homelab`). REQUIRED when `enabled=true`.
  host: ''
  # TLS configuration. When `secretName` is set, both render paths emit
  # TLS — vanilla Ingress as `spec.tls[]`, IngressRoute as the route's
  # `tls.secretName`. Empty → HTTP only (only sensible behind Tailscale).
  tls:
    secretName: ''
  # Name of a Traefik Middleware (in this Release's namespace) to
  # reference for auth. When non-empty, the chart renders an
  # IngressRoute instead of a plain Ingress and chains this Middleware
  # in. The Middleware itself is NOT created by this chart — provision
  # it separately (e.g. a Sealed-Secret-backed `basicAuth` Middleware
  # in `kagent-system`).
  authMiddleware: ''
  # Free-form annotations applied to the rendered Ingress / IngressRoute
  # metadata. Useful for `cert-manager.io/cluster-issuer`, etc.
  annotations: {}

# Node placement
nodeSelector: {}
tolerations: []
affinity: {}

# Pod-level extras
podAnnotations: {}
podLabels: {}

# Workbench logging verbosity (info | debug). Plumbed as LOG_LEVEL into
# the workbench-api container.
logLevel: 'info'

# ---------------------------------------------------------------------
# WS-A — default-deny NetworkPolicy. See `templates/networkpolicy.yaml`.
# REQUIRES a CNI that enforces NetworkPolicies (Calico, Cilium,
# Weave, ...). K3s with the default flannel backend ignores this
# resource.
# ---------------------------------------------------------------------
networkPolicy:
  # Default true — fail-closed.
  enabled: true
  # `from` clauses copied verbatim into the ingress allow rule. Defaults
  # to a Traefik-friendly rule if left empty (see networkpolicy.yaml).
  # Override on clusters whose ingress controller uses a different
  # namespace/label.
  # Example for nginx-ingress in the `ingress-nginx` namespace:
  #   ingressFrom:
  #     - namespaceSelector:
  #         matchLabels:
  #           kubernetes.io/metadata.name: ingress-nginx
  #       podSelector:
  #         matchLabels:
  #           app.kubernetes.io/name: ingress-nginx
  ingressFrom: []
  # Extra egress rules merged into the rendered policy.
  extraEgress: []

# ---------------------------------------------------------------------
# WS-A pod + container security context defaults. Applied to both the
# api and ui sidecar containers in the workbench Deployment. Override
# sub-fields by passing the full object via `--set-json` or values
# overlay.
# ---------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ['ALL']
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Optional name + fullname overrides — standard Helm idiom.
nameOverride: ''
fullnameOverride: ''

# ---------------------------------------------------------------------
# Audit B6 trapdoor acknowledgement.
#
# When the chart renders a vanilla `networking.k8s.io/v1 Ingress`
# (i.e. `ingress.enabled=true` AND `ingress.authMiddleware` is empty)
# AND the workbench-api keeps its default `api.authRequired='true'`
# header-trust posture, the cluster-side defense against
# X-Forwarded-User SPOOFING is the NetworkPolicy that restricts
# ingress to the ingress-controller pods. K3s with the default
# flannel CNI does NOT enforce NetworkPolicies, so on a default
# K3s cluster ANY in-cluster pod can forge X-Forwarded-User and
# walk past the auth gate.
#
# `_helpers.tpl` `kagent-workbench.validateValues` REJECTS this
# combination at `helm install`/`helm template` time unless this
# flag is set to true. Acknowledging the trapdoor is the operator
# saying "I have a NetworkPolicy-enforcing CNI deployed" or "I am
# running on a private network where in-cluster pod spoofing is
# not in my threat model."
#
# The recommended remediation is `ingress.authMiddleware` pointing
# at a Traefik Middleware that authenticates the request (basicAuth
# / forwardAuth / oauth2-proxy). With auth at the IngressRoute
# layer, the trapdoor closes naturally — see
# docs/AGENT-SELF-SERVICE.md §3.5 and evidence/audit-rev2/C3.md.
# ---------------------------------------------------------------------
acknowledgeUnauthenticated: false
