apiVersion: v2
name: kagent-operator
description: |
  K3s-native control plane that watches Agent + AgentTask CRDs
  (kagent.knuteson.io/v1alpha1) and materializes per-task Jobs running
  the @kagent/agent-pod runtime.
type: application
version: 0.0.5
appVersion: 'v0.0.5-workbench-mvp'
home: https://github.com/ctkadvisors/kagent
sources:
  - https://github.com/ctkadvisors/kagent
maintainers:
  - name: Chris Knuteson
    email: chris@ctkadvisors.net
keywords:
  - kagent
  - agents
  - kubernetes
  - operator
  - llm
# Wave 3 / Identity (v0.4.3-identity) — embedded SPIFFE/SPIRE
# sub-chart at `charts/spire/`. Default OFF; enable via
# `identity.enabled=true`. The condition keeps the sub-chart
# resources out of the rendered manifest unless the flag is set.
dependencies:
  - name: spire
    version: 0.0.1
    repository: 'file://./charts/spire'
    condition: identity.enabled
