ClusterIP Service for the task tool-runtime gateway.
*/}}
{{- if .Values.toolRuntime.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kagent-operator.fullname" . }}-tool-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: tool-gateway
spec:
  type: ClusterIP
  selector:
    {{- include "kagent-operator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: tool-gateway
  ports:
    - name: http
      port: {{ .Values.toolRuntime.gateway.port }}
      targetPort: http
      protocol: TCP
{{- end }}
