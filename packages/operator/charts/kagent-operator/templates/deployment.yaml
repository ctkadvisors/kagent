{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

Operator Deployment. Single replica in v0.1 — leader election lands
in v0.2 if multi-replica becomes useful (the watch loop is currently
not coordination-aware).

WS-F single-replica enforcement:
  - `replicaCount` MUST be 1 (asserted at template-time below).
  - `strategy: Recreate` so a rolling update never has two operator
    replicas live concurrently.

Why we need both: the reconcile loop is informer-driven; if two
replicas were ever both watching, both would race the dispatch
sequence (suspended-create → publish → annotate → unsuspend). The
NATS-Msg-Id dedupe in NatsDispatcher protects the bus, but the
Job-create / patch sequence still doesn't tolerate true concurrency.
Until leader election (v0.2) lands, single-replica is the only safe
deployment.
*/}}

{{/* Hard-fail at template time on any replicaCount != 1. The audit
flagged that operators sometimes hand-edit values to scale up; this
turns that into a clear, actionable error rather than a silent race. */}}
{{- if ne (.Values.replicaCount | int) 1 }}
{{- fail "kagent-operator: replicaCount must be 1 in v0.1; multi-replica requires leader election (v0.2)" }}
{{- end }}
{{- if and .Values.capabilities.enabled (not .Values.capabilities.signingSecretName) }}
{{- fail "kagent-operator: capabilities.enabled=true requires capabilities.signingSecretName" }}
{{- end }}
{{- include "kagent-operator.validateValues" . -}}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kagent-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Recreate (not RollingUpdate). A rolling update would briefly run
  # two replicas; with no leader election in v0.1 that means two
  # reconcilers racing each other on the same AgentTask. Recreate
  # accepts a brief downtime window in exchange for never having two
  # operators alive at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "kagent-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kagent-operator.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kagent-operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # WS-A pod security baseline. Overrideable via
      # `.Values.podSecurityContext`; defaults to non-root + RuntimeDefault
      # seccomp + fsGroup so the operator can read its in-cluster CA bundle.
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # /tmp emptyDir — required because the container runs with
      # readOnlyRootFilesystem=true (see container-level securityContext
      # below). Node 22 + tsx and @kubernetes/client-node both write
      # transient files (token cache, npm cache) under /tmp.
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.capabilities.enabled }}
        - name: kagent-cap-ca
          secret:
            secretName: {{ .Values.capabilities.signingSecretName | quote }}
            items:
              - key: {{ .Values.capabilities.signingKeyKey | quote }}
                path: {{ .Values.capabilities.signingKeyKey | quote }}
              - key: {{ .Values.capabilities.signingPublicKeyKey | quote }}
                path: {{ .Values.capabilities.signingPublicKeyKey | quote }}
              {{- with .Values.capabilities.previousPublicKeyKey }}
              - key: {{ . | quote }}
                path: {{ . | quote }}
              {{- end }}
        {{- end }}
        {{- if .Values.cas.enabled }}
        # Wave 1 — CAS
        # The operator's GC controller walks the CAS tree on disk to
        # decide what's reachable + age-eligible. It MUST mount the
        # same PVC the agent-pods write to (no other authoritative
        # source for the on-disk layout). Read-only mount: the GC
        # uses unlinkSync, which on K8s RWX mounts requires the
        # mount NOT be flagged read-only at the K8s level — but the
        # GC itself is the only operator-side writer, so we elide
        # readOnly here.
        - name: kagent-cas
          persistentVolumeClaim:
            claimName: {{ .Values.cas.pvcName | quote }}
        {{- end }}
      containers:
        - name: operator
          image: {{ include "kagent-operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # WS-A container security baseline. drop ALL caps,
          # readOnlyRootFilesystem, no privilege escalation. Override
          # via `.Values.containerSecurityContext`.
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.capabilities.enabled }}
            - name: kagent-cap-ca
              mountPath: /var/kagent/cap-ca
              readOnly: true
            {{- end }}
            {{- if .Values.cas.enabled }}
            # Wave 1 — CAS — same mountPath the operator advertises to
            # spawned Jobs via KAGENT_CAS_MOUNT_PATH so the GC walker
            # and the agent-pod's read_artifact tool agree on the layout.
            - name: kagent-cas
              mountPath: {{ .Values.cas.mountPath | quote }}
            {{- end }}
          ports:
            {{- if or .Values.agentPod.templates.enabled .Values.capabilities.enabled }}
            # WS-M template-server / Wave 5 JWKS endpoint. Exposes
            # POST /v1alpha1/templates/{name}:instantiate to in-cluster
            # callers when templates are enabled, plus
            # GET /.well-known/jwks.json when capabilities are enabled.
            # ClusterIP-only Service in template-service.yaml fronts this.
            - name: templates
              containerPort: {{ .Values.agentPod.templates.serverPort }}
              protocol: TCP
            {{- end }}
            {{- if .Values.triggers.enabled }}
            # Wave 0 sub-team Entry — HMAC-signed webhook receiver.
            # Exposes POST /webhook/<trigger-id> to in-cluster callers
            # (and via the optional Ingress in webhook-ingress.yaml,
            # off-cluster callers). webhook-service.yaml fronts this.
            - name: webhook
              containerPort: {{ .Values.triggers.webhook.port }}
              protocol: TCP
            {{- end }}
            # M21 — substrate health (`/healthz`, `/metrics`). Always
            # exposed; the v0.1.x livenessProbe wiring lives in a
            # follow-up commit (the surface itself is non-breaking).
            - name: healthz
              containerPort: {{ .Values.substrateHealth.port }}
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: KAGENT_WATCH_NAMESPACE
              value: {{ ternary "" (.Values.watchNamespace | default .Release.Namespace) .Values.watchAllNamespaces | quote }}
            # Plumb agent-pod image + runtime config through to the
            # reconcile loop, which forwards them as env into every
            # spawned pod via BuildJobSpecOptions.
            - name: KAGENT_AGENT_POD_IMAGE
              value: {{ include "kagent-operator.agentPod.image" . | quote }}
            - name: KAGENT_AGENT_POD_IMAGE_PULL_POLICY
              value: {{ .Values.agentPod.image.pullPolicy | quote }}
            - name: KAGENT_AGENT_POD_IMAGE_PULL_SECRET
              value: {{ .Values.agentPod.imagePullSecret | quote }}
            - name: KAGENT_AGENT_POD_SERVICE_ACCOUNT
              value: {{ .Values.agentPod.serviceAccountName | quote }}
            {{- with .Values.agentPod.nodeSelector }}
            # Placement for spawned AgentTask pods. JSON-encoded so the
            # operator can parse and apply it to Job pod templates.
            - name: KAGENT_AGENT_POD_NODE_SELECTOR_JSON
              value: {{ . | toJson | quote }}
            {{- end }}
            {{- with .Values.agentPod.litellmBaseUrl }}
            - name: KAGENT_AGENT_POD_LITELLM_BASE_URL
              value: {{ . | quote }}
            {{- end }}
            # WS-A: prefer secret-ref over plaintext for the LiteLLM API
            # key. When `secretName` is set, env is sourced from a Secret
            # so the operator never holds the plaintext at rest in its
            # spec. When only `value` is set, render the plaintext env
            # (deprecated; NOTES.txt prints a loud warning). Otherwise
            # omit the env entirely.
            #
            # v0.1.8 secret-hygiene: in addition to the resolved value,
            # we expose the original Secret coordinates as side env
            # vars (`<NAME>_SECRET_NAME` + `<NAME>_SECRET_KEY`). The
            # operator's `buildJobSpecOptionsFromEnv` reads these and
            # forwards them as `valueFrom.secretKeyRef` on every
            # spawned agent Job's env — keeping the plaintext out of
            # the spawned Job's etcd object. See `pushSensitiveEnv` in
            # `packages/operator/src/main.ts`.
            {{- if .Values.agentPod.litellmApiKey.secretName }}
            - name: KAGENT_AGENT_POD_LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agentPod.litellmApiKey.secretName | quote }}
                  key: {{ .Values.agentPod.litellmApiKey.secretKey | quote }}
            - name: KAGENT_AGENT_POD_LITELLM_API_KEY_SECRET_NAME
              value: {{ .Values.agentPod.litellmApiKey.secretName | quote }}
            - name: KAGENT_AGENT_POD_LITELLM_API_KEY_SECRET_KEY
              value: {{ .Values.agentPod.litellmApiKey.secretKey | quote }}
            {{- else if .Values.agentPod.litellmApiKey.value }}
            - name: KAGENT_AGENT_POD_LITELLM_API_KEY
              value: {{ .Values.agentPod.litellmApiKey.value | quote }}
            {{- end }}
            {{- with .Values.agentPod.otlpEndpoint }}
            - name: KAGENT_AGENT_POD_OTLP_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            # OTLP headers — same secret-ref shape as litellmApiKey,
            # including the v0.1.8 _SECRET_NAME / _SECRET_KEY hints
            # the operator forwards into every spawned Job's env as
            # `valueFrom.secretKeyRef` for OTEL_EXPORTER_OTLP_HEADERS.
            {{- if .Values.agentPod.otlpHeaders.secretName }}
            - name: KAGENT_AGENT_POD_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agentPod.otlpHeaders.secretName | quote }}
                  key: {{ .Values.agentPod.otlpHeaders.secretKey | quote }}
            - name: KAGENT_AGENT_POD_OTLP_HEADERS_SECRET_NAME
              value: {{ .Values.agentPod.otlpHeaders.secretName | quote }}
            - name: KAGENT_AGENT_POD_OTLP_HEADERS_SECRET_KEY
              value: {{ .Values.agentPod.otlpHeaders.secretKey | quote }}
            {{- else if .Values.agentPod.otlpHeaders.value }}
            - name: KAGENT_AGENT_POD_OTLP_HEADERS
              value: {{ .Values.agentPod.otlpHeaders.value | quote }}
            {{- end }}
            {{- with .Values.agentPod.traceContentMode }}
            - name: KAGENT_AGENT_POD_TRACE_CONTENT_MODE
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.agentPod.artifactStorage.enabled }}
            # Artifact PVC plumbing (Phase 5 / P3) — operator's
            # buildJobSpecOptionsFromEnv reads these and adds a
            # `volumes:`/`volumeMounts:` pair on every spawned agent
            # Job so the in-pod `write_artifact` tool can persist
            # outputs under <mountPath>/<task-uid>/<name>.
            - name: KAGENT_ARTIFACT_PVC_NAME
              value: {{ .Values.agentPod.artifactStorage.pvcName | quote }}
            - name: KAGENT_ARTIFACT_MOUNT_PATH
              value: {{ .Values.agentPod.artifactStorage.mountPath | quote }}
            {{- with .Values.agentPod.artifactStorage.maxBytes }}
            # v0.1 P3 wire-up — per-write byte cap forwarded onto every
            # spawned Job's env. The agent-pod's write_artifact tool
            # refuses any single artifact larger than this. Omitted when
            # 0 / -1 / unset so the agent-pod falls back to its
            # compiled-in default (25 MiB). `int64` cast prevents Helm
            # from rendering large integers in scientific notation
            # (e.g. 2.62144e+07) which the Number(...) parser in
            # `resolveWriterEnv` would happily accept but a human
            # reading the rendered Job spec would not.
            - name: KAGENT_ARTIFACT_MAX_BYTES
              value: {{ int64 . | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.agent.modelClasses }}
            # Phase-2 modelClass — substrate-level model routing.
            # `Agent.spec.modelClass` (logical capability tier) →
            # physical model id resolution map. The operator parses
            # this JSON once at boot via `parseModelClassesEnv` and
            # threads the map onto every BuildJobSpecOptions; the
            # in-spec `resolveAgentModel` translates `spec.modelClass`
            # to a physical model id at AgentTask materialization. See
            # docs/MODEL-ROUTING.md.
            #
            # Omitted entirely when `agent.modelClasses` is empty/unset
            # so the operator's parser sees `undefined` (treated as
            # `{}`) instead of choking on a JSON literal `{}` that the
            # chart would otherwise render unconditionally.
            #
            # M5 — `mustToJson` (not `toJson`): a Helm-side typo or
            # malformed value (e.g. `physical: [null]`) now fails at
            # `helm install` / `helm template` time with a structured
            # error, instead of rendering invalid JSON that the
            # operator's parser would CrashLoopBackoff on at pod boot.
            # See evidence/audit-rev2/C1.md M5.
            - name: KAGENT_AGENT_MODEL_CLASSES_JSON
              value: {{ .Values.agent.modelClasses | mustToJson | quote }}
            {{- end }}
            {{- if .Values.cas.enabled }}
            # Wave 1 — CAS
            # v0.2.2-cas content-addressed storage. The operator runs
            # the GC sweep against KAGENT_CAS_MOUNT_PATH; the agent-pod
            # consumes the same env via the CAS-aware
            # `buildArtifactMounts` helper. The GC controller is
            # gated on KAGENT_CAS_ENABLED so this whole block stays
            # off by default.
            - name: KAGENT_CAS_ENABLED
              value: "true"
            - name: KAGENT_CAS_PVC_NAME
              value: {{ .Values.cas.pvcName | quote }}
            - name: KAGENT_CAS_MOUNT_PATH
              value: {{ .Values.cas.mountPath | quote }}
            - name: KAGENT_CAS_RETENTION_DEFAULT
              value: {{ .Values.cas.retention.default | quote }}
            - name: KAGENT_CAS_GC_INTERVAL_SECONDS
              value: {{ .Values.cas.gc.intervalSeconds | quote }}
            - name: KAGENT_CAS_GC_DRY_RUN
              value: {{ .Values.cas.gc.dryRun | quote }}
            {{- end }}
            {{- if .Values.cache.enabled }}
            # Wave 3 — Cache
            # v0.4.2-cache per-Agent persistent caches. Operator-side
            # restore-on-boot via init-container; save-on-success via
            # sidecar. Off by default.
            - name: KAGENT_CACHE_ENABLED
              value: "true"
            - name: KAGENT_CACHE_PVC_NAME
              value: {{ .Values.cache.pvcName | quote }}
            - name: KAGENT_CACHE_MOUNT_PATH
              value: {{ .Values.cache.mountPath | quote }}
            - name: KAGENT_CACHE_RETENTION_DEFAULT
              value: {{ .Values.cache.defaultRetention | quote }}
            - name: KAGENT_CACHE_HELPER_IMAGE
              value: {{ .Values.cache.helperImage | quote }}
            {{- end }}
            # WS-A — security context defaults for spawned agent pods.
            # Operator's main.ts buildJobSpecOptionsFromEnv parses these
            # JSON envs and threads them into BuildJobSpecOptions so
            # every Job rendered by the operator carries the same
            # security baseline. Cluster operators override via
            # `agentPodSecurityContext.{pod,container}` in values.yaml.
            {{- if .Values.agentPodSecurityContext.pod }}
            - name: KAGENT_AGENT_POD_SECURITY_CONTEXT
              value: {{ .Values.agentPodSecurityContext.pod | toJson | quote }}
            {{- end }}
            {{- if .Values.agentPodSecurityContext.container }}
            - name: KAGENT_AGENT_POD_CONTAINER_SECURITY_CONTEXT
              value: {{ .Values.agentPodSecurityContext.container | toJson | quote }}
            {{- end }}
            {{- with .Values.agentPod.runtimeClasses.default }}
            # RuntimeClass mapping (WS-C). The operator's
            # buildJobSpecOptionsFromEnv reads these and resolves
            # Agent.spec.sandboxProfile per-task. Empty values are
            # omitted entirely so the pod spec falls back to the
            # cluster default RuntimeClass.
            - name: KAGENT_RUNTIME_CLASS_DEFAULT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.agentPod.runtimeClasses.strict }}
            - name: KAGENT_RUNTIME_CLASS_STRICT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.agentPod.builtinTools.httpAllowDomains }}
            # Built-in tool HTTP allowlist (Phase 5 / P2). Joined into a
            # comma-separated KAGENT_AGENT_POD_HTTP_ALLOW_DOMAINS env on
            # the operator; operator's buildJobSpecOptionsFromEnv re-emits
            # this verbatim as KAGENT_BUILTIN_TOOLS_HTTP_ALLOW_DOMAINS on
            # every spawned agent Job, which the agent-pod's
            # builtin-tools.ts parses with default-deny semantics.
            - name: KAGENT_AGENT_POD_HTTP_ALLOW_DOMAINS
              value: {{ join "," . | quote }}
            {{- end }}
            # WS-K — substrate kill switch for the in-pod
            # spawn_child_task tool. The operator forwards this verbatim
            # into spawned Jobs (env-rename to KAGENT_SPAWN_CHILD_ENABLED
            # via buildJobSpecOptionsFromEnv). Default OFF in chart values
            # so an install where the value isn't deliberately set stays
            # free of the substrate write tool. Per-Agent guardrails
            # (allowedChildAgents, maxConcurrentChildren) are the
            # application-layer trust boundary.
            - name: KAGENT_AGENT_POD_SPAWN_CHILD_ENABLED
              value: {{ .Values.agentPod.spawnChild.enabled | ternary "true" "false" | quote }}
            # v0.1.9 — cluster-level depth cap for the spawn_child_task
            # tool. Read by the in-pod tool's Guardrail 0 + the
            # operator's admission reconciler (see admission.ts).
            # Forwarded into spawned Jobs verbatim; the in-pod tool's
            # main.ts parses it and falls back to its own default (4)
            # when malformed.
            {{- if .Values.agentPod.maxDepth }}
            - name: KAGENT_AGENT_POD_MAX_DEPTH
              value: {{ .Values.agentPod.maxDepth | quote }}
            {{- end }}
            # WS-M — substrate kill switch + URL plumbing for the in-pod
            # ensure_agent_from_template tool. The operator boots the
            # template-server when this is `true`; the agent-pod gets
            # the in-cluster Service URL via KAGENT_TEMPLATE_SERVER_URL.
            # Default OFF for the same provably-write-proof posture as
            # spawnChild (an install where this is not deliberately set
            # exposes neither tool nor server).
            - name: KAGENT_TEMPLATES_ENABLED
              value: {{ .Values.agentPod.templates.enabled | ternary "true" "false" | quote }}
            - name: KAGENT_TEMPLATE_SERVER_PORT
              value: {{ .Values.agentPod.templates.serverPort | quote }}
            {{- if .Values.agentPod.templates.enabled }}
            - name: KAGENT_AGENT_POD_TEMPLATE_SERVER_URL
              value: 'http://{{ include "kagent-operator.fullname" . }}-templates.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.agentPod.templates.serverPort }}'
            {{- end }}
            # Wave 5 / GA hardening — per-task capability JWT minting.
            # When enabled, the operator reads the chart-mounted signing
            # Secret, mints a Secret per AgentTask, mounts it into the
            # spawned Job, and serves JWKS from the template-server port.
            - name: KAGENT_CAPABILITIES_ENABLED
              value: {{ .Values.capabilities.enabled | ternary "true" "false" | quote }}
            {{- if .Values.capabilities.enabled }}
            - name: KAGENT_CAP_SIGNING_KEY_FILE
              value: '/var/kagent/cap-ca/{{ .Values.capabilities.signingKeyKey }}'
            - name: KAGENT_CAP_SIGNING_PUB_FILE
              value: '/var/kagent/cap-ca/{{ .Values.capabilities.signingPublicKeyKey }}'
            {{- with .Values.capabilities.previousPublicKeyKey }}
            - name: KAGENT_CAP_SIGNING_PREV_PUB_FILE
              value: '/var/kagent/cap-ca/{{ . }}'
            {{- end }}
            {{- with .Values.capabilities.alg }}
            - name: KAGENT_CAP_SIGNING_ALG
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.capabilities.kid }}
            - name: KAGENT_CAP_SIGNING_KID
              value: {{ . | quote }}
            {{- end }}
            - name: KAGENT_CAP_ISSUER
              value: {{ .Values.capabilities.issuer | quote }}
            - name: KAGENT_CAP_JWT_FILE
              value: {{ .Values.capabilities.jwtFile | quote }}
            - name: KAGENT_CAP_JWKS_URL
              value: {{ default (printf "http://%s-templates.%s.svc.cluster.local:%v/.well-known/jwks.json" (include "kagent-operator.fullname" .) .Release.Namespace .Values.agentPod.templates.serverPort) .Values.capabilities.jwksUrl | quote }}
            {{- end }}
            # Audit C2.1 BLOCKER #1 (docs/AUDIT-2026-05-06.md) —
            # capability mount required-by-default. Projected onto the
            # operator and forwarded onto every spawned agent-pod via
            # `buildJobSpecOptionsFromEnv` so the agent-pod's
            # `loadCapabilityOptional` reads the same source of truth.
            # Default `false` (loud-fail when KAGENT_CAP_JWT_FILE is
            # set + the file is missing); `true` is the documented
            # opt-out and surfaces a runtime WARN on the agent-pod.
            - name: KAGENT_CAPABILITY_ALLOW_MISSING
              value: {{ .Values.agentPod.capability.allowMissing | ternary "true" "false" | quote }}
            # v0.1.9 context-awareness — substrate-side circuit breaker
            # + detector trigger thresholds. Projected onto the operator
            # deployment; `buildJobSpecOptionsFromEnv` forwards both
            # verbatim onto every spawned agent-pod's env. The in-pod
            # agent-loop reads `KAGENT_CONTEXT_SAFETY_THRESHOLD` (Piece
            # 3, default 0.95) and `KAGENT_CONTEXT_PRESSURE_THRESHOLD`
            # (Piece 4, default 0.7) — see docs/CONTEXT-AWARENESS.md §4.1.
            # Both are no-ops when the resolved class entry doesn't
            # declare `contextWindowTokens`.
            - name: KAGENT_CONTEXT_SAFETY_THRESHOLD
              value: {{ .Values.agentPod.contextSafetyThreshold | quote }}
            - name: KAGENT_CONTEXT_PRESSURE_THRESHOLD
              value: {{ .Values.agentPod.contextPressureThreshold | quote }}
            # v0.1.6 — Langfuse-managed prompt fetcher. When enabled,
            # spawned agent-pods inherit KAGENT_LANGFUSE_HOST + creds
            # (forwarded by job-spec.ts via this same set of env vars)
            # and fetch Agent.spec.systemPromptRef bodies at boot.
            {{- if .Values.langfuse.enabled }}
            - name: KAGENT_AGENT_POD_LANGFUSE_HOST
              value: {{ .Values.langfuse.host | quote }}
            # v0.1.7-rig.2 — also expose the unprefixed env names for
            # the operator's OWN Langfuse fetcher (verifier reconciler's
            # llmJudgePromptRef path). Without these, the verifier
            # fail-closes with `verifier_misconfig:langfuse_unconfigured`
            # because process.env.KAGENT_LANGFUSE_HOST is unset on the
            # operator pod (only the AGENT_POD-prefixed forwarding
            # vars exist).
            - name: KAGENT_LANGFUSE_HOST
              value: {{ .Values.langfuse.host | quote }}
            {{- if .Values.langfuse.apiKey.secretName }}
            - name: KAGENT_AGENT_POD_LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.langfuse.apiKey.secretName | quote }}
                  key: {{ .Values.langfuse.apiKey.publicKeyKey | quote }}
            - name: KAGENT_LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.langfuse.apiKey.secretName | quote }}
                  key: {{ .Values.langfuse.apiKey.publicKeyKey | quote }}
            # v0.1.8 secret-hygiene hints — operator forwards public +
            # secret Langfuse keys to every spawned Job as
            # `valueFrom.secretKeyRef`.
            - name: KAGENT_AGENT_POD_LANGFUSE_PUBLIC_KEY_SECRET_NAME
              value: {{ .Values.langfuse.apiKey.secretName | quote }}
            - name: KAGENT_AGENT_POD_LANGFUSE_PUBLIC_KEY_SECRET_KEY
              value: {{ .Values.langfuse.apiKey.publicKeyKey | quote }}
            - name: KAGENT_AGENT_POD_LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.langfuse.apiKey.secretName | quote }}
                  key: {{ .Values.langfuse.apiKey.secretKeyKey | quote }}
            - name: KAGENT_LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.langfuse.apiKey.secretName | quote }}
                  key: {{ .Values.langfuse.apiKey.secretKeyKey | quote }}
            - name: KAGENT_AGENT_POD_LANGFUSE_SECRET_KEY_SECRET_NAME
              value: {{ .Values.langfuse.apiKey.secretName | quote }}
            - name: KAGENT_AGENT_POD_LANGFUSE_SECRET_KEY_SECRET_KEY
              value: {{ .Values.langfuse.apiKey.secretKeyKey | quote }}
            {{- end }}
            {{- end }}
            # LLM gateway integration (spec §3.2). When enabled, the
            # operator (a) suspends new Jobs on creation and runs the
            # admission reconciler against ModelEndpoint capacity, AND
            # (b) injects KAGENT_LLM_GATEWAY_BASE_URL into spawned
            # agent-pods so they route LLM calls through the gateway.
            # Default OFF — kagent works without the gateway.
            - name: KAGENT_ADMISSION_CONTROL_ENABLED
              value: {{ .Values.llmGateway.enabled | ternary "true" "false" | quote }}
            {{- if .Values.llmGateway.enabled }}
            - name: KAGENT_LLM_GATEWAY_BASE_URL
              value: {{ .Values.llmGateway.baseUrl | quote }}
            {{- if .Values.llmGateway.apiKey.secretName }}
            - name: KAGENT_LLM_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llmGateway.apiKey.secretName | quote }}
                  key: {{ .Values.llmGateway.apiKey.secretKey | quote }}
            # v0.1.8 secret-hygiene hints — operator forwards as
            # `valueFrom.secretKeyRef` on the spawned Job's
            # KAGENT_LITELLM_API_KEY when the gateway path is active.
            - name: KAGENT_LLM_GATEWAY_API_KEY_SECRET_NAME
              value: {{ .Values.llmGateway.apiKey.secretName | quote }}
            - name: KAGENT_LLM_GATEWAY_API_KEY_SECRET_KEY
              value: {{ .Values.llmGateway.apiKey.secretKey | quote }}
            {{- end }}
            {{- end }}
            # Wave 0 sub-team Audit (v0.1.15-audit-stream). When enabled
            # (default true), the operator builds an AuditPublisher and
            # connects to NATS lazily. The connect path is best-effort:
            # an unreachable NATS does NOT break the operator (publish()
            # logs warning + no-ops per the @kagent/audit-events
            # graceful-degrade contract). Stream provisioning lives in
            # `templates/audit-stream.yaml` (a Helm post-install hook).
            {{- if .Values.audit.enabled }}
            - name: KAGENT_AUDIT_NATS_URL
              value: {{ .Values.audit.natsUrl | quote }}
            {{- end }}
            # M21 — substrate health (`/healthz`, `/metrics`) +
            # informer freshness threshold. The operator boots an HTTP
            # server on `KAGENT_HEALTHZ_PORT`; `KAGENT_INFORMER_FRESHNESS_MAX_MS`
            # controls when /healthz flips to 503 STALE. See
            # `substrate-health.ts`.
            {{- with .Values.substrateHealth }}
            - name: KAGENT_HEALTHZ_PORT
              value: {{ .port | quote }}
            - name: KAGENT_INFORMER_FRESHNESS_MAX_MS
              value: {{ .freshnessMaxMs | quote }}
            {{- end }}
            # Wave 0 sub-team Entry — KagentSchedule controller +
            # HMAC-signed webhook receiver. The flag toggles both
            # routes; `triggers.webhook.port` controls the webhook
            # listener (default 8088 — matches the deployment port
            # block above). Default OFF — install where the value is
            # not deliberately set exposes neither schedule informer
            # nor webhook port.
            - name: KAGENT_TRIGGERS_ENABLED
              value: {{ .Values.triggers.enabled | ternary "true" "false" | quote }}
            {{- if .Values.triggers.enabled }}
            - name: KAGENT_TRIGGERS_WEBHOOK_ENABLED
              value: "true"
            - name: KAGENT_TRIGGERS_WEBHOOK_PORT
              value: {{ .Values.triggers.webhook.port | quote }}
            {{- end }}
            # ---------------------------------------------------------------
            # Wave 1 — Workspace
            # ---------------------------------------------------------------
            # When `workspaces.enabled=true`, the operator runs the
            # RWX storage-class probe at startup AND boots the
            # Workspace controller's informer triplet. A failed probe
            # leaves Workspace CRs in `phase: Pending` rather than
            # crashing; ops sees the failure in operator logs.
            # `defaultStorageClassName` (when set) is forwarded to PVC
            # builds for any Workspace that doesn't set its own
            # `spec.pvc.storageClassName`.
            - name: KAGENT_WORKSPACES_ENABLED
              value: {{ .Values.workspaces.enabled | ternary "true" "false" | quote }}
            {{- with .Values.workspaces.defaultStorageClassName }}
            - name: KAGENT_WORKSPACES_DEFAULT_STORAGE_CLASS
              value: {{ . | quote }}
            {{- end }}
            # ---------------------------------------------------------------
            # Wave 2 — Supervision
            # ---------------------------------------------------------------
            # When `supervision.enabled=true` (default), the operator
            # routes every AgentTask phase=Failed through the
            # supervision-router (see packages/operator/src/supervision-router.ts).
            # The default strategy + max-restarts cap apply when an
            # Agent doesn't declare `supervisionStrategy` /
            # `maxRestarts` in its CR.
            - name: KAGENT_SUPERVISION_ENABLED
              value: {{ .Values.supervision.enabled | ternary "true" "false" | quote }}
            - name: KAGENT_SUPERVISION_DEFAULT_STRATEGY
              value: {{ .Values.supervision.defaultStrategy | quote }}
            - name: KAGENT_SUPERVISION_MAX_RESTARTS
              value: {{ .Values.supervision.maxRestarts.default | quote }}
            # Audit-rev2 L4: env-overridable escalation-depth cap; default
            # 8 is the substrate floor. Bad values fall back at the
            # operator with a warn-log (see resolveMaxEscalationDepth).
            {{- if hasKey .Values.supervision "maxEscalationDepth" }}
            - name: KAGENT_SUPERVISION_MAX_ESCALATION_DEPTH
              value: {{ .Values.supervision.maxEscalationDepth | quote }}
            {{- end }}
            # ---------------------------------------------------------------
            # v0.1.7-rig.2 — Substrate verifier reconciler
            # ---------------------------------------------------------------
            # When `verifier.enabled=true`, the operator boots the
            # verifier reconciler (packages/operator/src/verifier.ts)
            # alongside the existing AgentTask informer. Two dispatch
            # paths: scriptRef (Job spawn) + llmJudgePromptRef
            # (gateway POST). The reconciler reuses the operator's
            # existing KAGENT_LLM_GATEWAY_BASE_URL + KAGENT_LANGFUSE_*
            # envs, so this block only adds the verifier-specific
            # knobs.
            - name: KAGENT_VERIFIER_ENABLED
              value: {{ .Values.verifier.enabled | ternary "true" "false" | quote }}
            {{- if .Values.verifier.enabled }}
            {{- if .Values.verifier.defaultModel }}
            - name: KAGENT_VERIFIER_DEFAULT_MODEL
              value: {{ .Values.verifier.defaultModel | quote }}
            {{- end }}
            {{- if .Values.verifier.scriptImage }}
            - name: KAGENT_VERIFIER_SCRIPT_IMAGE
              value: {{ .Values.verifier.scriptImage | quote }}
            {{- end }}
            {{- end }}
            # ---------------------------------------------------------------
            # Wave 2 — Workflows
            # ---------------------------------------------------------------
            # AgentWorkflow controller (per docs/SUBSTRATE-V1.md §3.3 +
            # docs/WAVES.md §4.3). When `workflows.enabled=true`, the
            # operator boots the AgentWorkflow controller's informer
            # triplet (AgentWorkflow + label-selected Deployment +
            # label-selected Service) and registers each workflow
            # image with Restate via the admin API at reconcile time.
            #
            # Restate is NOT installed by this chart in v0.3.2 —
            # operators install Restate independently via the upstream
            # `restatedev/restate-helm` chart and point the addresses
            # below at the resulting Service. v0.5 will lift a
            # single-node Restate sub-chart inline; until then,
            # KAGENT_WORKFLOWS_RESTATE_ADDRESS / _ADMIN_ADDRESS are the
            # contract.
            - name: KAGENT_WORKFLOWS_ENABLED
              value: {{ .Values.workflows.enabled | ternary "true" "false" | quote }}
            {{- if .Values.workflows.enabled }}
            - name: KAGENT_WORKFLOWS_RESTATE_ADDRESS
              value: {{ .Values.workflows.restate.address | quote }}
            - name: KAGENT_WORKFLOWS_RESTATE_ADMIN_ADDRESS
              value: {{ .Values.workflows.restate.adminAddress | quote }}
            {{- end }}
            # ---------------------------------------------------------------
            # Wave 3 — Locality
            # ---------------------------------------------------------------
            # NodeAffinity from Workspace placement (`enabled`),
            # speculative execution (`speculative.enabled`), and
            # pod-pressure circuit breaker (`circuitBreaker.enabled`).
            - name: KAGENT_LOCALITY_ENABLED
              value: {{ .Values.locality.enabled | ternary "true" "false" | quote }}
            - name: KAGENT_LOCALITY_SPECULATIVE_ENABLED
              value: {{ .Values.locality.speculative.enabled | ternary "true" "false" | quote }}
            - name: KAGENT_LOCALITY_SPECULATIVE_THRESHOLD
              value: {{ .Values.locality.speculative.threshold | quote }}
            - name: KAGENT_LOCALITY_CIRCUIT_BREAKER_ENABLED
              value: {{ .Values.locality.circuitBreaker.enabled | ternary "true" "false" | quote }}
            - name: KAGENT_LOCALITY_MAX_PENDING_PODS
              value: {{ .Values.locality.circuitBreaker.maxPendingPods | quote }}
            # ---------------------------------------------------------------
            # Wave 3 — Identity (v0.4.3-identity)
            # ---------------------------------------------------------------
            # SPIFFE/SPIRE per-pod SVID issuance. When
            # `identity.enabled=true`, the embedded SPIRE sub-chart at
            # `charts/spire/` is rendered. Spawned agent-pods get
            # hostPath volumeMount on SPIRE Agent's Workload-API UDS +
            # KAGENT_LITELLM_USE_SVID=true → mTLS LLM client.
            - name: KAGENT_IDENTITY_ENABLED
              value: {{ .Values.identity.enabled | ternary "true" "false" | quote }}
            {{- if .Values.identity.enabled }}
            - name: KAGENT_IDENTITY_TRUST_DOMAIN
              value: {{ .Values.identity.trustDomain | quote }}
            - name: KAGENT_IDENTITY_MOCK_ENABLED
              value: {{ .Values.identity.mock.enabled | ternary "true" "false" | quote }}
            - name: KAGENT_AGENT_POD_LITELLM_USE_SVID
              value: {{ and .Values.identity.litellmUseSvid (not .Values.identity.mock.enabled) | ternary "true" "false" | quote }}
            - name: KAGENT_AGENT_POD_SPIRE_HOST_SOCKET_DIR
              value: {{ .Values.identity.hostSocketDir | quote }}
            - name: KAGENT_AGENT_POD_SPIRE_SOCKET_PATH
              value: {{ .Values.identity.podSocketPath | quote }}
            {{- end }}
            # ---------------------------------------------------------------
            # Wave 3 — Blackboard
            # ---------------------------------------------------------------
            # v0.4.1-blackboard. Per-task-tree NATS JetStream KV
            # bucket lifecycle on the operator side; per-Job
            # KAGENT_BLACKBOARD_BUCKET stamping in job-spec.ts.
            - name: KAGENT_BLACKBOARD_ENABLED
              value: {{ .Values.blackboard.enabled | ternary "true" "false" | quote }}
            # Audit-rev2 M12 follow-up — blackboard cap-claim trapdoor.
            # `agentPod.blackboard.failOpen=true` (gated at chart-render
            # time by `agentPod.blackboard.acknowledgeUnsafe=true`)
            # flips every spawned agent-pod's blackboard cap-claim
            # default to {read: ['*'], write: ['*']}. Forwarded onto
            # the operator deployment as KAGENT_AGENT_POD_BLACKBOARD_FAIL_OPEN
            # — main.ts:buildJobSpecOptionsFromEnv() re-emits as
            # KAGENT_BLACKBOARD_FAIL_OPEN onto every spawned Job.
            # Default false (stays unset on every spawned pod);
            # agent-pod main.ts treats only the literal "true" as on.
            {{- if and .Values.agentPod.blackboard (eq (default false .Values.agentPod.blackboard.failOpen) true) }}
            - name: KAGENT_AGENT_POD_BLACKBOARD_FAIL_OPEN
              value: "true"
            {{- end }}
            # ---------------------------------------------------------------
            # Wave 3 — Events
            # ---------------------------------------------------------------
            # Typed pub/sub on `kagent.events.*` JetStream stream per
            # docs/SUBSTRATE-V1.md §3.7 + docs/WAVES.md §5.1. When
            # enabled, the operator opens a NATS connection,
            # provisions the `kagent-events` stream idempotently,
            # and registers a durable pull-consumer per
            # `Agent.spec.subscribes[]` entry. On event delivery,
            # mints an AgentTask (with the event payload bound to
            # `inputs[trigger.inputBinding]` when declared, or
            # forwarded as `spec.payload` otherwise).
            #
            # Cap-claim subset checks gate every consumer registration
            # — defense-in-depth on top of admission's gate. The
            # `publish_event` agent-pod tool reads
            # KAGENT_EVENTS_NATS_URL via the per-Job env (forwarded
            # by the operator into spawned Jobs when events are
            # enabled).
            - name: KAGENT_EVENTS_ENABLED
              value: {{ .Values.events.enabled | ternary "true" "false" | quote }}
            {{- if .Values.events.enabled }}
            - name: KAGENT_EVENTS_NATS_URL
              value: {{ .Values.events.natsUrl | quote }}
            - name: KAGENT_EVENTS_RETENTION_MAX_AGE_MS
              value: {{ .Values.events.retention.maxAgeMs | quote }}
            - name: KAGENT_EVENTS_STREAM_REPLICAS
              value: {{ .Values.events.streamReplicas | quote }}
            - name: KAGENT_EVENTS_REAPPLY_INTERVAL_MS
              value: {{ .Values.events.reapplyIntervalMs | quote }}
            {{- end }}
            # ---------------------------------------------------------------
            # Wave 4 — Tenancy (v0.5.0-tenancy)
            # ---------------------------------------------------------------
            # When `tenancy.enabled=true`, the operator runs the
            # Tenant controller (cluster-scoped informer) and threads
            # `claims.tenant` into every minted cap bundle. The
            # agent-pod stamps `X-Kagent-Tenant` on every gateway call
            # per docs/GATEWAY-CONTRACT.md §3. Default-OFF for gradual
            # roll-out — existing single-tenant installs continue
            # working unchanged.
            - name: KAGENT_TENANCY_ENABLED
              value: {{ .Values.tenancy.enabled | ternary "true" "false" | quote }}
            {{- with .Values.tenancy.defaultTenant }}
            - name: KAGENT_TENANCY_DEFAULT_TENANT
              value: {{ . | quote }}
            {{- end }}
            # ---------------------------------------------------------------
            # Wave 4 — Egress (v0.5.1-egress)
            # ---------------------------------------------------------------
            - name: KAGENT_EGRESS_ENABLED
              value: {{ .Values.egress.enabled | ternary "true" "false" | quote }}
            - name: KAGENT_EGRESS_MODE
              value: {{ .Values.egress.mode | default "auto" | quote }}
            # ---------------------------------------------------------------
            # Wave 4 — Quotas (v0.5.2-quotas)
            # ---------------------------------------------------------------
            - name: KAGENT_QUOTAS_ENABLED
              value: {{ .Values.quotas.enabled | ternary "true" "false" | quote }}
            - name: KAGENT_QUOTAS_DEFAULT_GATEWAY_INFLIGHT_CAP
              value: {{ .Values.quotas.defaultGatewayInFlightCap | quote }}
            - name: KAGENT_QUOTAS_DEFAULT_CAS_BYTES_GIB
              value: {{ .Values.quotas.defaultCasBytesGiB | quote }}
            - name: KAGENT_QUOTAS_CAS_WALK_INTERVAL_MINUTES
              value: {{ .Values.quotas.casWalkIntervalMinutes | quote }}
            # ---------------------------------------------------------------
            # Wave 4 — Versioning (v0.5.3-versioning)
            # ---------------------------------------------------------------
            - name: KAGENT_VERSIONING_ENABLED
              value: {{ .Values.versioning.enabled | ternary "true" "false" | quote }}
            {{- if .Values.versioning.enabled }}
            - name: KAGENT_VERSIONING_WEBHOOK_PORT
              value: {{ .Values.versioning.webhook.port | quote }}
            {{- end }}
            # ---------------------------------------------------------------
            # Wave 4 — KeyRotation (v0.5.4-keyrotation)
            # ---------------------------------------------------------------
            - name: KAGENT_KEYROTATION_ENABLED
              value: {{ .Values.keyRotation.enabled | ternary "true" "false" | quote }}
            {{- if .Values.keyRotation.enabled }}
            - name: KAGENT_KEYROTATION_SVID_INTERVAL_HOURS
              value: {{ .Values.keyRotation.svid.intervalHours | quote }}
            - name: KAGENT_KEYROTATION_CAP_SHORT_TTL_MINUTES
              value: {{ .Values.keyRotation.cap.shortTtlMinutes | quote }}
            - name: KAGENT_KEYROTATION_CAP_LONG_GRACE_SECONDS
              value: {{ .Values.keyRotation.cap.longTtlGraceSeconds | quote }}
            - name: KAGENT_KEYROTATION_GATEWAY_ENABLED
              value: {{ .Values.keyRotation.gateway.enabled | ternary "true" "false" | quote }}
            {{- if .Values.keyRotation.gateway.enabled }}
            - name: KAGENT_KEYROTATION_GATEWAY_INTERVAL_HOURS
              value: {{ .Values.keyRotation.gateway.intervalHours | quote }}
            {{- end }}
            {{- end }}
          {{- if and .Values.triggers.enabled .Values.triggers.secrets }}
          # Per-trigger HMAC secrets sourced from the chart-managed
          # `<release>-trigger-secrets` Secret (see webhook-secret.yaml).
          # The key naming convention `KAGENT_TRIGGER_SECRET_<UPPER_ID>`
          # is read by triggers-bootstrap.ts's resolveTriggerSecret.
          envFrom:
            - secretRef:
                name: {{ include "kagent-operator.fullname" . }}-trigger-secrets
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Operator's livenessProbe wired in Phase 3 once a /healthz
          # endpoint exists. For v0.1, restartPolicy + watch retry is
          # sufficient.
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
