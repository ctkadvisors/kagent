{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

Operator Deployment. Single replica in v0.1 — leader election lands
in v0.2 if multi-replica becomes useful (the watch loop is currently
not coordination-aware).

WS-F single-replica enforcement:
  - `replicaCount` MUST be 1 (asserted at template-time below).
  - `strategy: Recreate` so a rolling update never has two operator
    replicas live concurrently.

Why we need both: the reconcile loop is informer-driven; if two
replicas were ever both watching, both would race the dispatch
sequence (suspended-create → publish → annotate → unsuspend). The
NATS-Msg-Id dedupe in NatsDispatcher protects the bus, but the
Job-create / patch sequence still doesn't tolerate true concurrency.
Until leader election (v0.2) lands, single-replica is the only safe
deployment.
*/}}

{{/* Hard-fail at template time on any replicaCount != 1. The audit
flagged that operators sometimes hand-edit values to scale up; this
turns that into a clear, actionable error rather than a silent race. */}}
{{- if ne (.Values.replicaCount | int) 1 }}
{{- fail "kagent-operator: replicaCount must be 1 in v0.1; multi-replica requires leader election (v0.2)" }}
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kagent-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Recreate (not RollingUpdate). A rolling update would briefly run
  # two replicas; with no leader election in v0.1 that means two
  # reconcilers racing each other on the same AgentTask. Recreate
  # accepts a brief downtime window in exchange for never having two
  # operators alive at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "kagent-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kagent-operator.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kagent-operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # WS-A pod security baseline. Overrideable via
      # `.Values.podSecurityContext`; defaults to non-root + RuntimeDefault
      # seccomp + fsGroup so the operator can read its in-cluster CA bundle.
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # /tmp emptyDir — required because the container runs with
      # readOnlyRootFilesystem=true (see container-level securityContext
      # below). Node 22 + tsx and @kubernetes/client-node both write
      # transient files (token cache, npm cache) under /tmp.
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: operator
          image: {{ include "kagent-operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # WS-A container security baseline. drop ALL caps,
          # readOnlyRootFilesystem, no privilege escalation. Override
          # via `.Values.containerSecurityContext`.
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- if .Values.agentPod.templates.enabled }}
          ports:
            # WS-M template-server. Exposes
            # POST /v1alpha1/templates/{name}:instantiate to in-cluster
            # callers (chiefly agent-pods). ClusterIP-only Service in
            # template-service.yaml fronts this.
            - name: templates
              containerPort: {{ .Values.agentPod.templates.serverPort }}
              protocol: TCP
          {{- end }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: KAGENT_WATCH_NAMESPACE
              value: {{ ternary "" (.Values.watchNamespace | default .Release.Namespace) .Values.watchAllNamespaces | quote }}
            # Plumb agent-pod image + runtime config through to the
            # reconcile loop, which forwards them as env into every
            # spawned pod via BuildJobSpecOptions.
            - name: KAGENT_AGENT_POD_IMAGE
              value: {{ include "kagent-operator.agentPod.image" . | quote }}
            - name: KAGENT_AGENT_POD_IMAGE_PULL_POLICY
              value: {{ .Values.agentPod.image.pullPolicy | quote }}
            - name: KAGENT_AGENT_POD_IMAGE_PULL_SECRET
              value: {{ .Values.agentPod.imagePullSecret | quote }}
            - name: KAGENT_AGENT_POD_SERVICE_ACCOUNT
              value: {{ .Values.agentPod.serviceAccountName | quote }}
            {{- with .Values.agentPod.litellmBaseUrl }}
            - name: KAGENT_AGENT_POD_LITELLM_BASE_URL
              value: {{ . | quote }}
            {{- end }}
            # WS-A: prefer secret-ref over plaintext for the LiteLLM API
            # key. When `secretName` is set, env is sourced from a Secret
            # so the operator never holds the plaintext at rest in its
            # spec. When only `value` is set, render the plaintext env
            # (deprecated; NOTES.txt prints a loud warning). Otherwise
            # omit the env entirely.
            {{- if .Values.agentPod.litellmApiKey.secretName }}
            - name: KAGENT_AGENT_POD_LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agentPod.litellmApiKey.secretName | quote }}
                  key: {{ .Values.agentPod.litellmApiKey.secretKey | quote }}
            {{- else if .Values.agentPod.litellmApiKey.value }}
            - name: KAGENT_AGENT_POD_LITELLM_API_KEY
              value: {{ .Values.agentPod.litellmApiKey.value | quote }}
            {{- end }}
            {{- with .Values.agentPod.otlpEndpoint }}
            - name: KAGENT_AGENT_POD_OTLP_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            # OTLP headers — same secret-ref shape as litellmApiKey.
            {{- if .Values.agentPod.otlpHeaders.secretName }}
            - name: KAGENT_AGENT_POD_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agentPod.otlpHeaders.secretName | quote }}
                  key: {{ .Values.agentPod.otlpHeaders.secretKey | quote }}
            {{- else if .Values.agentPod.otlpHeaders.value }}
            - name: KAGENT_AGENT_POD_OTLP_HEADERS
              value: {{ .Values.agentPod.otlpHeaders.value | quote }}
            {{- end }}
            {{- with .Values.agentPod.traceContentMode }}
            - name: KAGENT_AGENT_POD_TRACE_CONTENT_MODE
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.agentPod.artifactStorage.enabled }}
            # Artifact PVC plumbing (Phase 5 / P3) — operator's
            # buildJobSpecOptionsFromEnv reads these and adds a
            # `volumes:`/`volumeMounts:` pair on every spawned agent
            # Job so the in-pod `write_artifact` tool can persist
            # outputs under <mountPath>/<task-uid>/<name>.
            - name: KAGENT_ARTIFACT_PVC_NAME
              value: {{ .Values.agentPod.artifactStorage.pvcName | quote }}
            - name: KAGENT_ARTIFACT_MOUNT_PATH
              value: {{ .Values.agentPod.artifactStorage.mountPath | quote }}
            {{- end }}
            # WS-A — security context defaults for spawned agent pods.
            # Operator's main.ts buildJobSpecOptionsFromEnv parses these
            # JSON envs and threads them into BuildJobSpecOptions so
            # every Job rendered by the operator carries the same
            # security baseline. Cluster operators override via
            # `agentPodSecurityContext.{pod,container}` in values.yaml.
            {{- if .Values.agentPodSecurityContext.pod }}
            - name: KAGENT_AGENT_POD_SECURITY_CONTEXT
              value: {{ .Values.agentPodSecurityContext.pod | toJson | quote }}
            {{- end }}
            {{- if .Values.agentPodSecurityContext.container }}
            - name: KAGENT_AGENT_POD_CONTAINER_SECURITY_CONTEXT
              value: {{ .Values.agentPodSecurityContext.container | toJson | quote }}
            {{- end }}
            {{- with .Values.agentPod.runtimeClasses.default }}
            # RuntimeClass mapping (WS-C). The operator's
            # buildJobSpecOptionsFromEnv reads these and resolves
            # Agent.spec.sandboxProfile per-task. Empty values are
            # omitted entirely so the pod spec falls back to the
            # cluster default RuntimeClass.
            - name: KAGENT_RUNTIME_CLASS_DEFAULT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.agentPod.runtimeClasses.strict }}
            - name: KAGENT_RUNTIME_CLASS_STRICT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.agentPod.builtinTools.httpAllowDomains }}
            # Built-in tool HTTP allowlist (Phase 5 / P2). Joined into a
            # comma-separated KAGENT_AGENT_POD_HTTP_ALLOW_DOMAINS env on
            # the operator; operator's buildJobSpecOptionsFromEnv re-emits
            # this verbatim as KAGENT_BUILTIN_TOOLS_HTTP_ALLOW_DOMAINS on
            # every spawned agent Job, which the agent-pod's
            # builtin-tools.ts parses with default-deny semantics.
            - name: KAGENT_AGENT_POD_HTTP_ALLOW_DOMAINS
              value: {{ join "," . | quote }}
            {{- end }}
            # WS-K — substrate kill switch for the in-pod
            # spawn_child_task tool. The operator forwards this verbatim
            # into spawned Jobs (env-rename to KAGENT_SPAWN_CHILD_ENABLED
            # via buildJobSpecOptionsFromEnv). Default OFF in chart values
            # so an install where the value isn't deliberately set stays
            # free of the substrate write tool. Per-Agent guardrails
            # (allowedChildAgents, maxConcurrentChildren) are the
            # application-layer trust boundary.
            - name: KAGENT_AGENT_POD_SPAWN_CHILD_ENABLED
              value: {{ .Values.agentPod.spawnChild.enabled | ternary "true" "false" | quote }}
            # v0.1.9 — cluster-level depth cap for the spawn_child_task
            # tool. Read by the in-pod tool's Guardrail 0 + the
            # operator's admission reconciler (see admission.ts).
            # Forwarded into spawned Jobs verbatim; the in-pod tool's
            # main.ts parses it and falls back to its own default (4)
            # when malformed.
            {{- if .Values.agentPod.maxDepth }}
            - name: KAGENT_AGENT_POD_MAX_DEPTH
              value: {{ .Values.agentPod.maxDepth | quote }}
            {{- end }}
            # WS-M — substrate kill switch + URL plumbing for the in-pod
            # ensure_agent_from_template tool. The operator boots the
            # template-server when this is `true`; the agent-pod gets
            # the in-cluster Service URL via KAGENT_TEMPLATE_SERVER_URL.
            # Default OFF for the same provably-write-proof posture as
            # spawnChild (an install where this is not deliberately set
            # exposes neither tool nor server).
            - name: KAGENT_TEMPLATES_ENABLED
              value: {{ .Values.agentPod.templates.enabled | ternary "true" "false" | quote }}
            - name: KAGENT_TEMPLATE_SERVER_PORT
              value: {{ .Values.agentPod.templates.serverPort | quote }}
            {{- if .Values.agentPod.templates.enabled }}
            - name: KAGENT_AGENT_POD_TEMPLATE_SERVER_URL
              value: 'http://{{ include "kagent-operator.fullname" . }}-templates.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.agentPod.templates.serverPort }}'
            {{- end }}
            # v0.1.6 — Langfuse-managed prompt fetcher. When enabled,
            # spawned agent-pods inherit KAGENT_LANGFUSE_HOST + creds
            # (forwarded by job-spec.ts via this same set of env vars)
            # and fetch Agent.spec.systemPromptRef bodies at boot.
            {{- if .Values.langfuse.enabled }}
            - name: KAGENT_AGENT_POD_LANGFUSE_HOST
              value: {{ .Values.langfuse.host | quote }}
            {{- if .Values.langfuse.apiKey.secretName }}
            - name: KAGENT_AGENT_POD_LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.langfuse.apiKey.secretName | quote }}
                  key: {{ .Values.langfuse.apiKey.publicKeyKey | quote }}
            - name: KAGENT_AGENT_POD_LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.langfuse.apiKey.secretName | quote }}
                  key: {{ .Values.langfuse.apiKey.secretKeyKey | quote }}
            {{- end }}
            {{- end }}
            # LLM gateway integration (spec §3.2). When enabled, the
            # operator (a) suspends new Jobs on creation and runs the
            # admission reconciler against ModelEndpoint capacity, AND
            # (b) injects KAGENT_LLM_GATEWAY_BASE_URL into spawned
            # agent-pods so they route LLM calls through the gateway.
            # Default OFF — kagent works without the gateway.
            - name: KAGENT_ADMISSION_CONTROL_ENABLED
              value: {{ .Values.llmGateway.enabled | ternary "true" "false" | quote }}
            {{- if .Values.llmGateway.enabled }}
            - name: KAGENT_LLM_GATEWAY_BASE_URL
              value: {{ .Values.llmGateway.baseUrl | quote }}
            {{- if .Values.llmGateway.apiKey.secretName }}
            - name: KAGENT_LLM_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llmGateway.apiKey.secretName | quote }}
                  key: {{ .Values.llmGateway.apiKey.secretKey | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Operator's livenessProbe wired in Phase 3 once a /healthz
          # endpoint exists. For v0.1, restartPolicy + watch retry is
          # sufficient.
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
