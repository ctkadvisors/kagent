{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

ServiceAccount + Role + RoleBinding for the agent pods the operator
spawns. Each agent pod patches its own AgentTask's status subresource
on completion — that's the only K8s permission it needs.

Scoped to the release namespace (kagent-system by default). With
watchAllNamespaces=true the operator reaches across namespaces, but
this SA + Role still only exists here — operators must replicate the
agent-pod ServiceAccount + RoleBinding in every workload namespace
they expect to spawn pods in. Multi-namespace via a ClusterRole is
deferred to v0.2.
*/}}
{{- if .Values.agentPod.rbac.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.agentPod.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-pod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.agentPod.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-pod
rules:
  # Patch AgentTask.status — the agent pod writes its own task's status.
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agenttasks/status']
    verbs: ['get', 'patch', 'update']
  # WS-K — read AgentTask spec (own task + sibling/child tasks via list)
  # plus list verb for `wait_for_children_all`'s parent-UID label
  # selector polling.
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agenttasks']
    verbs: ['get', 'list', 'create']
  # WS-K — read the parent Agent's spec (allowedChildAgents +
  # maxConcurrentChildren). Parent target Agent is in the same
  # namespace as the AgentTask.
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agents']
    verbs: ['get', 'list']
  # WS-M — read AgentTemplate so the agent-pod can sanity-check the
  # template's existence before posting to the template-server. The
  # actual instantiate call goes to the operator (which holds
  # `agents:create`), so the agent-pod itself can NEVER mint an Agent
  # CR — only ask the operator to.
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agenttemplates']
    verbs: ['get', 'list']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.agentPod.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-pod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.agentPod.serviceAccountName }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.agentPod.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
