{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

Optional self-hosted Steel Browser. Uses Steel's single Docker image
(`ghcr.io/steel-dev/steel-browser`) so API, UI, and CDP live behind
one ClusterIP service.
*/}}
{{- if and .Values.toolRuntime.enabled .Values.toolRuntime.browser.steel.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kagent-operator.fullname" . }}-steel
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: steel-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "kagent-operator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: steel-browser
  template:
    metadata:
      labels:
        {{- include "kagent-operator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: steel-browser
    spec:
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: steel-cache
          emptyDir:
            {{- toYaml .Values.toolRuntime.browser.steel.cache.emptyDir | nindent 12 }}
      containers:
        - name: steel
          image: {{ include "kagent-operator.steelBrowser.image" . | quote }}
          imagePullPolicy: {{ .Values.toolRuntime.browser.steel.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.toolRuntime.browser.steel.port }}
              protocol: TCP
            - name: cdp
              containerPort: {{ .Values.toolRuntime.browser.steel.debugPort }}
              protocol: TCP
          env:
            - name: SKIP_FINGERPRINT_INJECTION
              value: {{ .Values.toolRuntime.browser.steel.skipFingerprintInjection | ternary "true" "false" | quote }}
            {{- if .Values.toolRuntime.browser.steel.advertisePodIp }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DOMAIN
              value: "$(POD_IP):{{ .Values.toolRuntime.browser.steel.port }}"
            - name: CDP_DOMAIN
              value: "$(POD_IP):{{ .Values.toolRuntime.browser.steel.port }}"
            {{- end }}
          volumeMounts:
            - name: steel-cache
              mountPath: /app/.cache
          resources:
            {{- toYaml .Values.toolRuntime.browser.steel.resources | nindent 12 }}
      {{- with .Values.toolRuntime.browser.steel.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.toolRuntime.browser.steel.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.toolRuntime.browser.steel.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
