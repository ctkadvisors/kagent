{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

Smoke-test manifests — applied when .Values.smokeTest.enabled = true.
Materializes:
  - Agent CRD `smoke-test`           (the agent definition)
  - AgentTask CRD `smoke-test`        (the run that exercises the loop)
  - Job `smoke-test-verify`          (waits for completion + asserts)

The operator picks up the AgentTask via its watch, spawns a pod, the
pod runs against .Values.agentPod.litellmBaseUrl, and patches status.
The verification Job runs `kubectl wait` against the AgentTask phase,
prints the status YAML, and exits 0 on success / 1 on timeout.
*/}}
{{- if .Values.smokeTest.enabled -}}
---
apiVersion: kagent.knuteson.io/v1alpha1
kind: Agent
metadata:
  name: smoke-test
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
    kagent.knuteson.io/role: smoke-test
spec:
  model: {{ .Values.smokeTest.model | quote }}
  systemPrompt: 'You are a precise technical assistant. Answer in one sentence.'
  sandboxProfile: default
---
apiVersion: kagent.knuteson.io/v1alpha1
kind: AgentTask
metadata:
  # Suffixing the name with the Helm release revision guarantees a
  # FRESH AgentTask resource on every `helm upgrade` / Argo sync,
  # which sidesteps Argo's spec-diff gate (an AgentTask whose spec
  # didn't change across syncs would otherwise stay put at its prior
  # terminal phase). The hook annotations below cover the same case
  # for Argo-managed installs that don't bump the revision.
  name: smoke-test-r{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
    kagent.knuteson.io/role: smoke-test
  annotations:
    # Belt + suspenders for re-runs:
    #   - Replace=true,Force=true: when this resource IS in a sync diff,
    #     replace instead of patch (avoids merge edge-cases).
    #   - hook=Sync + hook-delete-policy=BeforeHookCreation: treat as a
    #     sync-time hook so even an identical spec re-creates the
    #     resource on every sync, deleting the prior instance first.
    argocd.argoproj.io/sync-options: Replace=true,Force=true
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  targetAgent: smoke-test
  payload:
    smokeTest: true
  originalUserMessage: {{ .Values.smokeTest.prompt | quote }}
  timeoutSeconds: {{ .Values.smokeTest.timeoutSeconds | default 60 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: smoke-test-verify
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: smoke-test-verify
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agenttasks']
    verbs: ['get', 'list', 'watch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: smoke-test-verify
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: smoke-test-verify
subjects:
  - kind: ServiceAccount
    name: smoke-test-verify
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  # Suffix with revision so we get a fresh Job alongside the fresh
  # AgentTask on every Argo sync. The previous instance is removed by
  # hook-delete-policy on the next sync.
  name: smoke-test-verify-r{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
    kagent.knuteson.io/role: smoke-test
  annotations:
    argocd.argoproj.io/sync-options: Replace=true,Force=true
    argocd.argoproj.io/sync-wave: '10'
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        kagent.knuteson.io/role: smoke-test
    spec:
      serviceAccountName: smoke-test-verify
      restartPolicy: Never
      containers:
        - name: verify
          image: {{ .Values.smokeTest.verificationImage | quote }}
          env:
            - name: AGENT_TASK_NAME
              value: smoke-test-r{{ .Release.Revision }}
            - name: NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: TIMEOUT_SECONDS
              value: {{ .Values.smokeTest.timeoutSeconds | default 300 | quote }}
          command:
            - /bin/bash
            - -ec
            - |
              echo "[smoke-test-verify] waiting for AgentTask/${AGENT_TASK_NAME} in ${NAMESPACE} to reach a terminal phase…"
              # Poll instead of `kubectl wait` so we can match either Completed OR Failed.
              for i in $(seq 1 "${TIMEOUT_SECONDS}"); do
                phase=$(kubectl get agenttask "${AGENT_TASK_NAME}" -n "${NAMESPACE}" -o jsonpath='{.status.phase}' 2>/dev/null || echo '')
                if [ "$phase" = "Completed" ] || [ "$phase" = "Failed" ]; then
                  echo "[smoke-test-verify] phase=$phase after ${i}s"
                  break
                fi
                sleep 1
              done
              echo "[smoke-test-verify] final AgentTask status:"
              kubectl get agenttask "${AGENT_TASK_NAME}" -n "${NAMESPACE}" -o yaml
              if [ "$phase" = "Completed" ]; then
                echo "[smoke-test-verify] PASS"
                exit 0
              fi
              echo "[smoke-test-verify] FAIL — phase=${phase:-(unset)}"
              exit 1
{{- end }}
