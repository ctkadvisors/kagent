{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

Telegram Bot API channel adapter.

Default-off. When enabled, this pod owns one Telegram bot token,
long-polls getUpdates, publishes adapter health to Channel.status, and
forwards normalized inbound messages to the operator's token-protected
channel gateway. Channel/ChannelBinding remain the policy source of
truth.
*/}}
{{- if .Values.channels.telegram.enabled -}}
{{- if not .Values.channels.gateway.enabled }}
{{- fail "kagent-operator: channels.telegram.enabled=true requires channels.gateway.enabled=true" }}
{{- end }}
{{- if not .Values.channels.telegram.channelName }}
{{- fail "kagent-operator: channels.telegram.enabled=true requires channels.telegram.channelName" }}
{{- end }}
{{- if not .Values.channels.telegram.accountId }}
{{- fail "kagent-operator: channels.telegram.enabled=true requires channels.telegram.accountId" }}
{{- end }}
{{- if not .Values.channels.telegram.botTokenSecretName }}
{{- fail "kagent-operator: channels.telegram.enabled=true requires channels.telegram.botTokenSecretName" }}
{{- end }}
{{- if ne (int .Values.channels.telegram.replicas) 1 }}
{{- fail "kagent-operator: channels.telegram.replicas must be 1 because Telegram getUpdates offsets are single-consumer" }}
{{- end }}
{{- $tokenSecretName := default .Values.channels.gateway.authTokenSecretName .Values.channels.telegram.gatewayTokenSecretName -}}
{{- $tokenSecretKey := default .Values.channels.gateway.authTokenSecretKey .Values.channels.telegram.gatewayTokenSecretKey -}}
{{- if not $tokenSecretName }}
{{- fail "kagent-operator: channels.telegram.enabled=true requires channels.telegram.gatewayTokenSecretName or channels.gateway.authTokenSecretName" }}
{{- end }}
{{- $gatewayUrl := .Values.channels.telegram.gatewayUrl -}}
{{- if not $gatewayUrl }}
{{- $gatewayUrl = printf "http://%s-channel-gateway.%s.svc.cluster.local:%v" (include "kagent-operator.fullname" .) .Release.Namespace .Values.channels.gateway.port -}}
{{- end }}
{{- if .Values.channels.telegram.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kagent-operator.channelTelegramAdapter.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: channel-telegram-adapter
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kagent-operator.channelTelegramAdapter.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: channel-telegram-adapter
rules:
  - apiGroups: ['kagent.knuteson.io']
    resources: ['channels']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['kagent.knuteson.io']
    resources: ['channels/status']
    verbs: ['get', 'patch', 'update']
  - apiGroups: ['kagent.knuteson.io']
    resources: ['channelsessions']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['kagent.knuteson.io']
    resources: ['channelsessions/status']
    verbs: ['get', 'patch', 'update']
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agenttasks']
    verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kagent-operator.channelTelegramAdapter.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: channel-telegram-adapter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kagent-operator.channelTelegramAdapter.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kagent-operator.channelTelegramAdapter.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kagent-operator.fullname" . }}-channel-telegram
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: channel-telegram-adapter
spec:
  replicas: {{ .Values.channels.telegram.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "kagent-operator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: channel-telegram-adapter
  template:
    metadata:
      labels:
        {{- include "kagent-operator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: channel-telegram-adapter
    spec:
      serviceAccountName: {{ include "kagent-operator.channelTelegramAdapter.serviceAccountName" . }}
      automountServiceAccountToken: true
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: channel-telegram-adapter
          image: {{ include "kagent-operator.channelTelegramAdapter.image" . | quote }}
          imagePullPolicy: {{ .Values.channels.telegram.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: KAGENT_CHANNEL_NAME
              value: {{ .Values.channels.telegram.channelName | quote }}
            - name: KAGENT_CHANNEL_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: KAGENT_CHANNEL_ACCOUNT_ID
              value: {{ .Values.channels.telegram.accountId | quote }}
            - name: KAGENT_TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.channels.telegram.botTokenSecretName | quote }}
                  key: {{ .Values.channels.telegram.botTokenSecretKey | quote }}
            - name: KAGENT_TELEGRAM_API_BASE_URL
              value: {{ .Values.channels.telegram.telegramApiBaseUrl | quote }}
            - name: KAGENT_TELEGRAM_POLL_TIMEOUT_SECONDS
              value: {{ .Values.channels.telegram.pollTimeoutSeconds | quote }}
            - name: KAGENT_TELEGRAM_POLL_INTERVAL_MS
              value: {{ .Values.channels.telegram.pollIntervalMs | quote }}
            - name: KAGENT_CHANNEL_GATEWAY_URL
              value: {{ $gatewayUrl | quote }}
            - name: KAGENT_CHANNEL_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $tokenSecretName | quote }}
                  key: {{ $tokenSecretKey | quote }}
            - name: KAGENT_CHANNEL_OUTBOUND_POLL_MS
              value: {{ .Values.channels.telegram.outboundPollMs | quote }}
            - name: KAGENT_CHANNEL_OUTBOUND_BASE_BACKOFF_SECONDS
              value: {{ .Values.channels.telegram.outboundBaseBackoffSeconds | quote }}
            - name: KAGENT_CHANNEL_OUTBOUND_MAX_FAILURES
              value: {{ .Values.channels.telegram.outboundMaxFailures | quote }}
          resources:
            {{- toYaml .Values.channels.telegram.resources | nindent 12 }}
      {{- with .Values.channels.telegram.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.channels.telegram.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.channels.telegram.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
