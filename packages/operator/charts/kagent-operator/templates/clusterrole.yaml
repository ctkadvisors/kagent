{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

ClusterRole — minimum permissions for the operator to:
  - watch + read Agents / AgentTasks / AgentCapabilities
  - patch AgentTask.status (status subresource)
  - create + list + watch + delete batch/v1 Jobs (per-task pods)
  - read Pods (job-watch detects image-pull / OOMKill / unschedulable
    states the agent-pod cannot self-report)
  - emit Events (kubectl describe surfacing)

Kept cluster-scoped so advanced installs can set watchAllNamespaces=true
for a cluster-wide watch. The chart default still watches only the release
namespace because spawned Jobs need namespace-local agent-pod ServiceAccount
+ artifact PVC prerequisites.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent-operator.fullname" . }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
rules:
  # Read CRDs the operator owns + WS-M agenttemplates (read-only;
  # template authorship is GitOps).
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agents', 'agenttasks', 'agentcapabilities', 'agenttemplates']
    verbs: ['get', 'list', 'watch']
  # Patch AgentTask.status + AgentTemplate.status (operator-owned
  # subresources).
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agenttasks/status', 'agenttemplates/status']
    verbs: ['get', 'patch', 'update']
  # WS-M — operator mints Agent CRs from templates via the
  # template-server. Needed for `agents:create` (POST), `update/patch`
  # (lastUsedAt annotation bumps), and `delete` (idle-GC sweeper).
  # Only the operator holds these verbs; the agent-pod's RBAC stays
  # read-only on `agents`.
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agents']
    verbs: ['create', 'update', 'patch', 'delete']
  # Manage Jobs we create per AgentTask
  - apiGroups: ['batch']
    resources: ['jobs']
    verbs: ['get', 'list', 'watch', 'create', 'delete']
  # Read Pods — job-watch surfaces external failures (image pull, OOM,
  # scheduling) onto AgentTask.status when the agent-pod cannot.
  - apiGroups: ['']
    resources: ['pods']
    verbs: ['get', 'list', 'watch']
  # Emit Events for surface visibility via `kubectl describe`
  - apiGroups: ['']
    resources: ['events']
    verbs: ['create', 'patch']
