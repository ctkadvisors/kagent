{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

ClusterRole — minimum permissions for the operator to:
  - watch + read Agents / AgentTasks / AgentCapabilities cluster-wide
  - patch AgentTask.status (status subresource)
  - create + list + watch + delete batch/v1 Jobs (per-task pods)
  - read Pods (Phase 3 will read pod logs / status; benign for v0.1)
  - emit Events (kubectl describe surfacing)

Cluster-scoped because the operator watches across all namespaces.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent-operator.fullname" . }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
rules:
  # Read CRDs the operator owns
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agents', 'agenttasks', 'agentcapabilities']
    verbs: ['get', 'list', 'watch']
  # Patch AgentTask.status (status subresource)
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agenttasks/status']
    verbs: ['get', 'patch', 'update']
  # Manage Jobs we create per AgentTask
  - apiGroups: ['batch']
    resources: ['jobs']
    verbs: ['get', 'list', 'watch', 'create', 'delete']
  # Read Pods (Phase 3: pod status reflection; safe to grant now)
  - apiGroups: ['']
    resources: ['pods']
    verbs: ['get', 'list', 'watch']
  # Emit Events for surface visibility via `kubectl describe`
  - apiGroups: ['']
    resources: ['events']
    verbs: ['create', 'patch']
