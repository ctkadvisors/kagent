{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

ClusterRole — minimum permissions for the operator to:
  - watch + read Agents / AgentTasks / AgentCapabilities
  - patch AgentTask.status (status subresource)
  - create + list + watch + delete batch/v1 Jobs (per-task pods)
  - read Pods (job-watch detects image-pull / OOMKill / unschedulable
    states the agent-pod cannot self-report)
  - emit Events (kubectl describe surfacing)

Kept cluster-scoped so advanced installs can set watchAllNamespaces=true
for a cluster-wide watch. The chart default still watches only the release
namespace because spawned Jobs need namespace-local agent-pod ServiceAccount
+ artifact PVC prerequisites.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent-operator.fullname" . }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
rules:
  # Read CRDs the operator owns + WS-M agenttemplates (read-only;
  # template authorship is GitOps) + v0.1.5 modelendpoints (read-only;
  # ModelEndpoint authorship is GitOps; the gateway writes status) +
  # v0.1.16 kagentschedules (Wave 0 entry-point CRD).
  - apiGroups: ['kagent.knuteson.io']
    resources:
      [
        'agents',
        'agenttasks',
        'agentcapabilities',
        'agenttemplates',
        'modelendpoints',
        'kagentschedules',
      ]
    verbs: ['get', 'list', 'watch']
  # Patch AgentTask.status + AgentTemplate.status + KagentSchedule.status
  # (operator-owned subresources).
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agenttasks/status', 'agenttemplates/status', 'kagentschedules/status']
    verbs: ['get', 'patch', 'update']
  # Wave 0 sub-team Entry — operator creates AgentTasks from each
  # KagentSchedule tick and from each valid HMAC-signed webhook POST.
  # The agent-pod's own RBAC also includes `agenttasks: [create]` for
  # the WS-K spawn_child_task path; same verb on the operator floor
  # for the trigger paths.
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agenttasks']
    verbs: ['create']
  # WS-M — operator mints Agent CRs from templates via the
  # template-server. Needed for `agents:create` (POST), `update/patch`
  # (lastUsedAt annotation bumps), and `delete` (idle-GC sweeper).
  # Only the operator holds these verbs; the agent-pod's RBAC stays
  # read-only on `agents`.
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agents']
    verbs: ['create', 'update', 'patch', 'delete']
  # Manage Jobs we create per AgentTask. `patch` is required for the
  # WS-F suspend-publish-unsuspend pattern: operator creates the Job
  # with `spec.suspend=true`, publishes the dispatch envelope to NATS
  # with the Job's UID as the dedupe key, then PATCHes `spec.suspend=
  # false` to release the Job for scheduling. Without `patch` here
  # the unsuspend step 403s and the AgentTask never advances past
  # Pending.
  - apiGroups: ['batch']
    resources: ['jobs']
    verbs: ['get', 'list', 'watch', 'create', 'patch', 'delete']
  # Read Pods — job-watch surfaces external failures (image pull, OOM,
  # scheduling) onto AgentTask.status when the agent-pod cannot.
  - apiGroups: ['']
    resources: ['pods']
    verbs: ['get', 'list', 'watch']
  # Emit Events for surface visibility via `kubectl describe`
  - apiGroups: ['']
    resources: ['events']
    verbs: ['create', 'patch']
  # v0.2.0-typed-io — per-Job ConfigMap carrying agent.spec.json +
  # task.spec.json (replaces the KAGENT_AGENT_SPEC + KAGENT_TASK_SPEC
  # env JSON). Closes the ARG_MAX cap and the ps-visible env-string
  # leak. The ConfigMap is owned by the AgentTask via ownerReferences
  # so cascading delete of the AgentTask reaps the ConfigMap; we ask
  # for `delete` explicitly anyway so an orphaned ConfigMap (e.g.
  # AgentTask hand-deleted with --grace-period=0) can be swept by the
  # operator on the next reconcile.
  - apiGroups: ['']
    resources: ['configmaps']
    verbs: ['get', 'list', 'watch', 'create', 'delete']
  # ---------------------------------------------------------------------
  # Wave 1 — Workspace
  # ---------------------------------------------------------------------
  # Workspace controller needs:
  #   - watch + read Workspace CRs (informer)
  #   - patch Workspace.status (status subresource) + the parent metadata
  #     for the finalizer dance + RWX probe
  #   - PVCs: create / read / list / watch / delete (1:1 with each
  #     Workspace; ownerRef'd back to the Workspace so cascading delete
  #     reaps them, but explicit delete is faster + observable)
  #   - Jobs: create / read / list / watch / delete (the one-shot
  #     init-container clone Job per Workspace with `source.git`)
  #
  # Scoped narrowly to the Workspace primitive's needs. The shared
  # `agenttasks` / `jobs` verbs above already cover the AgentTask Job
  # path; the workspace verbs are additive on the same `batch/v1 Jobs`
  # resource (the controller's clone Jobs share the resource class but
  # are label-selected by `kagent.knuteson.io/managed-by=kagent-workspace-controller`).
  - apiGroups: ['kagent.knuteson.io']
    resources: ['workspaces']
    verbs: ['get', 'list', 'watch', 'patch', 'update']
  - apiGroups: ['kagent.knuteson.io']
    resources: ['workspaces/status']
    verbs: ['get', 'patch', 'update']
  - apiGroups: ['']
    resources: ['persistentvolumeclaims']
    verbs: ['get', 'list', 'watch', 'create', 'delete']
  # ---------------------------------------------------------------------
  # Wave 1 — CAS
  # ---------------------------------------------------------------------
  # The CAS GC controller (cas-gc.ts) walks the AgentTask informer
  # cache for reachability — the existing `agenttasks: [get,list,watch]`
  # rule above already covers that. The actual blob delete is
  # `unlinkSync` on the operator's mounted PVC, which is a node-local
  # FS operation, not a K8s API call. No additional verbs are required
  # for the GC; this comment exists so future readers don't waste time
  # looking for them.
  # ---------------------------------------------------------------------
  # Wave 2 — Supervision
  # ---------------------------------------------------------------------
  # The supervision-router walks the parent chain via the
  # `kagent.knuteson.io/parent-task-uid` label, fetches the parent
  # AgentTask + parent Agent, and patches sibling AgentTask.status
  # (restartCount + supervision_terminated condition / phase=Failed).
  # Every verb the router needs is already covered by the rules above:
  #   - agents: [get,list,watch]                  → strategy/maxRestarts
  #   - agenttasks: [get,list,watch]              → parent + sibling reads
  #   - agenttasks/status: [get,patch,update]     → restartCount + phase
  # No additional verbs required for v0.3.1-supervision; this comment
  # exists so future readers don't waste time looking for them.
  # ---------------------------------------------------------------------
  # Wave 2 — Workflows
  # ---------------------------------------------------------------------
  # AgentWorkflow controller needs:
  #   - watch + read AgentWorkflow CRs (informer)
  #   - patch AgentWorkflow.status (status subresource) + parent
  #     metadata for the finalizer dance + capabilityRef stamp
  #   - Deployments: create / patch / read / list / watch / delete
  #     (the workflow runtime Deployment is 1:1 per AgentWorkflow,
  #     ownerRef'd back to the parent so cascading delete reaps)
  #   - Services: create / read / list / watch / delete (ClusterIP
  #     fronting the workflow runtime's HTTP/2 endpoint for Restate)
  #   - Secrets: create / patch (the cap JWT mounted into the
  #     workflow runtime via Secret-volume; re-mint each reconcile)
  #   - kagentschedules: create (workflow `schedule` triggers
  #     materialize sibling KagentSchedule CRs); read/list/watch
  #     already covered by the operator-wide rule above.
  #
  # The shared `agentworkflows` resource group + Deployments are
  # additive on top of the existing operator verbs.
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agentworkflows']
    verbs: ['get', 'list', 'watch', 'patch', 'update']
  - apiGroups: ['kagent.knuteson.io']
    resources: ['agentworkflows/status']
    verbs: ['get', 'patch', 'update']
  - apiGroups: ['apps']
    resources: ['deployments']
    verbs: ['get', 'list', 'watch', 'create', 'patch', 'delete']
  - apiGroups: ['']
    resources: ['services']
    verbs: ['get', 'list', 'watch', 'create', 'delete']
  # Audit-rev2 L7 — secrets RBAC scope is `watchAllNamespaces`-conditional.
  #
  # Default install (`watchAllNamespaces: false`) scopes the operator to the
  # release namespace only; secrets verbs live in the namespaced Role
  # rendered by `templates/role.yaml` (the always-on companion). The
  # ClusterRole below skips the `secrets` rule entirely so a single
  # release-ns blast radius can't be widened by accident.
  #
  # `watchAllNamespaces: true` installs supplement with cluster-scoped
  # secrets verbs because the operator may mint capability Secrets and
  # Workflow runtime Secrets in any namespace where an AgentTask /
  # AgentWorkflow is admitted.
  {{- if .Values.watchAllNamespaces }}
  - apiGroups: ['']
    resources: ['secrets']
    verbs: ['get', 'create', 'patch', 'delete']
  {{- end }}
  # ---------------------------------------------------------------------
  # Wave 3 — Identity (v0.4.3-identity)
  # ---------------------------------------------------------------------
  # SPIFFE/SPIRE per-pod SVID issuance. The operator-side identity
  # watcher (packages/operator/src/identity.ts MockIdentityWatcher)
  # consumes events the SPIRE Workload-API streams; the SPIRE Server
  # + Agent ship in the embedded `charts/spire/` sub-chart with
  # their OWN ClusterRoles (k8s_psat attestor + tokenreviews + pods/
  # nodes reads). The parent operator does NOT need additional verbs
  # in v0.4.3 — its identity machinery operates entirely on the
  # mounted SPIRE-CA-bundle PEM (read via the operator's existing
  # /tmp filesystem) + the audit pipeline (already covered by
  # `events: [create,patch]` above). When the Wave 3 follow-up wires
  # a kagent-side RegistrationEntry controller, the verbs that
  # controller needs land under THIS section header (likely
  # `spire.spiffe.io/registrationentries` once SPIRE Server's CRDs
  # are provisioned).
  # ---------------------------------------------------------------------
  # Wave 4 — Tenancy (v0.5.0-tenancy)
  # ---------------------------------------------------------------------
  # The Tenant controller needs:
  #   - read + watch Tenant CRs (cluster-scoped informer)
  #   - patch Tenant.status (status subresource)
  #   - patch Agent + AgentTask metadata.labels (the operator stamps
  #     `kagent.knuteson.io/tenant=<name>` at admission time AND the
  #     migrate-tenants CLI rewrites the label on tenant move). Patch
  #     verbs already exist via the Wave 1+ blocks above; this section
  #     adds only the Tenant CRD verbs that are net-new.
  #   - read namespaces (cluster-scoped) to populate
  #     status.namespaceCount; watch optional but cheap given the
  #     namespace count typical for a homelab/single-tenant SaaS install.
  - apiGroups: ['kagent.knuteson.io']
    resources: ['tenants']
    verbs: ['get', 'list', 'watch', 'patch', 'update']
  - apiGroups: ['kagent.knuteson.io']
    resources: ['tenants/status']
    verbs: ['get', 'patch', 'update']
  - apiGroups: ['']
    resources: ['namespaces']
    verbs: ['get', 'list', 'watch']
  # ---------------------------------------------------------------------
  # Wave 4 — Egress (v0.5.1-egress)
  - apiGroups: ['networking.k8s.io']
    resources: ['networkpolicies']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['cilium.io']
    resources: ['ciliumnetworkpolicies']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  # ---------------------------------------------------------------------
  # Wave 4 — Quotas (v0.5.2-quotas)
  - apiGroups: ['']
    resources: ['resourcequotas']
    verbs: ['get', 'list', 'watch', 'create', 'patch', 'update', 'delete']
  # ---------------------------------------------------------------------
  # Wave 4 — Versioning (v0.5.3-versioning)
  - apiGroups: ['admissionregistration.k8s.io']
    resources: ['validatingwebhookconfigurations']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch']
  # ---------------------------------------------------------------------
  # Wave 4 — KeyRotation (v0.5.4-keyrotation)
  # No new verbs needed — composes against existing.
  # ---------------------------------------------------------------------
