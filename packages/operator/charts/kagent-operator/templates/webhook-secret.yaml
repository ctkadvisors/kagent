{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

Wave 0 sub-team Entry — Secret holding per-trigger HMAC keys. The
operator deployment mounts this via `envFrom: secretRef` so the
runtime resolver in triggers-bootstrap.ts (`resolveTriggerSecret`)
can read each per-trigger key from process.env.

Key naming: `KAGENT_TRIGGER_SECRET_<UPPER_ID>` where `<UPPER_ID>` is
the trigger id (matching the URL slug + KagentSchedule.metadata.name)
uppercased with hyphens replaced by underscores. The chart performs
the rename here so values authors keep using the human-readable id.

Materialized only when `triggers.enabled` AND `triggers.secrets` is
non-empty. Committing plaintext secrets to values.yaml is a security
antipattern — populate via `--set-string` / sops / ExternalSecrets.

We use `stringData` so the values pass through as plain UTF-8; K8s
encodes to base64 server-side.
*/}}
{{- if and .Values.triggers.enabled .Values.triggers.secrets -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kagent-operator.fullname" . }}-trigger-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kagent-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: triggers-webhook
type: Opaque
stringData:
  {{- range $id, $secret := .Values.triggers.secrets }}
  KAGENT_TRIGGER_SECRET_{{ $id | upper | replace "-" "_" }}: {{ $secret | quote }}
  {{- end }}
{{- end }}
