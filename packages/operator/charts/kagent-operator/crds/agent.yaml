# Agent — declarative spec for a workload that can be invoked.
# See packages/operator/src/crds/types.ts for the TS surface.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.kagent.knuteson.io
spec:
  group: kagent.knuteson.io
  scope: Namespaced
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
    shortNames:
      - kag
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - model
              properties:
                model:
                  type: string
                  minLength: 1
                  description: 'LiteLLM model id WITH provider prefix (e.g. workers-ai/@cf/meta/llama-4-scout-17b-16e-instruct).'
                systemPrompt:
                  type: string
                tools:
                  type: array
                  items:
                    type: string
                capabilities:
                  type: array
                  items:
                    type: string
                sandboxProfile:
                  type: string
                  enum:
                    - default
                    - strict
                  default: default
                allowedChildAgents:
                  type: array
                  items:
                    type: string
                  description: |
                    WS-K — declarative allowlist of Agent names this agent
                    may spawn as children via the in-pod `spawn_child_task`
                    tool. Empty / unset means NO children may be spawned
                    (fail-closed). Per-Agent grant lives at GitOps
                    authoring time so an LLM-driven prompt injection
                    cannot pick its own child target. When the Tool Broker
                    (P6) lands, this becomes the fallback for
                    `spawn_child_task`'s `argumentPolicy` when no
                    `ToolBinding` exists.
                maxConcurrentChildren:
                  type: integer
                  minimum: 1
                  maximum: 256
                  default: 10
                  description: |
                    WS-K — upper bound on children of THIS agent's tasks
                    that may be in non-terminal phases simultaneously.
                    Stops an LLM-loop bug from creating 10⁶ children.
                    Counted by direct children only (not transitive).
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Sandbox
          type: string
          jsonPath: .spec.sandboxProfile
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
