# Agent — declarative spec for a workload that can be invoked.
# See packages/operator/src/crds/types.ts for the TS surface.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.kagent.knuteson.io
spec:
  group: kagent.knuteson.io
  scope: Namespaced
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
    shortNames:
      - kag
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - model
              properties:
                model:
                  type: string
                  minLength: 1
                  description: 'LiteLLM model id WITH provider prefix (e.g. workers-ai/@cf/meta/llama-4-scout-17b-16e-instruct).'
                systemPrompt:
                  type: string
                systemPromptRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      minLength: 1
                      maxLength: 256
                    version:
                      type: integer
                      minimum: 1
                  description: |
                    v0.1.6 — Langfuse-managed system prompt. Agent-pod
                    fetches the body via Langfuse's v2 prompts API at
                    boot. Falls back to systemPrompt literal on fetch
                    failure; boot-fails when neither resolves. version
                    optional — Langfuse returns the production-promoted
                    label when omitted.
                tools:
                  type: array
                  items:
                    type: string
                capabilities:
                  type: array
                  items:
                    type: string
                sandboxProfile:
                  type: string
                  enum:
                    - default
                    - strict
                  default: default
                allowedChildAgents:
                  type: array
                  items:
                    type: string
                  description: |
                    WS-K — declarative allowlist of Agent names this agent
                    may spawn as children via the in-pod `spawn_child_task`
                    tool. Empty / unset means NO children may be spawned
                    (fail-closed) UNLESS `allowedChildTemplates` admits the
                    target. Per-Agent grant lives at GitOps authoring time
                    so an LLM-driven prompt injection cannot pick its own
                    child target. When the Tool Broker (P6) lands, this
                    becomes the fallback for `spawn_child_task`'s
                    `argumentPolicy` when no `ToolBinding` exists.
                allowedChildTemplates:
                  type: array
                  items:
                    type: string
                  description: |
                    v0.1.3 — companion to `allowedChildAgents` that admits
                    a child by its target Agent's
                    `kagent.knuteson.io/from-template` label (stamped by
                    the WS-M template-instantiator). Lets a parent permit
                    every Agent the operator materializes from a given
                    template (e.g. every `summarizer-*` Agent the
                    `summarizer` template mints) without enumerating their
                    content-addressed names. Both lists union; an Agent
                    missing the from-template label is NEVER admitted via
                    this field (fail-closed).
                maxConcurrentChildren:
                  type: integer
                  minimum: 1
                  maximum: 256
                  default: 10
                  description: |
                    WS-K — upper bound on children of THIS agent's tasks
                    that may be in non-terminal phases simultaneously.
                    Stops an LLM-loop bug from creating 10⁶ children.
                    Counted by direct children only (not transitive).
                llmParams:
                  type: object
                  description: |
                    v0.1.4 — declarative LLM request-tuning knobs threaded
                    through to every chat() call this Agent's loop makes.
                    Maps 1:1 to OpenAI body fields temperature / max_tokens
                    / stop. Unset fields fall through to the LLM provider's
                    defaults; the substrate never invents values.
                  properties:
                    temperature:
                      type: number
                      minimum: 0
                      maximum: 2
                      description: 'Sampling temperature; provider-clamped.'
                    maxTokens:
                      type: integer
                      minimum: 1
                      maximum: 1048576
                      description: 'Hard cap on output tokens for the request.'
                    stopSequences:
                      type: array
                      maxItems: 16
                      items:
                        type: string
                        maxLength: 256
                      description: 'Stop sequences passed as the OpenAI `stop` field.'
                maxInFlightTasks:
                  type: integer
                  minimum: 1
                  maximum: 1024
                  description: |
                    Opt-in per-Agent fairness cap (LLM-gateway bundle,
                    spec §3.4). Upper bound on the number of in-flight
                    Jobs the operator's admission reconciler will leave
                    un-suspended for this Agent at any given moment
                    (Jobs whose `kagent.knuteson.io/agent=<name>` label
                    matches). Absent / unset = unlimited at this layer;
                    the per-(model, backend) cap on the matching
                    ModelEndpoint is the only gate when this is unset.
                    Counted by direct in-flight Jobs only; queued /
                    suspended Jobs do not count against the cap.
                # ---- v0.2.0-typed-io — Wave 1 / I/O sub-team.
                # Typed dataflow contract per docs/SUBSTRATE-V1.md §3.1.
                # Workspace + CAS sub-teams branch from the kind enum.
                inputs:
                  type: array
                  description: |
                    Inputs this Agent consumes. AgentTask.spec.inputs[]
                    binds each entry. Required-by-default; opt out with
                    `optional: true`.
                  items:
                    type: object
                    required:
                      - name
                      - kind
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 256
                      kind:
                        type: string
                        enum:
                          - workspace
                          - artifact
                          - scalar
                        description: |
                          workspace = RWX PVC (Workspace sub-team,
                          v0.2.1); artifact = content-addressed bytes
                          (CAS sub-team, v0.2.2); scalar = inline
                          literal forwarded to the agent loop.
                      mediaType:
                        type: string
                      mountPath:
                        type: string
                        description: |
                          Container path to mount the input at.
                          REQUIRED for kind: workspace | artifact;
                          ignored for kind: scalar. Admission rejects
                          a non-scalar input that lacks mountPath
                          (default-deny — substrate never picks a
                          path on the agent's behalf).
                      mode:
                        type: string
                        enum:
                          - ro
                          - rw
                        default: ro
                      optional:
                        type: boolean
                      required:
                        type: boolean
                        default: true
                outputs:
                  type: array
                  description: |
                    Outputs this Agent produces. Reconciler refuses a
                    Completed status patch when any required entry is
                    absent from AgentTask.status.outputs[].
                  items:
                    type: object
                    required:
                      - name
                      - kind
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 256
                      kind:
                        type: string
                        enum:
                          - artifact
                          - scalar
                      mediaType:
                        type: string
                      required:
                        type: boolean
                        default: true
                      retention:
                        type: string
                        description: |
                          Duration string (e.g. 7d, 24h). Parsed by
                          the CAS sub-team in v0.2.2; v0.2.0 only
                          threads the field through the schema for
                          forward-compatibility.
                workspaceClaims:
                  type: array
                  description: |
                    Reserved field; the Workspace sub-team locks the
                    shape in v0.2.1-workspaces. Threaded here so the
                    schema accepts the field without a CRD-bump
                    dependency on Workspace.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                # ---- v0.4.2-cache — Wave 3 / Cache sub-team.
                caches:
                  type: array
                  description: |
                    Per-Agent persistent caches keyed by
                    sha256(template-render). See docs/WAVES.md §5.3.
                    Restored on task admission via init-container;
                    saved on success via sidecar / watcher Job. Miss
                    is NEVER an error.
                  items:
                    type: object
                    required:
                      - name
                      - key
                      - mountPath
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                        pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$|^[a-z0-9]$'
                      key:
                        type: string
                        minLength: 1
                        description: |
                          Template; recognized tokens:
                          {input_artifact_hashes}, {image_digest},
                          {model_name}. `default` sugars to
                          `{input_artifact_hashes}+{image_digest}+{model_name}`.
                      mountPath:
                        type: string
                        minLength: 1
                # ---- v0.3.0-capabilities — Wave 2 / Caps sub-team.
                # The substrate's sealed-authority primitive per
                # docs/SUBSTRATE-V1.md §3.6.
                capabilityClaims:
                  type: object
                  description: |
                    Capability claims this Agent is permitted to mint
                    into a JWT bundle for any of its tasks. Each
                    claim category is a glob-pattern array (`*` is
                    the only metacharacter). When set, the legacy
                    fields (allowedChildAgents, allowedChildTemplates)
                    are IGNORED with a deprecation warning.
                  properties:
                    tools:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    models:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    spawn:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    read:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    write:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    egress:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    tenant:
                      type: string
                      minLength: 1
                    publish:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    subscribe:
                      type: array
                      items:
                        type: string
                        minLength: 1
                # ---- v0.3.1-supervision — Wave 2 / Supervision sub-team.
                supervisionStrategy:
                  type: string
                  enum:
                    - one_for_one
                    - one_for_all
                    - rest_for_one
                    - escalate
                  default: one_for_one
                  description: |
                    Strategy the operator applies when a child
                    AgentTask of THIS agent's task fails. one_for_one
                    (default): restart only the failed child.
                    one_for_all: terminate every sibling + restart
                    the subtree. rest_for_one: terminate failed +
                    every sibling started AFTER it. escalate:
                    propagate the failure to the parent task.
                maxRestarts:
                  type: integer
                  minimum: 0
                  default: 3
                  description: |
                    Per-AgentTask restart cap. The operator
                    increments AgentTask.status.restartCount each
                    time supervision restarts a task; once
                    restartCount >= maxRestarts the operator
                    fails-closed with reason=restart_limit_exceeded.
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Sandbox
          type: string
          jsonPath: .spec.sandboxProfile
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
