#
# AgentTask — single invocation request, addressed by agent name OR
# capability tag. See packages/operator/src/crds/types.ts.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agenttasks.kagent.knuteson.io
spec:
  group: kagent.knuteson.io
  scope: Namespaced
  names:
    kind: AgentTask
    listKind: AgentTaskList
    plural: agenttasks
    singular: agenttask
    shortNames:
      - kat
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - payload
              # Exactly one of targetAgent / targetCapability must be set;
              # the operator's resolve step is the source of truth — the
              # CRD schema enforces only "at least one" via oneOf below.
              oneOf:
                - required: [targetAgent]
                - required: [targetCapability]
              properties:
                targetAgent:
                  type: string
                  description: metadata.name of an Agent CRD in this namespace.
                targetCapability:
                  type: string
                  description: Capability tag resolved against the live Agent registry.
                payload:
                  # Substrate-opaque — passed through to the agent loop.
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                timeoutSeconds:
                  type: integer
                  minimum: 1
                  maximum: 86400
                parentTask:
                  type: string
                  description: UID of the AgentTask that delegated this one.
                originalUserMessage:
                  type: string
                  description: 'Required at the protocol level (HARNESS-LESSONS §4); the operator copies parent value if unset on a delegated task.'
                parentDistillation:
                  type: string
                expectedTools:
                  type: array
                  items:
                    type: string
                  description: 'Tool category names the operator expects to fire (feeds the F2 detector).'
                # ---- v0.2.0-typed-io — Wave 1 / I/O sub-team.
                # Typed input bindings + idempotency. Admission validates
                # this against the target Agent's spec.inputs[]. See
                # docs/SUBSTRATE-V1.md §3.2.
                inputs:
                  type: array
                  description: |
                    Bindings that resolve Agent.spec.inputs[]. `from`
                    carries exactly one of:
                      { workspace }
                      { taskUid + output }
                      { scalar }
                  items:
                    type: object
                    required:
                      - name
                      - from
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 256
                      from:
                        type: object
                        oneOf:
                          - required: [workspace]
                          - required: [taskUid, output]
                          - required: [scalar]
                        properties:
                          workspace:
                            type: string
                          taskUid:
                            type: string
                          output:
                            type: string
                          scalar:
                            x-kubernetes-preserve-unknown-fields: true
                idempotencyKey:
                  type: string
                  minLength: 1
                  maxLength: 256
                  description: |
                    Stripe / Temporal-pattern dedupe key. Operator's
                    admission cache dedupes by (namespace, agent,
                    idempotencyKey, inputHash) within a 24h TTL.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Dispatched
                    - Completed
                    - Failed
                result:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                error:
                  type: string
                startedAt:
                  type: string
                  format: date-time
                completedAt:
                  type: string
                  format: date-time
                podName:
                  type: string
                structuralVerdict:
                  type: object
                  properties:
                    suspicious:
                      type: array
                      items:
                        type: string
                # Artifact references — see docs/ARTIFACTS.md. Bytes live
                # in the backend addressed by `uri` (pvc:// in v0.1,
                # s3://minio:// in v0.2); etcd holds metadata only. The
                # array is optional and additive in v0.1; no writer
                # populates it yet (next slice). `preserve-unknown-fields`
                # on each item lets v0.2 backends attach extra metadata
                # without a CRD bump.
                artifacts:
                  type: array
                  items:
                    type: object
                    required:
                      - uri
                    properties:
                      uri:
                        type: string
                        description: 'Backend-addressable URI. v0.1 emits pvc://kagent-artifacts/<task-uid>/<name>.'
                      mediaType:
                        type: string
                        description: 'RFC 6838 media type, e.g. text/markdown, image/png, text/x-diff.'
                      sizeBytes:
                        type: integer
                        minimum: 0
                      checksum:
                        type: string
                        description: 'Algorithm-prefixed lowercase-hex digest, e.g. "sha256:abc...".'
                      name:
                        type: string
                        description: 'Human-readable label / stable name within the producing task.'
                      producedAt:
                        type: string
                        format: date-time
                    x-kubernetes-preserve-unknown-fields: true
                # ---- v0.2.0-typed-io — Wave 1 / I/O sub-team.
                # Substrate output references; populated by the
                # agent-pod's terminal status patch. The reconciler
                # validates that each Agent.spec.outputs[].required
                # entry is present here before admitting Completed.
                outputs:
                  type: array
                  description: |
                    Output references keyed by Agent.spec.outputs[].name.
                    `ref` shape varies by output kind: artifact → CAS
                    URI; scalar → string-encoded literal.
                  items:
                    type: object
                    required:
                      - name
                      - ref
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 256
                      ref:
                        type: string
                        minLength: 1
                # ---- Workstream 5 / Phase 5: parent/child task-graph projection.
                # Populated by the operator's parent re-reconcile (next slice).
                # Schema is additive — no required keys at status level so
                # existing AgentTasks remain valid. See docs/TASK-GRAPH.md §4.
                children:
                  type: array
                  description: |
                    Projection of child AgentTasks discovered via the
                    `kagent.knuteson.io/parent-task-uid` label selector.
                    Bounded shape — full child spec lives on the child CR.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      uid:
                        type: string
                      phase:
                        type: string
                        enum:
                          - Pending
                          - Dispatched
                          - Completed
                          - Failed
                      completedAt:
                        type: string
                        format: date-time
                      error:
                        type: string
                aggregatePhase:
                  type: string
                  enum:
                    - Pending
                    - Dispatched
                    - PartiallyComplete
                    - AllComplete
                    - AnyFailed
                  description: |
                    Aggregate state of this task's children, distinct from
                    `phase` (which is the parent's own pod-side work).
                successCount:
                  type: integer
                  minimum: 0
                  description: 'Number of children currently in phase=Completed.'
                failureCount:
                  type: integer
                  minimum: 0
                  description: 'Number of children currently in phase=Failed.'
                inFlightCount:
                  type: integer
                  minimum: 0
                  description: 'Children that have not reached a terminal phase yet (Pending/Dispatched/absent).'
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Target
          type: string
          jsonPath: .spec.targetAgent
        - name: Capability
          type: string
          jsonPath: .spec.targetCapability
        - name: Pod
          type: string
          jsonPath: .status.podName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
