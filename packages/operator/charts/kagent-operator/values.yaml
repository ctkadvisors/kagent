# kagent-operator default values.
#
# Override at install time with `--set` or `-f values.local.yaml`. The
# default chart installation watches the release namespace because the
# chart-managed agent-pod ServiceAccount + artifact PVC are namespace-
# local. Set watchAllNamespaces=true only if you provision equivalent
# ServiceAccounts/PVCs in every workload namespace.

# Wave 3 — Identity (v0.4.3-identity) — the embedded SPIRE sub-chart
# at `charts/spire/` is gated by Chart.yaml's `condition:
# identity.enabled`. When that flag is on the sub-chart's templates
# render; when off, helm skips them entirely. The sub-chart's helpers
# additionally inspect `.Values.global.identity.*` so a values overlay
# can override sub-chart specifics without touching the kagent-operator
# values surface — uncomment + adjust the block below to drive the
# sub-chart from the parent.
#
# global:
#   identity:
#     enabled: true
#     trustDomain: 'kagent.knuteson.io'
#     mock:
#       enabled: false

# MUST be 1 in v0.1. The chart's deployment template hard-fails at
# `helm template` time on any other value because the reconcile loop
# isn't coordination-aware — two replicas would race the WS-F suspended-
# publish dispatch sequence. Multi-replica deployments require leader
# election, which lands in v0.2. Until then, the deployment also pins
# `strategy: Recreate` so rolling updates can't briefly have two
# replicas live.
replicaCount: 1

image:
  repository: ghcr.io/ctkadvisors/kagent-operator
  # Defaults to .Chart.appVersion; override here for dev pins.
  tag: ''
  pullPolicy: IfNotPresent

# Image pull secret(s) for private registries. Empty = no secret.
# Example: imagePullSecrets: [{ name: ghcr-pull }]
imagePullSecrets: []

# Namespace to watch for Agent / AgentTask resources. Empty defaults to
# the Helm release namespace in the deployment template.
watchNamespace: ''
# Set true only after provisioning agent-pod ServiceAccounts and artifact
# PVCs in every workload namespace. When true, KAGENT_WATCH_NAMESPACE is
# intentionally empty and the operator uses cluster-wide watch/list paths.
watchAllNamespaces: false

serviceAccount:
  create: true
  # Set to override the auto-generated SA name.
  name: ''
  annotations: {}

# Operator container resources. Defaults are conservative for v0.1
# (single-replica, low traffic); raise when watching many AgentTasks.
resources:
  requests:
    cpu: '50m'
    memory: '128Mi'
  limits:
    cpu: '500m'
    memory: '256Mi'

# M21 — substrate informer health surface. The operator boots an HTTP
# server exposing `/healthz` (200 OK / 503 STALE depending on observed
# informer freshness) and `/metrics` (Prometheus text format,
# `kagent_operator_informer_errors_total` counter). The chart wires the
# port via `KAGENT_HEALTHZ_PORT`; the freshness window via
# `KAGENT_INFORMER_FRESHNESS_MAX_MS`. A liveness probe on `/healthz`
# follows in a v0.1.x patch — for now the surface exists so external
# scrapers + ad-hoc curls can observe operator health.
substrateHealth:
  port: 8081
  freshnessMaxMs: 300000 # 5 minutes; informer silence past this flips /healthz to 503

# Container that runs INSIDE the Pods the operator creates.
agentPod:
  image:
    repository: ghcr.io/ctkadvisors/kagent-agent-pod
    # Defaults to .Chart.appVersion; override here for dev pins.
    tag: ''
    pullPolicy: IfNotPresent
  imagePullSecret: '' # name of secret in the AgentTask's namespace
  # ServiceAccount the agent pod runs as. The chart creates one named
  # 'kagent-agent-pod' with RBAC to patch AgentTask.status; set this
  # to that name (or override) to use it.
  serviceAccountName: 'kagent-agent-pod'
  # Create the kagent-agent-pod ServiceAccount + Role/RoleBinding
  # alongside the operator. The pod uses these to patch its
  # AgentTask's status subresource.
  rbac:
    create: true

  # OpenAI-compat inference endpoint the agent loop calls. When set,
  # the operator injects this as KAGENT_LITELLM_BASE_URL on every
  # spawned agent pod. When empty, agent-pod's env.ts default
  # (`http://litellm.kagent-system.svc.cluster.local:4000/v1`) wins.
  litellmBaseUrl: ''
  # API key for the inference endpoint (Bearer in Authorization header).
  # WS-A security baseline: prefer `secretName` + `secretKey` (so the
  # operator never reads the plaintext into its own memory; instead
  # K8s injects the env via secretKeyRef and the operator passes
  # process.env.KAGENT_AGENT_POD_LITELLM_API_KEY through unchanged).
  # `value` (plaintext) still works but renders a deprecation warning
  # in NOTES.txt. When all three fields are empty, the env is omitted.
  #
  # v0.1.8 secret-hygiene: when `secretName` is set, the chart's
  # deployment template ALSO renders two side env vars holding the
  # original Secret coordinates
  # (`KAGENT_AGENT_POD_LITELLM_API_KEY_SECRET_NAME` and
  # `KAGENT_AGENT_POD_LITELLM_API_KEY_SECRET_KEY`). The operator's
  # `buildJobSpecOptionsFromEnv` reads these and forwards
  # `valueFrom.secretKeyRef` onto every spawned agent Job — keeping
  # the plaintext out of the spawned Job's etcd object.
  #
  # Example:
  #   litellmApiKey:
  #     secretName: cloudflare-ai-gateway
  #     secretKey: api-key
  litellmApiKey:
    secretName: ''
    secretKey: ''
    value: ''

  # OTLP/HTTP traces endpoint (Langfuse-compatible). When set, the
  # operator injects OTEL_EXPORTER_OTLP_TRACES_ENDPOINT into every
  # spawned agent pod, and agent-pod's main wires OtelTraceSink.
  otlpEndpoint: ''
  # OTLP/HTTP comma-separated headers (e.g.,
  # 'authorization=Bearer%20<pk>'). Same secret-ref shape as
  # litellmApiKey above — prefer secretName + secretKey; `value` is
  # deprecated.
  #
  # For Langfuse 4.x, include `x-langfuse-ingestion-version=4` so the
  # OTel ingester routes through the v4 schema path. The full header
  # string typically looks like:
  #   'authorization=Bearer%20<pk>,x-langfuse-ingestion-version=4'
  # OTel parses comma-separated headers and URL-decodes each value, so
  # pre-encode any spaces (`%20`) in the bearer token.
  otlpHeaders:
    secretName: ''
    secretKey: ''
    value: ''

  # Trace content-capture mode — governs whether the OtelTraceSink
  # attaches input messages / output content / tool arguments + results
  # to spans. One of `none|preview|full`. Default is `preview` (per-
  # string head-truncation; outer JSON shape preserved). `full` emits
  # complete bodies — opt in only when you need full-fidelity debugging
  # in Langfuse and accept the storage + privacy implications. `none`
  # keeps only token usage + metadata on the spans.
  #
  # `artifact-ref` is reserved for a future mode that writes full
  # bodies to the kagent-artifacts PVC and emits an `inline://` ref;
  # the agent-pod env parser rejects it until the Phase 5 P3 artifact
  # writer ships.
  traceContentMode: 'preview'

  # Built-in tool configuration — see packages/agent-pod/src/builtin-tools.ts.
  # Today this only carries the HTTP-fetch domain allowlist; future
  # built-ins (rss_fetch, extract_text) honor the same allowlist.
  builtinTools:
    # Domain allowlist for `http_get` / `rss_fetch`. DEFAULT-DENY:
    # an empty list means no outbound HTTP via built-in tools.
    #
    # Match semantics (case-insensitive; see
    # packages/agent-pod/src/builtin-tools.ts isHostAllowed +
    # builtin-tools.test.ts:109):
    #   1. exact host match: entry `arxiv.org` allows `arxiv.org`.
    #   2. sub-domain match: entry `arxiv.org` ALSO allows
    #      `xxx.arxiv.org` and `a.b.arxiv.org`.
    # No glob, no regex. To restrict to a single host, list its
    # FQDN with the prefix you actually use; e.g. list
    # `feeds.example.com` (not `example.com`) if you don't want
    # `evil.example.com` accepted by extension. The DNS-resolution
    # SSRF guard still rejects any returned address in private /
    # loopback / link-local ranges, but the host-allowlist is the
    # first gate.
    #
    # The chart joins this list with `,` and forwards as the
    # KAGENT_AGENT_POD_HTTP_ALLOW_DOMAINS env var on the operator
    # Deployment; operator's buildJobSpecOptionsFromEnv re-emits it
    # as KAGENT_BUILTIN_TOOLS_HTTP_ALLOW_DOMAINS on every spawned Job.
    #
    # Example for the homelab researcher workload:
    #   httpAllowDomains:
    #     - 'news.ycombinator.com'   # also allows news.ycombinator.com sub-paths and any sub-domain
    #     - 'hnrss.org'
    #     - 'lobste.rs'
    httpAllowDomains: []

  # WS-K — substrate kill switch for the in-pod `spawn_child_task` tool.
  # Default off so an install where the value isn't deliberately set
  # stays free of the substrate write tool. When enabled, the agent-pod
  # registers spawn_child_task alongside the built-in network tools;
  # which agents may be spawned is gated per-Agent by
  # `Agent.spec.allowedChildAgents` (fail-closed when empty/unset), and
  # the `Agent.spec.maxConcurrentChildren` cap (default 10) bounds the
  # blast radius of a runaway loop.
  #
  # Operator-level RBAC for `agenttasks: [create]` is granted on the
  # agent-pod ServiceAccount unconditionally (templates/agent-pod-rbac.yaml)
  # so a per-Agent enable doesn't require a cluster-admin re-bind; the
  # in-pod tool is the gate, the RBAC is just the floor.
  spawnChild:
    enabled: false

  # v0.1.9 — cluster-level cap on AgentTask spawn-tree depth. Defends
  # against a runaway recursion (Agent A → A → A → ...) by refusing to
  # spawn children that would land deeper than this. Enforced at TWO
  # places that read the same KAGENT_AGENT_POD_MAX_DEPTH env:
  #
  #   1. The in-pod `spawn_child_task` tool refuses with
  #      `policy_denied:depth_exceeded` BEFORE issuing the K8s create —
  #      cheap arithmetic, no API round-trip.
  #   2. The operator's admission reconciler (admission.ts) skips
  #      un-suspending any Job whose KAGENT_TASK_DEPTH exceeds the cap
  #      AND marks the underlying AgentTask Failed via the WS-E
  #      condition-merge pipeline.
  #
  # Per-task depth lives on the AgentTask `kagent.knuteson.io/task-depth`
  # label (root tasks have no label = depth 0). Children inherit
  # `parent + 1` automatically when spawned via the in-pod tool.
  #
  # Default 4: deep enough for orchestrator → fan-out → sub-fanout →
  # validator pipelines, shallow enough that a buggy agent won't fork
  # 1000s of pods before the operator notices.
  maxDepth: 4

  # v0.1.9 context-awareness — substrate-side circuit breaker. When the
  # cumulative input+output tokens for a single AgentTask reach this
  # fraction of the resolved model's context window (declared per class
  # in `agent.modelClasses[<class>].contextWindowTokens` below), the
  # in-pod agent-loop refuses the next LLM call with a substrate-side
  # error instead of letting the upstream provider's
  # `400 context_length_exceeded` land (which is non-retryable terminal
  # per docs/GATEWAY-CONTRACT.md §10).
  #
  # Projected onto the operator deployment as
  # `KAGENT_CONTEXT_SAFETY_THRESHOLD` and forwarded verbatim onto every
  # spawned agent-pod's env. The safety-net is a NO-OP for any task
  # whose resolved class entry doesn't declare `contextWindowTokens`
  # (preserves v0.1.8 behavior) — see docs/CONTEXT-AWARENESS.md §7.
  #
  # Float in (0, 1]. Default 0.95 (5% safety margin for the next
  # call's input budget — we don't pre-flight-estimate per
  # docs/CONTEXT-AWARENESS.md §8).
  contextSafetyThreshold: 0.95

  # v0.1.9 context-awareness — detector trigger point. When utilization
  # passes this fraction AND the agent has not called `spawn_child_task`
  # in the last N=3 iterations, the in-pod detector adds a
  # `context_pressure_ignored` flag to `status.structuralVerdict.suspicious[]`.
  # Observation only — the substrate never auto-spawns.
  #
  # Projected onto the operator deployment as
  # `KAGENT_CONTEXT_PRESSURE_THRESHOLD` and forwarded verbatim onto every
  # spawned agent-pod's env. Like the safety threshold, this is a NO-OP
  # for tasks whose resolved class entry doesn't declare
  # `contextWindowTokens`.
  #
  # Float in (0, 1]. Default 0.7 — early enough to give the prompt
  # author a few iterations to react, late enough to avoid noise on
  # short tasks.
  contextPressureThreshold: 0.7

  # Audit C2.1 BLOCKER #1 (docs/AUDIT-2026-05-06.md) — capability JWT
  # mount is required-by-default. The chart projects this value as
  # KAGENT_CAPABILITY_ALLOW_MISSING onto the operator deployment; the
  # operator forwards the same env onto every spawned agent-pod. The
  # agent-pod's `loadCapabilityOptional` then enforces:
  #
  #   - `KAGENT_CAP_JWT_FILE` env unset (legacy / pre-v0.3.0 deploys
  #     where the chart hasn't yet shipped the per-task cap-Secret
  #     mount): the agent-pod returns `undefined` and runs the legacy
  #     `Agent.spec.allowedChildAgents` claim path. Back-compat door.
  #
  #   - `KAGENT_CAP_JWT_FILE` env set, file MISSING, `allowMissing=false`
  #     (DEFAULT): the agent-pod throws at boot, patches AgentTask
  #     `Failed`, and exits non-zero. Catches the audit's silent
  #     fail-open attack surface where a missing Secret would have
  #     disabled every cap-gated guardrail in the substrate without
  #     any operator-visible signal beyond a single log line.
  #
  #   - `KAGENT_CAP_JWT_FILE` env set, file MISSING, `allowMissing=true`:
  #     fail-OPEN opt-out. The agent-pod logs a loud WARN that names
  #     the flag and states capability enforcement is DISABLED, then
  #     returns `undefined`. ONLY use as a temporary remediation path
  #     while migrating a cluster off broken cap-Secret mounts.
  #
  # Recommendation: leave at `false`. Flip to `true` only as a
  # deliberate, time-boxed escape hatch when an upgrade has broken
  # the cap-Secret mount and you need pods to keep running while you
  # debug the chart-side issue.
  capability:
    allowMissing: false

  # Audit-rev2 M12 follow-up — blackboard cap-claim trapdoor.
  #
  # When the agent-pod boots and the operator-minted capability bundle
  # does NOT carry a `claims.blackboard` slot, the in-pod blackboard
  # tools (`read_blackboard`, `write_blackboard`, `list_blackboard`,
  # `append_blackboard`) ALL gate against the cap-claim ACL. With NO
  # claim and NO override, the tools refuse every call (default-deny
  # — the safe posture).
  #
  # `failOpen: true` flips that to `claims.blackboard = {read: ['*'],
  # write: ['*']}` — i.e. cluster-wide unrestricted read/write across
  # every key the in-process agent can name. This is intentional for
  # development / bootstrap clusters that haven't wired the cap-issuer
  # yet, but it MUST NEVER ship to production silently.
  #
  # The chart-render-time guard in `kagent-operator.validateValues`
  # refuses to install when `failOpen: true` is set without
  # `acknowledgeUnsafe: true` — the operator must say "I know what I'm
  # doing" out loud, in two places, before the chart renders. The
  # agent-pod's main.ts ALSO emits a structured boot-time WARN naming
  # the consequence + the override (defense-in-depth so the runtime
  # log mirrors the chart-time gate).
  #
  # Plumbed env (deployment.yaml + spawned-Job env via main.ts):
  #   KAGENT_BLACKBOARD_FAIL_OPEN=true|false (forwarded onto every
  #   spawned agent-pod's env when failOpen=true).
  blackboard:
    # When true, the agent-pod's blackboard tools default to unrestricted
    # cluster-wide read+write claims. Default false (safe).
    failOpen: false
    # Required-by-default trapdoor acknowledgement. Setting `failOpen:
    # true` WITHOUT also setting this true is rejected at chart-render
    # time. Pair the two only as a deliberate, time-boxed escape hatch.
    acknowledgeUnsafe: false

  # WS-M — AgentTemplate substrate. When enabled:
  #   - the operator boots the template-server on `serverPort`
  #   - the operator-fullname-templates Service exposes it ClusterIP
  #   - every spawned agent-pod Job gets `KAGENT_TEMPLATE_SERVER_URL`
  #     pointing at that Service, plus the in-pod
  #     `ensure_agent_from_template` tool registered when the
  #     `KAGENT_TEMPLATES_ENABLED=true` env knob is on.
  # Same default-OFF posture as `spawnChild` — an install that hasn't
  # deliberately enabled this exposes neither the tool nor the server.
  templates:
    enabled: false
    serverPort: 8081

  # RuntimeClass mapping (WS-C / Phase 6 prep) — `Agent.spec.sandboxProfile`
  # is resolved against this map per-Agent. The operator's reconcile loop
  # NEVER sets a global runtimeClassName: each spawned Job's pod spec gets
  # `runtimeClassName: <runtimeClasses[profile]>` only when the matching
  # entry below is non-empty; an empty string omits the field on the pod
  # spec (use the cluster default — typically `runc`).
  #
  # Operational expectation: Kata Containers must be deployed onto the
  # K3s nodes (e.g. via the Kata K8s deployer) BEFORE flipping
  # `strict: kata` here — otherwise pods that opt into the strict
  # profile will fail to schedule with a missing-RuntimeClass error.
  # See `docs/ROADMAP.md` Phase 6 for the node-side install task.
  #
  # The substrate-side wiring is now done; toggling this value is the
  # last step on the operator side once Kata is on the cluster.
  runtimeClasses:
    default: '' # e.g. 'runc' to be explicit; '' uses the cluster default.
    strict: '' # set to 'kata' once Kata is deployed; '' = treat strict
    #             same as default (use this until Phase 6 ships Kata).

  # Artifact storage — Phase 5 / Platform-Priorities P3. When enabled,
  # the chart provisions a single shared RWX PVC the operator mounts
  # into every agent pod at `mountPath`. The in-pod `write_artifact`
  # tool persists outputs under `<mountPath>/<task-uid>/<name>`; the
  # operator threads the resulting ArtifactRefs into
  # `AgentTask.status.artifacts`.
  #
  # Backed by the homelab's existing SMB-fronted `ai-models-storage`
  # StorageClass per docs/ARTIFACTS.md §3 (RWX, Retain). Swap to MinIO
  # in v0.2 by changing the writer in @kagent/agent-pod; the URI scheme
  # is the swap point. Per-task subdir isolation is sufficient for v0.1
  # (shared PVC across all Agents in the namespace) — escalate to
  # per-Agent PVCs only if mixed-Agent contention shows up under load.
  artifactStorage:
    enabled: true
    # PVC claim name (referenced from the spawned Job's volume mount).
    pvcName: 'kagent-artifacts'
    # Container path the PVC mounts at inside every agent pod. Forwarded
    # to the agent-pod as `KAGENT_ARTIFACTS_DIR` so the in-pod
    # `write_artifact` tool persists outputs under
    # `<mountPath>/<task-uid>/<name>`.
    mountPath: '/var/kagent/artifacts'
    # Per-write byte cap forwarded as KAGENT_ARTIFACT_MAX_BYTES.
    # Refuses any single artifact whose decoded byte length exceeds
    # this value with a `tool_error: write_artifact: artifact too
    # large (...)` error. Default 25 MiB matches the docs/ARTIFACTS.md
    # §7c upper bound (HAR files); raise for browser workloads, lower
    # for tighter substrate budgets. Set to 0 / -1 / non-numeric to
    # have the operator omit the env var (agent-pod falls back to its
    # compiled-in default).
    maxBytes: 26214400
    # PVC size. SMB-backed, so this is the upper bound the StorageClass
    # honors at provisioning time; the underlying SMB share's free
    # space is the real cap.
    size: '10Gi'
    # StorageClass to use. Defaults to the homelab's RWX SMB class;
    # set '' to use the cluster default StorageClass.
    storageClassName: 'ai-models-storage'
    # Access mode. RWX is required so the PVC can be mounted into many
    # concurrent agent pods; ReadWriteOnce would serialize task
    # execution.
    accessMode: 'ReadWriteMany'

# ---------------------------------------------------------------------
# Phase-2 modelClass — substrate-level model routing
# ---------------------------------------------------------------------
# `Agent.spec.modelClass` is a logical capability tier (e.g.
# `tool-caller-default`) that decouples Agent definitions from physical
# model availability. The operator resolves the class to a physical
# model id at AgentTask materialization time using the map below;
# swapping a tier across all Agents is one chart-values edit, not N
# manifest edits.
#
# Default: `{}` (empty map). Ship the chart unopinionated — the
# cluster overlay (`new_localai/`) provides the actual mapping. With
# an empty map, only Agents that declare `spec.model` (the literal
# escape-hatch) resolve; Agents declaring only `spec.modelClass`
# fail loud at AgentTask materialization with
# `unresolvable_model_class: <class> not in cluster config`.
#
# Plumbed env (deployment.yaml):
#   KAGENT_AGENT_MODEL_CLASSES_JSON=<json-encoded map>
#
# When the map is empty, the env var is omitted entirely so the
# operator's parser sees `undefined` and treats it as `{}` (no
# CrashLoop on a fresh install).
#
# Naming convention `<role>-<tier>` per docs/MODEL-ROUTING.md §5:
#   - role  = what the agent does in tool-shape terms
#             (tool-caller, text-generator, reasoner, ...)
#   - tier  = what the cluster operator paid for
#             (default, cheap, fast, strict)
#
# v0.1.9 context-awareness — each entry is now an object
# `{ model, contextWindowTokens? }`. The `model` field is the physical
# model id (same string the LLM gateway resolves via
# `ModelEndpoint.spec.model`); `contextWindowTokens` is the model's
# documented context window in tokens. When set, the operator projects
# it onto the spawned agent-pod as `KAGENT_AGENT_MODEL_CONTEXT_WINDOW`,
# enabling the in-pod safety-net (refusal at `contextSafetyThreshold`,
# default 95%) and the detector flag (`context_pressure_ignored` at
# `contextPressureThreshold`, default 70%). When omitted, the
# context-awareness primitives degrade to no-op for tasks using that
# class — see docs/CONTEXT-AWARENESS.md §4.2.
#
# Pre-v0.1.9 chart wire format (entry as a bare string) is still
# accepted by `parseModelClassesEnv` (normalized to `{ model: <string> }`
# at boot), so existing overlays continue to work without an in-place
# bump. New overlays SHOULD use the object form so context-awareness is
# available end-to-end.
#
# Example overlay value (homelab — workers-ai for tool-callers, local
# Ollama for text generation):
#
#   agent:
#     modelClasses:
#       tool-caller-default:
#         model: 'workers-ai/@cf/meta/llama-4-scout-17b-16e-instruct'
#         contextWindowTokens: 131072
#       text-generator-default:
#         model: 'ollama/nemotron-3-nano:4b'
#         contextWindowTokens: 8192
#       reasoner-default:
#         model: 'workers-ai/@cf/meta/llama-4-scout-17b-16e-instruct'
#         contextWindowTokens: 131072
agent:
  # Map of `Agent.spec.modelClass` → entry. Each entry is an object
  # `{ model: <string>, contextWindowTokens?: <positive integer> }`.
  # The bare-string form (entry value is a model id) is accepted for
  # back-compat and normalized to `{ model: <string> }` at operator boot.
  # See docs/MODEL-ROUTING.md and docs/CONTEXT-AWARENESS.md §4.2.
  modelClasses: {}

# Wave 1 — CAS
# Content-addressed storage (v0.2.2-cas; docs/SUBSTRATE-V1.md §3.5,
# docs/WAVES.md §3.3). Off by default — flip on once a shared RWX PVC
# exists and the operator + agent-pod images are at v0.2.2-cas+.
#
# When enabled, the operator:
#   1. Mounts the CAS PVC into every spawned agent-pod Job (read-only,
#      via `buildArtifactMounts` — only when the Agent declares an
#      artifact input or output, else no mount is added).
#   2. Runs the CAS GC controller on `gc.intervalSeconds`. The GC walks
#      `<mountPath>/cas/sha256/**`, computes a reachability set from
#      every non-Completed AgentTask's `status.outputs[].ref`, and
#      unlinks blobs that are BOTH older than `retention.default` AND
#      not reachable. Off-by-default; set `cas.gc.dryRun: true` to
#      log eligible blobs without unlinking.
#
# Sharing a backend with the v0.1 `agentPod.artifactStorage` PVC is
# fine (the layouts don't collide — CAS lives under `cas/sha256/`,
# v0.1 artifacts under `<task-uid>/<name>`). Operators may keep both
# pointed at the same volume during the migration window, then drop
# `agentPod.artifactStorage` once all in-flight v0.1 artifacts have
# expired.
cas:
  enabled: false
  # PVC claim name in the AgentTask's namespace. Provision separately
  # (or reuse the existing `kagent-artifacts` PVC if its StorageClass
  # is RWX).
  pvcName: 'kagent-cas'
  # Container path the PVC mounts at inside every agent-pod (when the
  # Agent declares an artifact I/O). Operator-side GC walks the same
  # path on its own filesystem (the operator pod must mount it too —
  # see `templates/deployment.yaml`).
  mountPath: '/var/kagent/cas'
  retention:
    # Default retention window for any blob not reachable from a live
    # AgentTask. Format: integer + unit (`s|m|h|d`); single-unit only
    # (composite forms like `1d6h` are rejected). The GC refuses to run
    # with retention < 1 minute (defense in depth against typos).
    default: '7d'
  gc:
    # Tick interval for the GC sweep (seconds). Each tick walks the
    # CAS tree once + checks reachability. Default 1h matches a
    # conservative "low-pressure" sweep cadence; raise on high-churn
    # workloads, lower on disk-tight clusters.
    intervalSeconds: 3600
    # When true, the GC logs eligible blobs but does NOT unlink. Use
    # this BEFORE flipping retention down on a populated PVC to make
    # sure the reachability set is what you think it is.
    dryRun: false

# Wave 3 — Cache
# ---------------------------------------------------------------------
# v0.4.2-cache — per-Agent persistent caches keyed by sha256 of a
# rendered template. See docs/WAVES.md §5.3 + docs/SUBSTRATE-V1.md §3.5.
#
# Cache identity:
#   sha256( "<template-rendered>" )
#
# The default template (`Agent.spec.caches[].key: 'default'`) sugars to
#   `{input_artifact_hashes}+{image_digest}+{model_name}`
# so a re-run with the same image, model, and input artifact hashes
# resolves to the same URI → cache hit. Cache miss is NEVER an error;
# the agent runs cold and may populate the slot lazily.
#
# Cache and CAS share the same on-disk sharding (`<root>/cache/sha256/<2>/<62>/...`
# vs. `<root>/cas/sha256/<2>/<62>/...`); the same disk-walk + dedup
# tooling backs both, so `cache.pvcName` MAY equal `cas.pvcName`. Default
# is to share the CAS PVC so operators don't have to provision two RWX
# volumes for a substrate that only writes a few MB of cache per task.
#
# What v0.4.2 ships:
#   - `Agent.spec.caches[]` schema (CRD + TS + drift check)
#   - `@kagent/cache-controller` package (pure-functional)
#   - `buildCacheMounts` helper in operator job-spec.ts
#   - cache.hit / cache.miss audit events
#   - this Helm block + KAGENT_CACHE_* env wiring
#
# What's deferred (forward-compat, no breaking change required):
#   - Reconciler-side auto-call of buildCacheMounts (requires the
#     upstream artifact-hash resolver, which the CAS sub-team is
#     working on as part of `read_artifact` arg-resolution)
#   - Save-sidecar materialization on `phase=Completed` (the helper
#     `buildCacheSaveCommand` is shipped; the watcher-Job glue lands
#     with the resolver work)
cache:
  enabled: false
  # PVC claim name in the AgentTask's namespace. Defaults to sharing
  # the CAS PVC (`cas.pvcName`) when set, else `kagent-cache`. Provision
  # separately when you want CAS and cache GC retention to diverge.
  pvcName: 'kagent-cache'
  # Container path the PVC mounts at INSIDE THE OPERATOR pod (the
  # operator probes for hits via existsSync). The agent-pod's per-slot
  # mountPath is independent — set per-Agent via Agent.spec.caches[].mountPath.
  mountPath: '/var/kagent/cache'
  # Default retention duration for any cache slot not refreshed by a
  # successful run. Format: integer + unit (`s|m|h|d`); single-unit
  # only. Cache GC piggybacks on the existing CAS GC infra in
  # follow-up wiring; v0.4.2 records the value but does not run a
  # standalone cache-GC sweep.
  defaultRetention: '7d'
  # Helper image used by the restore init-container + save sidecar.
  # busybox is sufficient — we need mkdir / cp / tar.
  helperImage: 'busybox:1.36'

# Wave 5 / GA hardening — per-task capability JWTs. Default OFF so
# existing installs keep the legacy Agent.spec claim shadow until the
# operator has an explicit signing key Secret.
capabilities:
  enabled: false
  # Existing Secret in the release namespace containing the capability
  # signing keypair. Required when enabled=true. Recommended keys match
  # kubernetes.io/tls-style Secrets (`tls.key`, `tls.crt`), but the
  # Secret type may be Opaque.
  signingSecretName: ''
  signingKeyKey: 'tls.key'
  signingPublicKeyKey: 'tls.crt'
  # Optional previous public key in the same Secret, exposed in JWKS
  # during a rotation grace window.
  previousPublicKeyKey: ''
  # Optional JOSE metadata overrides.
  alg: 'ES256'
  kid: ''
  issuer: 'kagent.knuteson.io/operator'
  # Mounted path inside each spawned agent-pod where the operator writes
  # the per-task JWT Secret.
  jwtFile: '/var/kagent/cap/cap.jwt'
  # Override only when the JWKS endpoint is exposed through a different
  # in-cluster Service. Empty uses this chart's template-server Service.
  jwksUrl: ''

# LLM gateway integration (spec §3, §3.2 admission flow). Off by default
# — kagent works without the gateway (agents talk to backends via
# litellmBaseUrl as today). Set enabled=true to:
#   1. Inject KAGENT_ADMISSION_CONTROL_ENABLED=true so the operator's
#      admission reconciler suspends new Jobs on creation and un-suspends
#      them based on per-(model, backend) capacity declared via
#      ModelEndpoint CRs.
#   2. Inject KAGENT_LLM_GATEWAY_BASE_URL into spawned agent-pods so they
#      route LLM calls through the gateway instead of directly to the
#      backend (the gateway then enforces its own AIMD-tuned cap as
#      last-resort safety; see spec §3.5).
# The gateway itself is a separate sub-chart at
# packages/llm-gateway/charts/llm-gateway/ — install it independently
# before flipping this on, OR depend on it via umbrella chart in v0.2.
# v0.1.6 — Langfuse-managed system prompts. When enabled, the operator
# threads KAGENT_LANGFUSE_HOST + creds into spawned agent-pods so they
# fetch their `Agent.spec.systemPromptRef` body from Langfuse at boot.
# Off by default — agents without a systemPromptRef are unaffected.
langfuse:
  enabled: false
  # In-cluster service URL for the Langfuse web pod.
  host: 'http://langfuse-web.langfuse-system.svc.cluster.local:3000'
  # Public + secret API key for the project the agent prompts live in.
  # Created via the Langfuse UI after first install (Project Settings →
  # API Keys → Create new API key). Drop both into a Secret in this
  # release namespace and reference it here.
  apiKey:
    secretName: ''
    publicKeyKey: 'public'
    secretKeyKey: 'secret'

llmGateway:
  enabled: false
  # In-cluster Service URL of the gateway's /v1 endpoint. Default points
  # at the gateway sub-chart's default Service in kagent-system.
  baseUrl: 'http://kagent-llm-gateway.kagent-system.svc.cluster.local:4000/v1'
  # Bearer token Secret the operator threads into spawned agent-pods so
  # they can authenticate to the gateway. Mirrors the existing
  # agentPod.litellmApiKey shape.
  apiKey:
    secretName: ''
    secretKey: 'token'

# Wave 0 sub-team Audit (v0.1.15-audit-stream). When enabled (default),
# every substrate decision (admission, capability mint, secret access,
# spawn, completion, contract violation, quota breach) emits a
# CloudEvents-shaped record on the NATS JetStream `audit` stream per
# docs/SUBSTRATE-V1.md §4.3.
#
# The stream is provisioned by a Helm post-install/post-upgrade Job
# (`templates/audit-stream.yaml`) that runs `nats stream add/update`
# against the configured NATS URL. The operator + agent-pod read
# `KAGENT_AUDIT_NATS_URL` and connect via `@kagent/audit-events`'s
# `AuditPublisher`; failure to connect is best-effort and does NOT
# break the substrate (per `AuditPublisher`'s graceful no-op contract).
#
# To disable audit emission entirely (e.g. tests, local-dev installs
# without a NATS server) set `audit.enabled: false`. The operator
# still runs; emission sites become no-ops.
audit:
  enabled: true
  # In-cluster NATS URL. Default points at the namespace-local
  # `nats` Service installed by the upstream nats-io/nats Helm chart.
  # Override when NATS lives in a different namespace.
  natsUrl: 'nats://nats.kagent-system.svc.cluster.local:4222'
  # JetStream stream sizing — defaults match the SOC2-shaped retention
  # described in SUBSTRATE-V1.md §4.3. MaxBytes caps disk footprint so
  # a noisy emission storm can't fill the JetStream PVC; MaxAge bounds
  # how long events sit in the stream before NATS reclaims (the audit
  # warehouse is expected to scrape from this stream and persist
  # long-term independently).
  maxBytes: '10GB'
  maxAge: '720h' # 30 days
  # Stream replica count — single-node JetStream by default (matches
  # the v0.1 single-node setup in
  # `packages/operator/charts/values-references/nats-jetstream.yaml`).
  # Bump to 3 once NATS clustering is in place (v0.2).
  replicas: 1
  # Subject prefix the stream binds to (`<prefix>.>`). Every audit
  # event publishes to `<prefix>.<eventType>` — eg
  # `audit.task.admitted`, `audit.capability.minted`. Override only
  # when running side-by-side with another consumer that already owns
  # the `audit` namespace.
  subjectPrefix: 'audit'
  # Provisioning Job image. nats-box bundles the `nats` CLI we need
  # for `nats stream add/update`; the operator's runtime image
  # deliberately does NOT.
  image: 'natsio/nats-box:0.14.5'

# Wave 0 sub-team Entry — KagentSchedule controller + HMAC-signed
# webhook receiver. Default OFF (matches the WS-M / WS-K posture).
# When enabled:
#   - operator opens an informer on KagentSchedule CRDs and ticks once
#     per minute on a UTC wall clock; matched schedules mint AgentTasks
#   - the webhook receiver binds on `webhook.port` (default 8088); the
#     webhook-service.yaml Service exposes it ClusterIP
#   - optional Ingress (off by default) routes off-cluster callers to
#     POST /webhook/<trigger-id>
#
# Per-trigger HMAC secrets live in the chart-managed
# `<release>-trigger-secrets` Secret with one key per trigger id; the
# operator deployment mounts those keys as env (`KAGENT_TRIGGER_SECRET_<ID>`)
# so a leaked URL slug without the matching secret returns 401.
#
# Both routes use a Wave 0 placeholder capability (annotation
# `kagent.knuteson.io/placeholder-cap: wave0-shared-all-rights` on
# minted AgentTasks) until Wave 2 ships per-trigger caps.
triggers:
  enabled: false
  webhook:
    # TCP port the operator binds the receiver on. The Service forwards
    # to the same `webhook` named port on the operator container.
    port: 8088
    # Optional Ingress — off by default. Flip on AND set host + tls when
    # off-cluster callers (GitHub, Pingdom, ...) need to reach the
    # receiver. The HMAC signature is the trust boundary — there is no
    # source-IP allowlist or TLS client-cert validation.
    ingress:
      enabled: false
      host: ''
      className: ''
      annotations: {}
      tls: []
  # Map of HMAC secrets, keyed by trigger id. The chart materializes a
  # Secret named `<release>-trigger-secrets` whose data keys are the
  # uppercased trigger ids (e.g. `DAILY-RESEARCH` → key `DAILY_RESEARCH`)
  # and whose env-mounted form on the operator deployment is
  # `KAGENT_TRIGGER_SECRET_DAILY_RESEARCH=<secret>`. Set values via Helm
  # secrets / sops / ExternalSecrets — committing plaintext here is a
  # security antipattern.
  #
  # Example:
  #   secrets:
  #     daily-research: 'shared-with-github-action'
  #     ops-pingdom: 'shared-with-pingdom'
  secrets: {}

# ---------------------------------------------------------------------
# Wave 2 — Supervision
# ---------------------------------------------------------------------
# Erlang/OTP-style supervision strategies for AgentTask trees
# (v0.3.1-supervision). When `enabled: true` (default — supervision
# is the substrate's job, not application opt-in), every AgentTask
# transition to phase=Failed runs through the supervision router:
#
#   1. failure-classifier separates structured violations (supervision
#      applies) from infra faults (K8s Job backoffLimit handles)
#   2. for structured failures, the parent's Agent's
#      `supervisionStrategy` (Agent.spec.supervisionStrategy; default
#      `one_for_one`) drives the action set per
#      `@kagent/supervision`'s evaluateStrategy()
#   3. `Agent.spec.maxRestarts` (default 3) bounds restart loops —
#      tasks past the cap fail-closed with `reason:
#      restart_limit_exceeded`
#
# Plumbed env (deployment.yaml):
#   KAGENT_SUPERVISION_ENABLED=true|false
#   KAGENT_SUPERVISION_DEFAULT_STRATEGY=one_for_one|one_for_all|rest_for_one|escalate
#   KAGENT_SUPERVISION_MAX_RESTARTS=<integer>
#
# RBAC: see `templates/clusterrole.yaml` "Wave 2 — Supervision"
# block (no new verbs required; agents:get,list,watch +
# agenttasks/status:get,patch,update from existing rules cover it).
supervision:
  # Substrate-level — leave on. Set `false` only for tests / installs
  # that explicitly want every Failed AgentTask to terminate without
  # any restart routing. Disabling supervision does NOT disable
  # `infra.fault.observed` audit emission (audit visibility is
  # always-on); it just makes the operator skip the supervision
  # routing path.
  enabled: true
  # Default strategy used when an Agent doesn't declare
  # `Agent.spec.supervisionStrategy`. The Wave 2 brief locks the
  # substrate default at `one_for_one` so existing v0.1 Agents that
  # don't declare the field don't change behavior.
  defaultStrategy: 'one_for_one'
  maxRestarts:
    # Default `Agent.spec.maxRestarts` cap. Each AgentTask gets at
    # most this many restart attempts before the operator
    # fails-closed with `reason: restart_limit_exceeded`. Setting 0
    # disables restarts entirely (first failure is terminal).
    default: 3

# ---------------------------------------------------------------------
# v0.1.7-rig.2 — substrate verifier reconciler. Two dispatch paths:
# scriptRef (Job spawn) + llmJudgePromptRef (gateway call). Default
# OFF — same posture as `agentPod.spawnChild`, `agentPod.templates`,
# `workflows`, etc. An install that hasn't deliberately enabled this
# never spawns verifier Jobs and never touches the gateway with judge
# prompts.
#
# When `enabled: true`, the operator boots the verifier reconciler
# (packages/operator/src/verifier.ts) alongside the existing AgentTask
# informer paths. On every Completed-phase event, the reconciler
# checks `AgentTask.spec.verifyContract`; when set + idempotent, it
# dispatches:
#
#   1. `scriptRef` path — operator creates a one-shot K8s Job
#      (ownerRef → AgentTask, ConfigMap-mounted input.json carrying
#      the parent's `result` + `payload`). Exit 0 → passed:true,
#      non-zero → passed:false. activeDeadlineSeconds defaults to
#      `script.timeoutSeconds` (60).
#   2. `llmJudgePromptRef` path — operator fetches the prompt from
#      Langfuse, renders {{outputs}} with parent.status.result, POSTs
#      to KAGENT_LLM_GATEWAY_BASE_URL/chat/completions. Response shape
#      `{verdict: "pass"|"fail", reason: string}` gates the result.
#      Gateway timeout → `verifier_timeout`; non-200 →
#      `gateway_error:<status>`; non-JSON → `verifier_returned_non_json`.
#
# The schema field `AgentTask.spec.verifyContract` shipped in
# v0.3.0-capabilities (forward-compat). This release lights up the
# reconciler-side runner per docs/WAVES.md §6.3 deliverable 7.
#
# Plumbed env (deployment.yaml):
#   KAGENT_VERIFIER_ENABLED=true|false
#   KAGENT_VERIFIER_DEFAULT_MODEL=<gateway model name>
#   KAGENT_VERIFIER_SCRIPT_IMAGE=<container image for scriptRef Jobs>
#
# Reuses the operator's existing KAGENT_LLM_GATEWAY_BASE_URL +
# KAGENT_LLM_GATEWAY_API_KEY (chart's `llmGateway` block) for the
# llmJudge path's gateway call, and KAGENT_LANGFUSE_HOST + creds
# (chart's `langfuse` block) for the prompt fetch.
#
# RBAC: NO new verbs required — the verifier creates Jobs +
# ConfigMaps + patches AgentTask status, all already covered by the
# operator's existing ClusterRole.
verifier:
  enabled: false
  # Default model used for llmJudge dispatch when the prompt template
  # doesn't carry one in its body. Falls back to the parent Agent's
  # model in a future revision; for v0.1.7-rig.2 this value is the
  # operator-side default. Empty string = let the gateway pick.
  defaultModel: 'gpt-4o-mini'
  # Container image for scriptRef-mode Jobs. The image is responsible
  # for reading /var/kagent/verify/input.json + KAGENT_VERIFIER_SCRIPT_NAME
  # env, executing the substrate-stored script body, and exiting 0
  # (pass) or non-zero (fail). Override per install when a private
  # registry hosts the runner image.
  scriptImage: 'ghcr.io/ctkadvisors/kagent-verifier-runner:0.1.7-rig.2'

# ---------------------------------------------------------------------
# Wave 1 — Workspace
# ---------------------------------------------------------------------
# Workspace primitive (per docs/SUBSTRATE-V1.md §3.4): pre-populated,
# shared filesystem mounted across multiple AgentTasks in a task tree.
# Lifetime is pipeline-run, not per-task. Same checkout, mounted across
# N agents — no re-clone storm. RWX storage class required (Longhorn /
# NFS / Ceph).
#
# DEFAULT-OFF until cluster operators verify an RWX storage class is
# available. When `enabled: true`, the operator runs an RWX probe at
# startup AND boots the Workspace controller (informer triplet:
# Workspace + label-selected PVC + clone Job). A failed probe logs
# loudly but DOES NOT crash the operator — Workspace CRs simply stay
# in `phase: Pending`.
#
# Plumbed env (deployment.yaml):
#   KAGENT_WORKSPACES_ENABLED=true|false
#   KAGENT_WORKSPACES_DEFAULT_STORAGE_CLASS=<storageClassName>
#
# RBAC: see `templates/clusterrole.yaml` "Wave 1 — Workspace" block.
# CRD: `crds/workspaces.yaml`.
workspaces:
  enabled: false
  # StorageClass the operator passes to PVCs that don't set their own
  # `spec.pvc.storageClassName`. Empty = use the cluster default.
  defaultStorageClassName: ''
  # Default PVC capacity request when a Workspace doesn't set
  # `spec.pvc.storage`. (Currently CRD-required, but reserved for
  # future GitOps-rendered Workspaces from defaults.) `5Gi` is a
  # conservative starting point — most git-source Workspaces fit.
  defaultStorage: '5Gi'
  # Default TTL for auto-GC after the last consumer task tree
  # completes. Go-style duration; `0` disables GC.
  defaultTtl: '24h'

# ---------------------------------------------------------------------
# Wave 2 — Workflows
# ---------------------------------------------------------------------
# AgentWorkflow primitive (per docs/SUBSTRATE-V1.md §3.3): durable
# orchestrator. Each AgentWorkflow's runtime image consumes
# @kagent/agent-workflow-runtime + @restatedev/restate-sdk; the
# operator's controller deploys the image, registers it via Restate's
# admin API, and wires triggers via Wave 0 Entry.
#
# DEFAULT-OFF until cluster operators have deployed Restate. When
# `enabled: true`, the operator runs the AgentWorkflow controller's
# informer triplet (AgentWorkflow + label-selected Deployment +
# label-selected Service). Failed registration leaves the workflow in
# `phase: Pending` with a clear status condition; the controller
# retries on every reconcile event.
#
# Plumbed env (deployment.yaml):
#   KAGENT_WORKFLOWS_ENABLED=true|false
#   KAGENT_WORKFLOWS_RESTATE_ADDRESS=http://...:8080
#   KAGENT_WORKFLOWS_RESTATE_ADMIN_ADDRESS=http://...:9070
#
# RBAC: see `templates/clusterrole.yaml` "Wave 2 — Workflows" block.
# CRD: `crds/agentworkflows.yaml`.
#
# Restate sub-chart sizing: the operator does NOT install Restate as
# part of this chart in v0.3.2 — that's intentionally separate so a
# cluster operator can swap in a managed Restate later. v0.3.2 ships
# the AgentWorkflow controller + the env plumbing; expect to install
# Restate independently (`restatedev/restate-helm` or equivalent) and
# point KAGENT_WORKFLOWS_RESTATE_ADDRESS at the resulting Service.
# v0.5 lifts a single-node Restate sub-chart into this repo.
workflows:
  enabled: false
  # In-cluster URL of Restate's HTTP/2 ingress. Default points at the
  # standard Restate Helm install; override when Restate lives in a
  # different namespace or a different Service name.
  restate:
    # Override per-AgentWorkflow via spec.restateAddress.
    address: 'http://restate.kagent-system.svc.cluster.local:8080'
    # Admin API URL (Restate registers deployments here). Default:
    # same host as `address`, port 9070 (Restate convention).
    adminAddress: 'http://restate.kagent-system.svc.cluster.local:9070'

# ---------------------------------------------------------------------
# Wave 3 — Locality
# ---------------------------------------------------------------------
# Co-locate agent-pods with their Workspace's PVC node, dedup slow
# tasks via speculative twins, and back-pressure admission against
# pending-pod overload (v0.4.4-locality, per docs/SUBSTRATE-V1.md +
# docs/WAVES.md §5.5).
#
# Three independent toggles:
#
#   - `enabled` (NodeAffinity from Workspace placement). When the
#     Workspace's bound PV is node-pinned, the operator emits
#     `requiredDuringSchedulingIgnoredDuringExecution` on the
#     spawned pod so K8s lands the agent-pod on the SAME node as the
#     PV. Turns a cross-node RWX hop into a local FS read. ON by
#     default — additive when no node-pinned PV exists; degrades
#     gracefully (no affinity emitted) when the Workspace controller
#     is off or the PV's nodeAffinity is absent.
#
#   - `speculative.enabled` (speculative duplicate spawning). When
#     an AgentTask runs > `speculative.threshold` × per-Agent median
#     latency, the operator spawns a duplicate with the SAME
#     idempotency key. The Wave 1 idempotency cache (24h) prevents
#     double-effect — the slower one's run is discarded; status →
#     `superseded`. OFF by default — speculative doubles spawns and
#     budget; opt in once latency is your bottleneck.
#
#   - `circuitBreaker.enabled` (pod-pressure backstop). When the
#     pending agent-pod count > `circuitBreaker.maxPendingPods`,
#     admission refuses new dispatches with
#     `policy_denied:pod_pressure_threshold`; the AgentTask stays
#     Pending and re-evaluates on the next informer event. ON by
#     default — substrate-side safety against pending-pod overload.
#
# Plumbed env (deployment.yaml):
#   KAGENT_LOCALITY_ENABLED=true|false
#   KAGENT_LOCALITY_SPECULATIVE_ENABLED=true|false
#   KAGENT_LOCALITY_SPECULATIVE_THRESHOLD=<float, default 3.0>
#   KAGENT_LOCALITY_CIRCUIT_BREAKER_ENABLED=true|false
#   KAGENT_LOCALITY_MAX_PENDING_PODS=<integer, default 50>
#
# RBAC: existing operator ClusterRole already covers PV/PVC/Workspace
# reads via the workspace-controller block — no new verbs needed.
locality:
  # NodeAffinity from Workspace placement. Substrate-level — leave on.
  # Set `false` when running in clusters whose CSI doesn't expose
  # node-pinned PVs (cloud RWX without topology) so the operator
  # doesn't waste GET cycles on a futile lookup.
  enabled: true
  speculative:
    # OFF by default. Speculative twin spawns DOUBLE the LLM token
    # spend on slow tasks; turn on only when latency is the
    # bottleneck.
    enabled: false
    # Multiplier vs. per-Agent median latency. `elapsed > threshold ×
    # median` triggers the duplicate. 3.0 catches genuine outliers
    # without firing on normal variance; lower = more aggressive.
    threshold: 3.0
  circuitBreaker:
    # ON by default. Substrate safety — refuses to admit when too
    # many pods are pending.
    enabled: true
    # Pending-pod cap above which admission defers. 50 fits a single
    # K3s node comfortably; bump for multi-node clusters with
    # adequate scheduler capacity.
    maxPendingPods: 50

# ---------------------------------------------------------------------
# Wave 3 — Identity (v0.4.3-identity)
# ---------------------------------------------------------------------
# SPIFFE/SPIRE per-pod SVID issuance + mTLS LLM-gateway hand-off.
# Default OFF — when off the operator continues with the Wave 0
# secrets-hygiene bearer-token path (KAGENT_LITELLM_API_KEY via
# secretKeyRef). When on, the embedded SPIRE sub-chart at
# `charts/spire/` is rendered: a single-node SPIRE Server StatefulSet
# + a SPIRE Agent DaemonSet exposing the Workload-API UDS at
# `hostPath: /run/kagent-spire/sockets`. Spawned agent-pods receive
# the mount + KAGENT_LITELLM_USE_SVID=true env, switching their LLM
# client into mTLS mode (graceful fall-back to bearer when the
# gateway lacks mTLS — see GATEWAY-CONTRACT.md §4.3).
#
# Plumbed env (deployment.yaml):
#   KAGENT_IDENTITY_ENABLED=true|false
#   KAGENT_IDENTITY_TRUST_DOMAIN=kagent.knuteson.io
#   KAGENT_IDENTITY_MOCK_ENABLED=true|false
#   KAGENT_AGENT_POD_LITELLM_USE_SVID=true|false  (forwarded to spawned Jobs)
#   KAGENT_AGENT_POD_SPIRE_HOST_SOCKET_DIR=/run/kagent-spire/sockets
#
# Mock mode: when `mock.enabled=true` AND `enabled=true`, the SPIRE
# sub-chart renders ZERO real workloads (just a marker ConfigMap).
# The operator's IdentityWatcher fires synthetic identity.svid_issued
# audit events from a test fixture, exercising the audit pipeline +
# dashboards without bringing real SPIRE up. Useful for first-bringup
# clusters where SPIRE install is deferred to a follow-up cluster-ops
# PR. Default OFF (real SPIRE is the path forward).
#
# RBAC: SPIRE-required verbs live in the sub-chart's own ClusterRoles
# (charts/spire/templates/{server,agent}.yaml). The parent operator's
# ClusterRole adds NO Wave 3 verbs (the operator does NOT register
# SPIRE entries directly in v0.4.3 — the SPIRE Server's own k8s_psat
# attestor binds workloads to entries). When the Wave 3 follow-up
# wires a kagent-side RegistrationEntry controller, that controller's
# verbs go under the section header in `templates/clusterrole.yaml`
# "Wave 3 — Identity" already reserved there.
#
# infra/spire/ values block (forwarded to the sub-chart at chart
# install/upgrade time via `global:` namespacing):
identity:
  # Master switch. Default OFF — bearer-token auth (Wave 0) stays
  # canonical until ops flips this on AND validates SPIRE health.
  enabled: false
  # Trust domain stamped on every kagent-issued SPIFFE ID. MUST match
  # the operator's `buildSpiffeId` default + the spire sub-chart's
  # server config. Override BOTH ends in lockstep.
  trustDomain: 'kagent.knuteson.io'
  # The agent-pod's LLM client switches into mTLS mode when this is
  # true. When `enabled=false`, this is forced to false regardless.
  litellmUseSvid: true
  # Mock-mode flag — see comment block above. When true, the SPIRE
  # sub-chart renders zero real workloads and the operator fires
  # synthetic SVID events from a test fixture. Useful for dev/CI.
  mock:
    enabled: false
  # SPIRE Workload-API socket layout. Mirror of
  # DEFAULT_SPIRE_HOST_SOCKET_DIR / DEFAULT_SPIRE_SOCKET_PATH in
  # packages/operator/src/identity.ts. The sub-chart exposes the
  # Agent UDS at `hostSocketDir/agent.sock`; spawned agent-pods
  # receive a hostPath volumeMount on the same dir + the
  # KAGENT_SPIRE_SOCKET_PATH env pointing at the in-pod path.
  hostSocketDir: '/run/kagent-spire/sockets'
  podSocketPath: '/run/kagent-spire/sockets/agent.sock'

  # ------------------------------------------------------------------
  # infra/spire/ — SPIRE sub-chart values forwarded via the helm
  # `global:` mechanism. Cluster operators usually leave these defaults
  # alone; tune at the spire/ values.yaml layer when you need richer
  # control (image registry mirror, log level, resource sizing).
  # ------------------------------------------------------------------
  spire:
    # Image overrides — pin tags in production; loose tags in dev.
    server:
      image:
        repository: 'ghcr.io/spiffe/spire-server'
        tag: '1.9.0'
    agent:
      image:
        repository: 'ghcr.io/spiffe/spire-agent'
        tag: '1.9.0'

# ---------------------------------------------------------------------
# Wave 3 — Blackboard
# ---------------------------------------------------------------------
# Per-task-tree NATS JetStream KV bucket (per docs/SUBSTRATE-V1.md §3.7
# + WAVES.md §5.2). One bucket per root AgentTask
# (`kagent-kv-<root-uid>`); GC'd on root completion + ttl. The four
# built-in tools (`read_blackboard`, `write_blackboard`,
# `list_blackboard`, `append_blackboard`) gate against a per-Agent
# `capabilityClaims.blackboard.{read,write}` glob ACL.
#
# Plumbed env (deployment.yaml):
#   KAGENT_BLACKBOARD_ENABLED=true|false  — operator-side switch
#   KAGENT_NATS_URL=...                   — shared with dispatcher /
#                                           audit / capability registry
#
# Per spawned-Job env (agent-pod side, set by job-spec.ts):
#   KAGENT_BLACKBOARD_BUCKET=kagent-kv-<root-uid>
#
# The agent-pod runtime registers the four tools when both
# KAGENT_BLACKBOARD_BUCKET and KAGENT_NATS_URL are set; otherwise the
# tools are absent from the registry — an LLM that tries to call them
# gets the executor's standard "unknown tool" error.
#
# Subject namespace: `kagent.kv.*` (Wave 3 / Blackboard sub-team's
# slice). Events owns `kagent.events.*`; both teams share NATS.
blackboard:
  # Operator-side switch. When false, the operator does NOT provision
  # buckets on root admission and does NOT GC on root completion. Per-
  # Job env still gets stamped (via job-spec.ts) — the agent-pod's
  # connect attempt will materialize buckets on first write (NATS
  # views.kv is get-or-create). Set false to opt out cleanly.
  enabled: true
  # Default bucket TTL in seconds. The operator overrides this per-
  # bucket from `AgentTask.spec.runConfig.timeoutSeconds` when set.
  # Mirrors the Workspace TTL default (24h) so a typical pipeline has
  # the same scratch-FS + scratch-KV horizon.
  defaultTtlSeconds: 86400
  # Per-value byte cap. Refused at the agent-pod tool layer + the NATS
  # bucket level. Bound runaway agent writes.
  maxValueBytes: 1048576 # 1 MiB
  # Per-bucket total byte cap.
  maxBucketBytes: 67108864 # 64 MiB

# ---------------------------------------------------------------------
# Wave 3 — Events
# ---------------------------------------------------------------------
# Typed pub/sub on `kagent.events.*` JetStream stream per
# docs/SUBSTRATE-V1.md §3.7 + docs/WAVES.md §5.1. Off by default.
# When enabled the operator:
#
#   1. Connects to NATS at `events.natsUrl` (default: same as audit).
#   2. Provisions the `kagent-events` stream idempotently
#      (subjects=`kagent.events.>`, retention `events.retention.maxAgeMs`).
#   3. Watches `Agent.spec.subscribes[]` and provisions a durable
#      pull-consumer per (Agent, topic). On event delivery, mints an
#      AgentTask with `inputs[trigger.inputBinding] = { scalar:
#      <event.data> }` (or as `spec.payload` when the trigger declares
#      no input binding).
#
# Threaded env (deployment.yaml):
#   KAGENT_EVENTS_ENABLED=true|false
#   KAGENT_EVENTS_NATS_URL=<nats url>
#   KAGENT_EVENTS_RETENTION_MAX_AGE_MS=<ms>
#   KAGENT_EVENTS_STREAM_REPLICAS=<int>
#
# The agent-pod's `publish_event` built-in tool wires automatically
# when KAGENT_EVENTS_NATS_URL is set on the spawned Job AND the
# Agent declares at least one `publishes[]` topic.
events:
  enabled: false
  # NATS URL for events. Defaults to the same single-replica
  # in-cluster NATS the audit stream uses; override when events lives
  # on a separate cluster.
  natsUrl: 'nats://nats.kagent-system.svc.cluster.local:4222'
  retention:
    # Stream max age (ms). Events are coordination data, not durable
    # application state — short retention forces application-layer
    # projection to do its job. 24h default mirrors the brief.
    maxAgeMs: 86400000
  # Single-node JetStream baseline (matches audit-stream defaults).
  # Bump to 3 once NATS clustering is in place.
  streamReplicas: 1
  # How often the operator re-applies the subscription set against
  # the dispatcher. Re-apply is idempotent (it diffs against active
  # consumers); the periodic tick is a backstop against any missed
  # informer events. 30s is fast enough for human-time GitOps loops.
  reapplyIntervalMs: 30000

# ---------------------------------------------------------------------
# Wave 4 — Tenancy (v0.5.0-tenancy)
# ---------------------------------------------------------------------
# Multi-tenant boundary primitive (per docs/SUBSTRATE-V1.md §3.6 +
# docs/WAVES.md §6.1). When `enabled: true`, the operator runs the
# Tenant controller's informer (cluster-scoped) and threads
# `claims.tenant` into every minted capability bundle. The agent-pod
# stamps `X-Kagent-Tenant` on every gateway call per
# docs/GATEWAY-CONTRACT.md §3.
#
# DEFAULT-OFF — gradual roll-out posture. Existing single-tenant
# installs continue to work unchanged; flipping this on requires the
# cluster admin to provision Tenant CRs declaring the
# namespaceAllowlist for each tenant.
#
# Plumbed env (deployment.yaml):
#   KAGENT_TENANCY_ENABLED=true|false
#   KAGENT_TENANCY_DEFAULT_TENANT=<tenant-name>  (optional fallback)
#
# RBAC: see `templates/clusterrole.yaml` "Wave 4 — Tenancy" block.
# CRD: `crds/tenants.yaml`.
#
# Cross-tenant K8s RBAC (recommended overlay; chart does NOT
# materialize because tenant identities are install-time-known):
#
#   For each tenant `<name>`, the cluster admin creates a Role +
#   RoleBinding in each allowlisted namespace so users in tenant
#   `<name>` can list/watch Agents + AgentTasks ONLY when their
#   metadata.labels.tenant matches. Cite documentation:
#   https://kubernetes.io/docs/reference/access-authn-authz/rbac/
#
# Substrate-level visibility enforcement (refusing one tenant's
# users to LIST another tenant's resources) is K8s RBAC's job — kagent
# stamps the labels and provides the lookup surface; the cluster admin
# composes the per-tenant RoleBindings.
tenancy:
  enabled: false
  # Optional cluster-wide default tenant. Used when an Agent has no
  # tenant label AND no namespace-default exists. Leave empty for the
  # strict "explicit tenant required" posture.
  defaultTenant: ''

# ---------------------------------------------------------------------
# Wave 4 — Egress (v0.5.1-egress)
# ---------------------------------------------------------------------
# Per-Agent network egress allowlist materialized into a NetworkPolicy
# (or CiliumNetworkPolicy when Cilium is detected) per
# `Agent.spec.egress` + the `Tenant.spec.defaultEgress` fallback. See
# docs/SUBSTRATE-V1.md §3.1 + docs/WAVES.md §6.2.
#
# DEFAULT-OFF until network-policy enforcement is verified on the
# cluster's CNI. K3s default flannel does NOT enforce NetworkPolicies;
# Calico, Cilium, Weave, etc. do.
#
# When `enabled: true`, the operator:
#   1. Detects Cilium installation by reading the
#      `kube-system/cilium-config` ConfigMap. Mode `auto` (default)
#      emits Cilium CNP when present, plain NetworkPolicy otherwise.
#      Force the mode with `mode: networkpolicy | cilium`.
#   2. Watches Agent CRs (informer); on add/update calls
#      `applyNetworkPolicyForAgent` which creates / updates the
#      per-Agent policy with `ownerRef'd` back to the Agent CR. On
#      Agent delete, calls `deleteNetworkPolicyForAgent` (ownerRef
#      cascade is the safety net; explicit delete is faster +
#      observable, mirrors workspace-controller pattern).
#   3. Emits `egress.policy_applied` audit events per reconcile.
#
# Default-deny posture: Agents with no `spec.egress` (and no tenant
# `defaultEgress`) get a policy that allows ONLY:
#   - DNS (UDP/TCP 53 to kube-dns service CIDR)
#   - NATS (TCP 4222 to nats.kagent-system Service)
#   - LLM gateway (TCP 4000 to kagent-llm-gateway.kagent-system Service)
# See `packages/egress-controller/src/policy.ts` JSDoc for the exact
# substrate-internal allowlist.
#
# Plumbed env (deployment.yaml):
#   KAGENT_EGRESS_ENABLED=true|false
#   KAGENT_EGRESS_MODE=auto|networkpolicy|cilium
#
# RBAC: see `templates/clusterrole.yaml` "Wave 4 — Egress" block.
egress:
  # Default OFF — flip on after verifying the cluster's CNI enforces
  # NetworkPolicies. Required for the substrate to materialize per-
  # Agent network policies; existing single-tenant installs continue
  # working unchanged when this stays off.
  enabled: false
  # Mode override. `auto` (default) detects Cilium via the
  # `kube-system/cilium-config` ConfigMap and emits Cilium CNP when
  # present, plain NetworkPolicy otherwise. Force the mode here when
  # the auto-detect heuristic doesn't fit your install (e.g. Cilium
  # installed under a non-standard ConfigMap name, or you want to
  # ship plain NetworkPolicy even on a Cilium cluster for testing).
  mode: 'auto'
  # DNS-policy block — when `enabled: true` (default), the
  # default-deny baseline allows DNS resolution + the substrate-
  # internal NATS + LLM gateway endpoints. Disabling this is rarely
  # what you want — an agent-pod that can't resolve any service name
  # cannot function.
  dnsPolicy:
    enabled: true

# ---------------------------------------------------------------------
# Wave 4 — Quotas (v0.5.2-quotas)
# ---------------------------------------------------------------------
# Per-tenant compute / gateway / storage cap enforcement
# (per docs/SUBSTRATE-V1.md §4.2 + docs/WAVES.md §6.3). When
# `enabled: true`, the operator:
#
#   1. Materializes a K8s ResourceQuota per (tenant, namespace) from
#      `Tenant.spec.defaultQuota.compute` (cpuRequests / memoryRequests
#      / maxPods).
#   2. Maintains an in-process per-tenant gateway in-flight counter;
#      AgentTask admission refuses with
#      `policy_denied:tenant_gateway_inflight_exceeded` when the
#      tenant's `defaultQuota.gateway.inFlightCap` is exceeded.
#   3. Runs a periodic CAS walker (`casWalkIntervalMinutes`, default
#      10 minutes) summing per-tenant CAS bytes; admission refuses
#      new tasks for tenants over `defaultQuota.storage.casBytes`
#      with `policy_denied:tenant_storage_exceeded`.
#
# DEFAULT-OFF — gradual roll-out; existing single-tenant installs
# continue working unchanged. Tenancy must also be enabled (cap
# lookups read off the Tenant CR's `defaultQuota`).
#
# Plumbed env (deployment.yaml):
#   KAGENT_QUOTAS_ENABLED=true|false
#   KAGENT_QUOTAS_DEFAULT_GATEWAY_INFLIGHT_CAP=<int>
#   KAGENT_QUOTAS_DEFAULT_CAS_BYTES_GIB=<int>
#   KAGENT_QUOTAS_CAS_WALK_INTERVAL_MINUTES=<int>
#
# RBAC: see `templates/clusterrole.yaml` "Wave 4 — Quotas" block.
# CRD: re-uses `Tenant.spec.defaultQuota` (no new CRD).
quotas:
  enabled: false
  # Default per-tenant gateway in-flight cap. Used when a Tenant CR
  # declares no `defaultQuota.gateway.inFlightCap` override.
  defaultGatewayInFlightCap: 100
  # Default per-tenant CAS storage cap (GiB). Used when a Tenant CR
  # declares no `defaultQuota.storage.casBytes` override.
  defaultCasBytesGiB: 10
  # CAS walker cadence. Lower bound 1 minute (defense against typo'd 0).
  casWalkIntervalMinutes: 10

# ---------------------------------------------------------------------
# Wave 4 — Versioning (v0.5.3-versioning)
# ---------------------------------------------------------------------
# Agent immutability admission webhook + multi-version registry +
# deprecation lifecycle. Per docs/SUBSTRATE-V1.md §3.1 (Agent —
# immutable + versioned) + docs/WAVES.md §6.4.
#
# Once enabled, the operator:
#   1. Refuses any `Agent.spec.*` mutation post-publication via a K8s
#      ValidatingAdmissionWebhook (the only allowed mutation is
#      flipping `kagent.knuteson.io/published: false → true` once).
#   2. Indexes Agents by (name, version). NEW AgentTasks pin to the
#      LATEST version of their target Agent at admission time;
#      in-flight tasks pinned to OLDER versions continue against the
#      immutable older Agent CR.
#   3. Walks the index every hour and classifies each Agent as
#      `active` / `deprecated` / `removed` per its
#      `kagent.knuteson.io/deprecated` + `kagent.knuteson.io/removed-at`
#      annotations. Removed Agents refuse NEW tasks with
#      `policy_denied:agent_removed`; deprecated Agents emit
#      `agent.deprecated_used` warnings (no refusal).
#
# DEFAULT-OFF — gradual roll-out. Cluster operators verify the
# webhook cert provisioning (cert-manager-issued, mounted via the
# `webhook-secret.yaml` template added by this sub-team) BEFORE
# flipping `versioning.enabled: true`. The ValidatingWebhookConfiguration
# is rendered alongside; flipping `enabled: false` un-renders both
# (no orphan webhook config refusing mutations).
#
# Plumbed env (deployment.yaml):
#   KAGENT_VERSIONING_ENABLED=true|false
#
# RBAC: see `templates/clusterrole.yaml` "Wave 4 — Versioning" block.
# CRD additions: `Agent.spec.version: string` is additive on the
# existing Agent CRD; `AgentTask.status.agentVersion: string` is
# additive on the existing AgentTask CRD. Both are optional in the
# OpenAPI schema (back-compat with v0.1 Agents).
versioning:
  enabled: false
  webhook:
    # Service exposing the operator's ValidatingAdmissionWebhook
    # endpoint. Defaults to the operator's existing service. The
    # apiserver POSTs AdmissionReview payloads to
    # `https://<serviceName>.<release-namespace>.svc:443/validate-agents`.
    serviceName: ''
    # K8s ValidatingWebhookConfiguration `failurePolicy`. Default
    # `Fail` (refuse on webhook unreachable) — stricter than the K8s
    # default `Ignore`. Flip to `Ignore` only during initial cert
    # provisioning when the webhook isn't yet healthy.
    failurePolicy: 'Fail'
    # Webhook bind port on the operator container (HTTPS). cert-manager
    # provisions the serving cert; the operator mounts it at /tls.
    port: 9443
    # cert-manager Issuer name in the release namespace. The webhook
    # secret references this issuer via cert-manager.io/inject-ca-from
    # annotations on the ValidatingWebhookConfiguration. Empty leaves
    # the templates in place but unrendered until set.
    certIssuer: ''
    # cert-manager Issuer kind (Issuer | ClusterIssuer). Default
    # Issuer (release-namespace-scoped).
    certIssuerKind: 'Issuer'

# ---------------------------------------------------------------------
# Wave 4 — KeyRotation (v0.5.4-keyrotation)
# ---------------------------------------------------------------------
# Substrate-level rotation policies for SVIDs, capability bundles, and
# (when supported) gateway-tokens. Per docs/WAVES.md §6.5 +
# docs/SUBSTRATE-V1.md §3.10.
#
# Three rotation surfaces composed here:
#
#   1. SVID rotation interval — `svid.intervalHours`. Default 24h;
#      substrate refuses values < 1h (SPIRE workload-API stream's own
#      default) or > 168h / 1 week (SOC2 short-lived-credential
#      ceiling). The Wave 3 Identity watcher's `maybeRotate(...)`
#      consumes this policy on each polled SVID.
#
#   2. Capability bundle TTL — `cap.shortTtlMinutes` +
#      `cap.longTtlGraceSeconds`. Default 1h short-running TTL. Long-
#      running tasks (`runConfig.timeoutSeconds > 3600`) get
#      min(24h, runConfig.timeoutSeconds + grace). 24h is a hard
#      ceiling; substrate clamps to it + emits the `long-running-clamped`
#      tier on the audit envelope.
#
#   3. Gateway-token rotation — `gateway.enabled` toggles; cadence is
#      `gateway.intervalHours` (default 24h). Schedules calls to the
#      gateway's `POST /v1/admin/keys/rotate` per docs/GATEWAY-CONTRACT.md
#      §4. 404 → graceful no-op + `keyrotation.gateway_unsupported`
#      audit emission so operators can spot a deployment whose gateway
#      lacks the contract version.
#
# Audit emissions (additive — catalog 30 → 34):
#   - keyrotation.svid_rotated         (per SVID rotation policy fire)
#   - keyrotation.cap_minted_with_ttl  (per cap mint with TTL tier)
#   - keyrotation.gateway_rotated      (per successful gateway rotation)
#   - keyrotation.gateway_unsupported  (per 404 from gateway)
#
# DEFAULT-OFF for gradual roll-out — existing installs continue to
# work unchanged when `enabled: false`. The gateway sub-flag is
# independent so a deploy can flip on SVID + cap policies without
# committing to a gateway-rotation cadence.
#
# Plumbed env (deployment.yaml):
#   KAGENT_KEYROTATION_ENABLED                    = enabled
#   KAGENT_KEYROTATION_SVID_INTERVAL_HOURS        = svid.intervalHours
#   KAGENT_KEYROTATION_CAP_SHORT_TTL_MINUTES      = cap.shortTtlMinutes
#   KAGENT_KEYROTATION_CAP_LONG_GRACE_SECONDS     = cap.longTtlGraceSeconds
#   KAGENT_KEYROTATION_GATEWAY_ENABLED            = gateway.enabled
#   KAGENT_KEYROTATION_GATEWAY_INTERVAL_HOURS     = gateway.intervalHours
#   KAGENT_KEYROTATION_GATEWAY_URL                = gateway.url (operator-side override)
#   KAGENT_KEYROTATION_GATEWAY_ADMIN_TOKEN        = sourced from K8s Secret (operator-side)
#
# RBAC: see `templates/clusterrole.yaml` "Wave 4 — KeyRotation" block —
# rotation reads existing Secrets only; no new verbs needed.
keyRotation:
  enabled: false
  svid:
    # Rotation cadence the SVID policy enforces. 24h default (SOC2
    # short-lived-credential best practice). 1h ≤ x ≤ 168h.
    intervalHours: 24
  cap:
    # TTL applied to short-running tasks (no `runConfig.timeoutSeconds`
    # OR `<= 3600s`). Default 60 minutes.
    shortTtlMinutes: 60
    # Grace seconds added beyond `runConfig.timeoutSeconds` for
    # long-running tasks. Default 300s ("5min beyond timeout").
    longTtlGraceSeconds: 300
  gateway:
    # Independent sub-flag — flip on once the gateway implements the
    # rotation API per docs/GATEWAY-CONTRACT.md §4. Substrate
    # gracefully no-ops on 404 (gateway lacks the surface).
    enabled: false
    # Cadence the substrate calls `POST /v1/admin/keys/rotate`.
    intervalHours: 24

# Smoke-test manifests — Agent + AgentTask + verification Job aimed at
# the configured agent-pod inference endpoint. Disable in production
# clusters; ship enabled = true on first install to prove the substrate
# works end-to-end.
smokeTest:
  enabled: false
  # Model id passed to the agent loop (verbatim into LiteLLM /
  # OpenAI-compat). For LM Studio: whatever model is loaded
  # (e.g. 'llama-3.2-3b-instruct'). For OpenRouter: the full slug.
  model: 'llama-3.2-3b-instruct'
  # Initial user message the smoke-test agent processes.
  prompt: 'In one sentence, what is K3s?'
  # Verification Job image — needs `kubectl wait` + `kubectl get`.
  verificationImage: 'bitnami/kubectl:latest'
  # Timeout for the verification Job to wait on AgentTask completion.
  timeoutSeconds: 300

# Node placement
nodeSelector: {}
tolerations: []
affinity: {}

# Pod-level extras
podAnnotations: {}
podLabels: {}

# Operator log verbosity (info | debug). Surfaces via env LOG_LEVEL.
logLevel: 'info'

# ---------------------------------------------------------------------
# WS-A pod + container security context defaults. Applied to the
# operator Deployment (and via Helm-side overrides, agent pods spawned
# at runtime). Override sub-fields by passing the full object via
# `--set-json` or values overlay. See WS-A spec for rationale.
# ---------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ['ALL']
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Security context applied to spawned agent-pod Jobs (per AgentTask).
# Defaults match the operator's, but the agent-pod runtime spawns
# subprocesses (MCP servers via npx, etc.), so these are kept editable
# so a workload can opt out of e.g. readOnlyRootFilesystem if its
# tool subprocesses need writable HOME paths beyond /tmp.
# ---------------------------------------------------------------------
# WS-A — default-deny NetworkPolicy. See `templates/networkpolicy.yaml`.
# REQUIRES a CNI that enforces NetworkPolicies (Calico, Cilium,
# Weave, ...). K3s with the default flannel backend ignores this
# resource — deploy K3s with `--flannel-backend=none` + install Calico
# if you want enforcement.
# ---------------------------------------------------------------------
networkPolicy:
  # Default true — fail-closed posture. Disable only when running on a
  # cluster whose CNI does not enforce policies AND you've accepted
  # that risk.
  enabled: true
  # Extra egress rules merged into the rendered policy. Use to allow
  # outbound traffic to LiteLLM, Langfuse, NATS, or any other endpoint
  # the operator + (transitively) the spawned agent pods need.
  # Example:
  #   extraEgress:
  #     - to:
  #         - namespaceSelector:
  #             matchLabels:
  #               kubernetes.io/metadata.name: nats
  #       ports:
  #         - port: 4222
  #           protocol: TCP
  extraEgress: []

agentPodSecurityContext:
  pod:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  container:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ['ALL']
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
