# kagent-operator default values.
#
# Override at install time with `--set` or `-f values.local.yaml`. The
# operator runs cluster-wide in v0.1; namespaced isolation is a v0.2
# affordance.

replicaCount: 1

image:
  repository: ghcr.io/ctkadvisors/kagent-operator
  # Defaults to .Chart.appVersion; override here for dev pins.
  tag: ''
  pullPolicy: IfNotPresent

# Image pull secret(s) for private registries. Empty = no secret.
# Example: imagePullSecrets: [{ name: ghcr-pull }]
imagePullSecrets: []

serviceAccount:
  create: true
  # Set to override the auto-generated SA name.
  name: ''
  annotations: {}

# Operator container resources. Defaults are conservative for v0.1
# (single-replica, low traffic); raise when watching many AgentTasks.
resources:
  requests:
    cpu: '50m'
    memory: '128Mi'
  limits:
    cpu: '500m'
    memory: '256Mi'

# Container that runs INSIDE the Pods the operator creates.
agentPod:
  image:
    repository: ghcr.io/ctkadvisors/kagent-agent-pod
    tag: 'v0.0.4-phase4'
    pullPolicy: IfNotPresent
  imagePullSecret: '' # name of secret in the AgentTask's namespace
  # ServiceAccount the agent pod runs as. The chart creates one named
  # 'kagent-agent-pod' with RBAC to patch AgentTask.status; set this
  # to that name (or override) to use it.
  serviceAccountName: 'kagent-agent-pod'
  # Create the kagent-agent-pod ServiceAccount + Role/RoleBinding
  # alongside the operator. The pod uses these to patch its
  # AgentTask's status subresource.
  rbac:
    create: true

  # OpenAI-compat inference endpoint the agent loop calls. When set,
  # the operator injects this as KAGENT_LITELLM_BASE_URL on every
  # spawned agent pod. When empty, agent-pod's env.ts default
  # (`http://litellm.kagent-system.svc.cluster.local:4000/v1`) wins.
  litellmBaseUrl: ''
  # Optional API key for the inference endpoint (Bearer in Authorization
  # header). Plain string for v0.1; v0.2 should plumb via secretKeyRef.
  litellmApiKey: ''

  # OTLP/HTTP traces endpoint (Langfuse-compatible). When set, the
  # operator injects OTEL_EXPORTER_OTLP_TRACES_ENDPOINT into every
  # spawned agent pod, and agent-pod's main wires OtelTraceSink.
  otlpEndpoint: ''
  # Comma-separated headers (e.g., 'authorization=Bearer%20<pk>').
  otlpHeaders: ''

  # Artifact storage — Phase 5 / Platform-Priorities P3. When enabled,
  # the chart provisions a single shared RWX PVC the operator mounts
  # into every agent pod at `mountPath`. The in-pod `write_artifact`
  # tool persists outputs under `<mountPath>/<task-uid>/<name>`; the
  # operator threads the resulting ArtifactRefs into
  # `AgentTask.status.artifacts`.
  #
  # Backed by the homelab's existing SMB-fronted `ai-models-storage`
  # StorageClass per docs/ARTIFACTS.md §3 (RWX, Retain). Swap to MinIO
  # in v0.2 by changing the writer in @kagent/agent-pod; the URI scheme
  # is the swap point. Per-task subdir isolation is sufficient for v0.1
  # (shared PVC across all Agents in the namespace) — escalate to
  # per-Agent PVCs only if mixed-Agent contention shows up under load.
  artifactStorage:
    enabled: true
    # PVC claim name (referenced from the spawned Job's volume mount).
    pvcName: 'kagent-artifacts'
    # Container path the PVC mounts at inside every agent pod.
    mountPath: '/var/kagent/artifacts'
    # PVC size. SMB-backed, so this is the upper bound the StorageClass
    # honors at provisioning time; the underlying SMB share's free
    # space is the real cap.
    size: '10Gi'
    # StorageClass to use. Defaults to the homelab's RWX SMB class;
    # set '' to use the cluster default StorageClass.
    storageClassName: 'ai-models-storage'
    # Access mode. RWX is required so the PVC can be mounted into many
    # concurrent agent pods; ReadWriteOnce would serialize task
    # execution.
    accessMode: 'ReadWriteMany'

# Smoke-test manifests — Agent + AgentTask + verification Job aimed at
# the configured agent-pod inference endpoint. Disable in production
# clusters; ship enabled = true on first install to prove the substrate
# works end-to-end.
smokeTest:
  enabled: false
  # Model id passed to the agent loop (verbatim into LiteLLM /
  # OpenAI-compat). For LM Studio: whatever model is loaded
  # (e.g. 'llama-3.2-3b-instruct'). For OpenRouter: the full slug.
  model: 'llama-3.2-3b-instruct'
  # Initial user message the smoke-test agent processes.
  prompt: 'In one sentence, what is K3s?'
  # Verification Job image — needs `kubectl wait` + `kubectl get`.
  verificationImage: 'bitnami/kubectl:latest'
  # Timeout for the verification Job to wait on AgentTask completion.
  timeoutSeconds: 300

# Node placement
nodeSelector: {}
tolerations: []
affinity: {}

# Pod-level extras
podAnnotations: {}
podLabels: {}

# Operator log verbosity (info | debug). Surfaces via env LOG_LEVEL.
logLevel: 'info'
