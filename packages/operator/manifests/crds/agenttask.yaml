#
# AgentTask — single invocation request, addressed by agent name OR
# capability tag. See packages/operator/src/crds/types.ts.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agenttasks.kagent.knuteson.io
spec:
  group: kagent.knuteson.io
  scope: Namespaced
  names:
    kind: AgentTask
    listKind: AgentTaskList
    plural: agenttasks
    singular: agenttask
    shortNames:
      - kat
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - payload
              # Exactly one of targetAgent / targetCapability must be set;
              # the operator's resolve step is the source of truth — the
              # CRD schema enforces only "at least one" via oneOf below.
              oneOf:
                - required: [targetAgent]
                - required: [targetCapability]
              properties:
                targetAgent:
                  type: string
                  description: metadata.name of an Agent CRD in this namespace.
                targetCapability:
                  type: string
                  description: Capability tag resolved against the live Agent registry.
                payload:
                  # Substrate-opaque — passed through to the agent loop.
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                timeoutSeconds:
                  type: integer
                  minimum: 1
                  maximum: 86400
                  description: |
                    DEPRECATED — prefer `runConfig.timeoutSeconds`. Kept for
                    backward compatibility; resolution: when both are set,
                    `runConfig.timeoutSeconds` wins.
                runConfig:
                  type: object
                  description: |
                    Per-run knobs surfaced to the agent loop. Additive on
                    top of (and preferred over) the top-level
                    `timeoutSeconds` field.
                  properties:
                    tokenLimit:
                      type: integer
                      minimum: 1
                      description: 'Hard cap on cumulative input+output tokens. Loop exits with status=budget_exceeded.'
                    costLimitUsd:
                      type: number
                      minimum: 0
                      description: 'Hard cap on cumulative backend-reported cost (USD). Loop exits with status=budget_exceeded.'
                    maxIterations:
                      type: integer
                      minimum: 1
                      maximum: 100
                      description: 'Override the executor default of 8.'
                    timeoutSeconds:
                      type: integer
                      minimum: 1
                      maximum: 86400
                      description: 'Wall-clock deadline. Same semantics as the deprecated top-level field; wins when both are set.'
                    traceparent:
                      type: string
                      maxLength: 128
                      pattern: '^[0-9a-f]{2}-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$'
                      description: |
                        v0.1.11 — W3C Trace Context propagation. When the
                        parent agent-pod's `spawn_child_task` issues a child
                        AgentTask, it stamps the parent's current OTel span
                        context here as a `traceparent` header value
                        (`00-<traceId 32hex>-<spanId 16hex>-<flags 2hex>`).
                        The operator's job-spec builder threads this value
                        into the spawned Job's container env as
                        `OTEL_TRACEPARENT`; the agent-pod's main.ts seeds
                        its OtelTraceSink root span context from that env so
                        the child's trace tree becomes a child of the
                        parent's trace, not a sibling.
                parentTask:
                  type: string
                  description: UID of the AgentTask that delegated this one.
                originalUserMessage:
                  type: string
                  description: 'Required at the protocol level (HARNESS-LESSONS §4); the operator copies parent value if unset on a delegated task.'
                parentDistillation:
                  type: string
                expectedTools:
                  type: array
                  items:
                    type: string
                  description: 'Tool category names the operator expects to fire (feeds the F2 detector).'
                # ---- v0.2.0-typed-io — Wave 1 / I/O sub-team.
                # Typed input bindings + idempotency. Admission validates
                # this against the target Agent's spec.inputs[] before
                # admission. See docs/SUBSTRATE-V1.md §3.2.
                inputs:
                  type: array
                  description: |
                    Bindings that resolve Agent.spec.inputs[]. Each
                    entry's `name` must match an Agent input name;
                    `from` carries exactly one of:
                      { workspace: <name> }
                      { taskUid: <uid>, output: <name> }
                      { scalar: <opaque value> }
                  items:
                    type: object
                    required:
                      - name
                      - from
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 256
                      from:
                        type: object
                        oneOf:
                          - required: [workspace]
                          - required: [taskUid, output]
                          - required: [scalar]
                        properties:
                          workspace:
                            type: string
                            description: |
                              Name of a Workspace CR in the same
                              namespace (Workspace sub-team,
                              v0.2.1-workspaces).
                          taskUid:
                            type: string
                            description: |
                              UID of an upstream AgentTask. Resolved
                              with `output` to an entry in that
                              task's status.outputs[].
                          output:
                            type: string
                            description: |
                              Name of an output on the upstream task
                              (matches Agent.spec.outputs[].name on
                              that task's target Agent).
                          scalar:
                            x-kubernetes-preserve-unknown-fields: true
                            description: |
                              Inline literal value, forwarded to the
                              agent loop in-band. Substrate-opaque.
                idempotencyKey:
                  type: string
                  minLength: 1
                  maxLength: 256
                  description: |
                    Stripe / Temporal-pattern dedupe key. Operator's
                    admission cache dedupes by (namespace, agent,
                    idempotencyKey, inputHash) within a 24h TTL:
                      hit + same input hash      → mark Completed with
                                                   the prior task's
                                                   outputs (replay);
                                                   emit task.deduped.
                      hit + different input hash → mark Failed with
                                                   reason=
                                                   IdempotencyConflict.
                      miss                       → store + admit
                                                   normally.
                    v0.2.0 cache is operator-local in-memory only;
                    distributed dedupe via etcd is a follow-up release.
                # ---- v0.3.0-capabilities — Wave 2 / Caps sub-team.
                verifyContract:
                  type: object
                  description: |
                    Substrate-level post-completion verification gate.
                    When set, the reconciler runs the contract at
                    terminal-status patch time; failure forces Failed
                    with reason=verify_failed. Modes:
                      - scriptRef:        spawn one-shot Job whose
                                          entrypoint is the script;
                                          exit 0 admits Completed.
                      - llmJudgePromptRef: dispatch rendered prompt to
                                          model gateway; verdict
                                          field gates Completed.
                  properties:
                    scriptRef:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        version:
                          type: integer
                          minimum: 1
                      required:
                        - name
                    llmJudgePromptRef:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        version:
                          type: integer
                          minimum: 1
                      required:
                        - name
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Dispatched
                    - Completed
                    - Failed
                result:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                error:
                  type: string
                startedAt:
                  type: string
                  format: date-time
                completedAt:
                  type: string
                  format: date-time
                podName:
                  type: string
                structuralVerdict:
                  type: object
                  properties:
                    suspicious:
                      type: array
                      items:
                        type: string
                # Artifact references — see docs/ARTIFACTS.md. Bytes live
                # in the backend addressed by `uri` (pvc:// in v0.1,
                # s3://minio:// in v0.2); etcd holds metadata only. The
                # array is optional and additive in v0.1; no writer
                # populates it yet (next slice). `preserve-unknown-fields`
                # on each item lets v0.2 backends attach extra metadata
                # without a CRD bump.
                artifacts:
                  type: array
                  items:
                    type: object
                    required:
                      - uri
                    properties:
                      uri:
                        type: string
                        description: 'Backend-addressable URI. v0.1 emits pvc://kagent-artifacts/<task-uid>/<name>.'
                      mediaType:
                        type: string
                        description: 'RFC 6838 media type, e.g. text/markdown, image/png, text/x-diff.'
                      sizeBytes:
                        type: integer
                        minimum: 0
                      checksum:
                        type: string
                        description: 'Algorithm-prefixed lowercase-hex digest, e.g. "sha256:abc...".'
                      name:
                        type: string
                        description: 'Human-readable label / stable name within the producing task.'
                      producedAt:
                        type: string
                        format: date-time
                    x-kubernetes-preserve-unknown-fields: true
                # ---- v0.2.0-typed-io — Wave 1 / I/O sub-team.
                # Substrate output references; populated by the
                # agent-pod's terminal status patch. The reconciler
                # validates that each Agent.spec.outputs[].required
                # entry is present here before admitting Completed.
                outputs:
                  type: array
                  description: |
                    Output references keyed by Agent.spec.outputs[].name.
                    `ref` shape varies by output kind: artifact → CAS
                    URI (cas://sha256:<hex>/<name> in v0.2.2; v0.2.0
                    emits pvc://kagent-artifacts/<task-uid>/<name>);
                    scalar → string-encoded literal.
                  items:
                    type: object
                    required:
                      - name
                      - ref
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 256
                      ref:
                        type: string
                        minLength: 1
                # ---- Workstream 5 / Phase 5: parent/child task-graph projection.
                # Populated by the operator's parent re-reconcile (next slice).
                # Schema is additive — no required keys at status level so
                # existing AgentTasks remain valid. See docs/TASK-GRAPH.md §4.
                children:
                  type: array
                  description: |
                    Projection of child AgentTasks discovered via the
                    `kagent.knuteson.io/parent-task-uid` label selector.
                    Bounded shape — full child spec lives on the child CR.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      uid:
                        type: string
                      phase:
                        type: string
                        enum:
                          - Pending
                          - Dispatched
                          - Completed
                          - Failed
                      completedAt:
                        type: string
                        format: date-time
                      error:
                        type: string
                aggregatePhase:
                  type: string
                  enum:
                    - Pending
                    - Dispatched
                    - PartiallyComplete
                    - AllComplete
                    - AnyFailed
                  description: |
                    Aggregate state of this task's children, distinct from
                    `phase` (which is the parent's own pod-side work).
                successCount:
                  type: integer
                  minimum: 0
                  description: 'Number of children currently in phase=Completed.'
                failureCount:
                  type: integer
                  minimum: 0
                  description: 'Number of children currently in phase=Failed.'
                inFlightCount:
                  type: integer
                  minimum: 0
                  description: 'Children that have not reached a terminal phase yet (Pending/Dispatched/absent).'
                # ---- v0.3.0-capabilities — Wave 2 / Caps sub-team.
                capabilityRef:
                  type: string
                  description: |
                    The <jti> of the JWT capability bundle the
                    operator's capability-issuer minted for this task.
                    Used for forensics + revocation.
                verification:
                  type: object
                  description: |
                    Verification result captured by the reconciler when
                    AgentTask.spec.verifyContract is set. Populated only
                    after the verifier runs.
                  properties:
                    passed:
                      type: boolean
                    mode:
                      type: string
                      enum:
                        - script
                        - llmJudge
                    reason:
                      type: string
                    completedAt:
                      type: string
                      format: date-time
                  required:
                    - passed
                    - mode
                # ---- Workstream E (WS-E) — status authority + monotonic transitions.
                # `observedGeneration` lets consumers tell whether the
                # operator has caught up to a new `spec` write (compare
                # against `metadata.generation`). `conditions[]` is the
                # standard Kubernetes append-only list — WS-E uses it to
                # carry failure context that doesn't fit the single
                # terminal `phase` field (e.g. an OOMKill detected after
                # the pod already wrote `Completed`). See WS-E plan.
                observedGeneration:
                  type: integer
                  minimum: 0
                  description: '`metadata.generation` the operator most recently reconciled.'
                conditions:
                  type: array
                  description: |
                    Discrete conditions observed for this AgentTask.
                    Append-only — WS-E adds entries (e.g.
                    `JobFailedAfterComplete`) without overwriting a
                    terminal `phase`. Same `type` is replaced in place;
                    `lastTransitionTime` is preserved when `status`
                    didn't change.
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                        description: 'CamelCase identifier, e.g. Dispatched, Failed, ImagePullBackOff, OOMKilled, DeadlineExceeded.'
                      status:
                        type: string
                        enum:
                          - 'True'
                          - 'False'
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        minimum: 0
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Target
          type: string
          jsonPath: .spec.targetAgent
        - name: Capability
          type: string
          jsonPath: .spec.targetCapability
        - name: Pod
          type: string
          jsonPath: .status.podName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
