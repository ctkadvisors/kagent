# Tenant — multi-tenant boundary primitive (Wave 4 / Tenancy sub-team,
# v0.5.0). Cluster-scoped (cross-namespace authority surface). See
# packages/operator/src/crds/tenant.ts for the TS surface and
# docs/SUBSTRATE-V1.md §3.6 + docs/WAVES.md §6.1 for the primitive's
# role in the substrate.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.kagent.knuteson.io
spec:
  group: kagent.knuteson.io
  scope: Cluster
  names:
    kind: Tenant
    listKind: TenantList
    plural: tenants
    singular: tenant
    shortNames:
      - kt
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - name
                - namespaceAllowlist
              properties:
                name:
                  type: string
                  minLength: 1
                  description: |
                    Canonical tenant id. MUST equal metadata.name; the
                    operator's admission validator rejects mismatches.
                namespaceAllowlist:
                  type: array
                  description: |
                    K8s namespaces this tenant may own Agents/Tasks in.
                    Two tenants MUST NOT overlap on a namespace; the
                    controller surfaces overlap as phase=Failed with
                    a NamespaceOverlap condition.
                  items:
                    type: string
                    minLength: 1
                capabilityRoot:
                  type: object
                  description: |
                    Per-tenant capability-bundle issuer override. When
                    unset, the operator's default issuer string applies.
                  properties:
                    issuer:
                      type: string
                      minLength: 1
                      description: |
                        Override the JWT iss claim for caps minted under
                        this tenant.
                auditSubject:
                  type: string
                  description: |
                    Audit subject prefix override. Defaults to
                    "tenant/<metadata.name>" when unset.
                defaultQuota:
                  type: object
                  description: |
                    Default per-tenant compute / gateway / storage
                    quota. Wave 4 Quotas sub-team (v0.5.2) translates
                    `compute.*` to a per-tenant-namespace K8s
                    ResourceQuota CR; `gateway.inFlightCap` enforces
                    via in-process counter; `storage.casBytes`
                    enforces via periodic CAS walker.
                  properties:
                    compute:
                      type: object
                      description: |
                        Compute caps materialized as a K8s
                        ResourceQuota per (tenant, namespace).
                      properties:
                        cpuRequests:
                          type: string
                          description: 'K8s quantity, e.g. `10` or `10000m`. Maps to ResourceQuota requests.cpu.'
                        memoryRequests:
                          type: string
                          description: 'K8s quantity, e.g. `20Gi`. Maps to ResourceQuota requests.memory.'
                        maxPods:
                          type: integer
                          minimum: 0
                          description: 'Pod count cap per tenant namespace. Maps to ResourceQuota count/pods.'
                    gateway:
                      type: object
                      description: |
                        Gateway-call caps. `inFlightCap` enforced via
                        operator's in-process per-tenant counter at
                        AgentTask admission; `tokensPerHour` carried
                        as the next-rev hook.
                      properties:
                        inFlightCap:
                          type: integer
                          minimum: 0
                          description: 'Concurrent in-flight gateway requests cap (per tenant).'
                        tokensPerHour:
                          type: integer
                          minimum: 0
                          description: 'Per-tenant token budget (tokens/hour). v0.5.2 carries the shape; accumulator lands in v0.5.3.'
                    storage:
                      type: object
                      description: |
                        Storage caps. `casBytes` is the hard cap
                        (refuses new artifact admissions);
                        `artifactCount` is loose (warning only).
                      properties:
                        casBytes:
                          type: integer
                          minimum: 0
                          description: 'CAS PVC consumption cap (bytes).'
                        artifactCount:
                          type: integer
                          minimum: 0
                          description: 'Artifact count cap (loose; warning only — casBytes is authoritative).'
                defaultEgress:
                  type: object
                  description: |
                    Default per-tenant egress allowlist. Wave 4 Egress
                    sub-team consumes; v0.5.0 carries the shape.
                  properties:
                    allow:
                      type: array
                      description: |
                        Glob list of hostnames the tenant's Agents may
                        reach by default (e.g. `api.github.com`,
                        `*.googleapis.com`).
                      items:
                        type: string
                        minLength: 1
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Ready
                    - Failed
                  description: |
                    Lifecycle phase. Pending until at least one
                    allowlisted namespace resolves; Ready when at least
                    one does; Failed on namespace overlap or other
                    validation errors.
                observedGeneration:
                  type: integer
                  minimum: 0
                conditions:
                  type: array
                  description: |
                    Append-only condition log. Known types:
                    NamespaceAllowlistResolved, NamespaceOverlap,
                    Ready, Failed.
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - 'True'
                          - 'False'
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        minimum: 0
                namespaceCount:
                  type: integer
                  minimum: 0
                  description: |
                    How many of the allowlisted namespaces actually
                    exist in the cluster. Drives the
                    NamespaceAllowlistResolved condition.
                agentCount:
                  type: integer
                  minimum: 0
                  description: |
                    Count of Agents labeled with this tenant
                    (kagent.knuteson.io/tenant=<name>).
                activeTaskCount:
                  type: integer
                  minimum: 0
                  description: |
                    Count of non-terminal AgentTasks labeled with this
                    tenant.
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Namespaces
          type: integer
          jsonPath: .status.namespaceCount
        - name: Agents
          type: integer
          jsonPath: .status.agentCount
        - name: ActiveTasks
          type: integer
          jsonPath: .status.activeTaskCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
