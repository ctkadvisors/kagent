# Agent — declarative spec for a workload that can be invoked.
# See packages/operator/src/crds/types.ts for the TS surface.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.kagent.knuteson.io
spec:
  group: kagent.knuteson.io
  scope: Namespaced
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
    shortNames:
      - kag
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - model
              properties:
                model:
                  type: string
                  minLength: 1
                  description: 'LiteLLM model id WITH provider prefix (e.g. workers-ai/@cf/meta/llama-4-scout-17b-16e-instruct).'
                systemPrompt:
                  type: string
                tools:
                  type: array
                  items:
                    type: string
                capabilities:
                  type: array
                  items:
                    type: string
                sandboxProfile:
                  type: string
                  enum:
                    - default
                    - strict
                  default: default
                # ---- v0.2.0-typed-io — Wave 1 / I/O sub-team.
                # Typed dataflow contract per docs/SUBSTRATE-V1.md §3.1.
                # Workspace + CAS sub-teams branch from the kind enum.
                inputs:
                  type: array
                  description: |
                    Inputs this Agent consumes. AgentTask.spec.inputs[]
                    binds each entry. Required-by-default; opt out with
                    `optional: true`.
                  items:
                    type: object
                    required:
                      - name
                      - kind
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 256
                      kind:
                        type: string
                        enum:
                          - workspace
                          - artifact
                          - scalar
                        description: |
                          workspace = RWX PVC (Workspace sub-team,
                          v0.2.1); artifact = content-addressed bytes
                          (CAS sub-team, v0.2.2); scalar = inline
                          literal forwarded to the agent loop.
                      mediaType:
                        type: string
                        description: 'RFC 6838 media type, advisory.'
                      mountPath:
                        type: string
                        description: |
                          Container path to mount the input at.
                          REQUIRED for kind: workspace | artifact;
                          ignored for kind: scalar. Admission rejects
                          a non-scalar input that lacks mountPath
                          (default-deny — substrate never picks a
                          path on the agent's behalf).
                      mode:
                        type: string
                        enum:
                          - ro
                          - rw
                        default: ro
                      optional:
                        type: boolean
                        description: |
                          Explicit opt-out from required-by-default.
                          Wins over `required: true`.
                      required:
                        type: boolean
                        default: true
                outputs:
                  type: array
                  description: |
                    Outputs this Agent produces. Reconciler refuses a
                    Completed status patch when any required entry is
                    absent from AgentTask.status.outputs[].
                  items:
                    type: object
                    required:
                      - name
                      - kind
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 256
                      kind:
                        type: string
                        enum:
                          - artifact
                          - scalar
                      mediaType:
                        type: string
                      required:
                        type: boolean
                        default: true
                      retention:
                        type: string
                        description: |
                          Duration string (e.g. 7d, 24h). Parsed by
                          the CAS sub-team in v0.2.2; v0.2.0 only
                          threads the field through the schema for
                          forward-compatibility.
                workspaceClaims:
                  type: array
                  description: |
                    Reserved field; the Workspace sub-team locks the
                    shape in v0.2.1-workspaces. Threaded here so the
                    schema accepts the field without a CRD-bump
                    dependency on Workspace.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                # ---- v0.3.0-capabilities — Wave 2 / Caps sub-team.
                # The substrate's sealed-authority primitive per
                # docs/SUBSTRATE-V1.md §3.6. When set, the operator's
                # capability-issuer mints a JWT bundle scoped to these
                # claims for every task invoking this Agent.
                capabilityClaims:
                  type: object
                  description: |
                    Capability claims this Agent is permitted to mint
                    into a JWT bundle for any of its tasks. Each
                    claim category is a glob-pattern array (per
                    @kagent/capability-types glob dialect: `*` is the
                    only metacharacter). When set, the legacy fields
                    (allowedChildAgents, allowedChildTemplates) are
                    IGNORED with a deprecation warning.
                  properties:
                    tools:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    models:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    spawn:
                      type: array
                      description: |
                        Agent-name patterns this agent's tasks may
                        spawn as children. Replaces allowedChildAgents
                        / allowedChildTemplates.
                      items:
                        type: string
                        minLength: 1
                    read:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    write:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    egress:
                      type: array
                      description: |
                        Hostname patterns the HTTP-tool family may
                        reach. Replaces
                        KAGENT_BUILTIN_TOOLS_HTTP_ALLOW_DOMAINS.
                      items:
                        type: string
                        minLength: 1
                    tenant:
                      type: string
                      minLength: 1
                      description: |
                        Opaque tenant identifier. Wave 4 Tenancy will
                        narrow on this; v0.3.0 carries the field
                        without enforcement.
                    publish:
                      type: array
                      description: |
                        Wave 3 Events publish-topic patterns.
                      items:
                        type: string
                        minLength: 1
                    subscribe:
                      type: array
                      description: |
                        Wave 3 Events subscribe-topic patterns.
                      items:
                        type: string
                        minLength: 1
                    blackboard:
                      type: object
                      description: |
                        Wave 3 Blackboard KV ACL (v0.4.1-blackboard).
                        Each task tree gets one NATS JetStream KV
                        bucket; the four built-in tools
                        (read/write/list/append _blackboard) gate
                        against the glob lists below. Both lists
                        empty / unset = the blackboard tools are
                        unavailable to the task (fail-closed).
                      properties:
                        read:
                          type: array
                          description: |
                            Key-glob patterns the task may read /
                            list. `list_blackboard` is gated by
                            `read`.
                          items:
                            type: string
                            minLength: 1
                        write:
                          type: array
                          description: |
                            Key-glob patterns the task may write.
                            `append_blackboard` requires both `read`
                            (CAS-loop reads current revision) and
                            `write` (CAS-loop puts spliced array).
                          items:
                            type: string
                            minLength: 1
                # ---- v0.3.1-supervision — Wave 2 / Supervision sub-team.
                # Erlang/OTP-style supervision strategy + per-task
                # restart cap. See docs/WAVES.md §4.2 + the
                # `@kagent/supervision` package's strategy engine.
                supervisionStrategy:
                  type: string
                  enum:
                    - one_for_one
                    - one_for_all
                    - rest_for_one
                    - escalate
                  default: one_for_one
                  description: |
                    Strategy the operator applies when a child
                    AgentTask of THIS agent's task fails.
                    one_for_one (default): restart only the failed
                    child. one_for_all: terminate every sibling +
                    restart the subtree. rest_for_one: terminate the
                    failed child + every sibling started AFTER it
                    (start-order). escalate: propagate the failure to
                    the parent task; the parent's strategy handles
                    this subtree as a single failed child.
                maxRestarts:
                  type: integer
                  minimum: 0
                  default: 3
                  description: |
                    Per-AgentTask restart cap. The operator
                    increments AgentTask.status.restartCount each
                    time supervision restarts a task; once
                    restartCount >= maxRestarts the operator
                    fails-closed with reason=restart_limit_exceeded.
                    Setting 0 disables restarts entirely.
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Sandbox
          type: string
          jsonPath: .spec.sandboxProfile
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
