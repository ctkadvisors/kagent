# Agent — declarative spec for a workload that can be invoked.
# See packages/operator/src/crds/types.ts for the TS surface.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.kagent.knuteson.io
spec:
  group: kagent.knuteson.io
  scope: Namespaced
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
    shortNames:
      - kag
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              # `model` was previously required; the modelClass primitive
              # makes it optional at the schema level. The at-least-one
              # invariant (model OR modelClass) is enforced via
              # x-kubernetes-validations (CEL) below + by the operator's
              # `isAgent` predicate (defense-in-depth — old API servers
              # without CEL still fail-closed at the operator).
              x-kubernetes-validations:
                - rule: 'has(self.model) || has(self.modelClass)'
                  message: 'spec must declare at least one of `model` or `modelClass` (the substrate at-least-one rule)'
              properties:
                model:
                  type: string
                  minLength: 1
                  description: |
                    LiteLLM model id WITH provider prefix (e.g.
                    workers-ai/@cf/meta/llama-4-scout-17b-16e-instruct).
                    Optional since the modelClass primitive landed: an
                    Agent may declare `modelClass` instead, and the
                    operator's resolver translates the class to a
                    physical model id via chart values. AT LEAST ONE of
                    `model` or `modelClass` MUST be set; both is
                    admissible — `model` then wins resolution-side as
                    an explicit per-Agent override (escape-hatch for
                    one-off agents that need a model the cluster's
                    classes don't cover).
                modelClass:
                  type: string
                  minLength: 1
                  description: |
                    Logical model-capability tier (e.g.
                    `tool-caller-default`, `text-generator-default`,
                    `reasoner-default`). The operator's resolver maps
                    this to a physical model id at job-spec build time
                    via chart-supplied class→model values, so an Agent
                    definition is decoupled from physical model
                    availability — switching backends for an entire
                    tier is a single chart-values edit, not N manifest
                    edits. Mutually inclusive with `model` per the at-
                    least-one rule above; when both are set, `model`
                    wins resolution-side. Phase 1 ships the schema +
                    validator only; Phase 2+ wires the resolver, the
                    chart class→model map, and the manifest migration.
                version:
                  type: string
                  description: |
                    v0.5.3-versioning — Wave 4 / Versioning sub-team.
                    Each (metadata.name, spec.version) pair is a
                    distinct Agent identity. NEW AgentTasks pin to the
                    LATEST version at admission; in-flight tasks
                    pinned to OLDER versions continue against their
                    immutable older Agent CR. Comparison is LEXICAL —
                    use semver-shaped strings or zero-pad for numeric
                    intuition. Defaults to '0.0.0' at admission when
                    absent (legacy v0.1 Agents).
                systemPrompt:
                  type: string
                tools:
                  type: array
                  items:
                    type: string
                toolProfileRef:
                  type: string
                  minLength: 1
                  description: |
                    Gateway-owned tool profile grant. The agent-pod
                    asks the local tool gateway to resolve this profile
                    into concrete browser.*, code_interpreter.*, mcp.*,
                    and http.* tool descriptors.
                agentType:
                  type: string
                  minLength: 1
                  description: |
                    Alias for toolProfileRef using the user-facing
                    "agent type" term.
                capabilities:
                  type: array
                  items:
                    type: string
                sandboxProfile:
                  type: string
                  enum:
                    - default
                    - strict
                  default: default
                # ---- v0.2.0-typed-io — Wave 1 / I/O sub-team.
                # Typed dataflow contract per docs/SUBSTRATE-V1.md §3.1.
                # Workspace + CAS sub-teams branch from the kind enum.
                inputs:
                  type: array
                  description: |
                    Inputs this Agent consumes. AgentTask.spec.inputs[]
                    binds each entry. Required-by-default; opt out with
                    `optional: true`.
                  items:
                    type: object
                    required:
                      - name
                      - kind
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 256
                      kind:
                        type: string
                        enum:
                          - workspace
                          - artifact
                          - scalar
                        description: |
                          workspace = RWX PVC (Workspace sub-team,
                          v0.2.1); artifact = content-addressed bytes
                          (CAS sub-team, v0.2.2); scalar = inline
                          literal forwarded to the agent loop.
                      mediaType:
                        type: string
                        description: 'RFC 6838 media type, advisory.'
                      mountPath:
                        type: string
                        description: |
                          Container path to mount the input at.
                          REQUIRED for kind: workspace | artifact;
                          ignored for kind: scalar. Admission rejects
                          a non-scalar input that lacks mountPath
                          (default-deny — substrate never picks a
                          path on the agent's behalf).
                      mode:
                        type: string
                        enum:
                          - ro
                          - rw
                        default: ro
                      optional:
                        type: boolean
                        description: |
                          Explicit opt-out from required-by-default.
                          Wins over `required: true`.
                      required:
                        type: boolean
                        default: true
                outputs:
                  type: array
                  description: |
                    Outputs this Agent produces. Reconciler refuses a
                    Completed status patch when any required entry is
                    absent from AgentTask.status.outputs[].
                  items:
                    type: object
                    required:
                      - name
                      - kind
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 256
                      kind:
                        type: string
                        enum:
                          - artifact
                          - scalar
                      mediaType:
                        type: string
                      required:
                        type: boolean
                        default: true
                      retention:
                        type: string
                        description: |
                          Duration string (e.g. 7d, 24h). Parsed by
                          the CAS sub-team in v0.2.2; v0.2.0 only
                          threads the field through the schema for
                          forward-compatibility.
                workspaceClaims:
                  type: array
                  description: |
                    Reserved field; the Workspace sub-team locks the
                    shape in v0.2.1-workspaces. Threaded here so the
                    schema accepts the field without a CRD-bump
                    dependency on Workspace.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                # ---- v0.4.2-cache — Wave 3 / Cache sub-team.
                # Per-Agent persistent caches keyed by sha256(template-render).
                # See docs/WAVES.md §5.3 + docs/SUBSTRATE-V1.md §3.5.
                caches:
                  type: array
                  description: |
                    Per-Agent persistent caches. Each entry is one
                    cache slot the operator restores at task admission
                    (init-container copy from cache PVC) and saves at
                    task completion (sidecar tar-stream back to cache
                    PVC). Cache identity is sha256 of the rendered
                    `key` template; same template render → same cache
                    URI → cache hit. Miss is NEVER an error.
                  items:
                    type: object
                    required:
                      - name
                      - key
                      - mountPath
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                        pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$|^[a-z0-9]$'
                        description: |
                          Per-Agent stable identifier; the second
                          path segment of the cache URI
                          (cache://sha256:<key>/<name>).
                      key:
                        type: string
                        minLength: 1
                        description: |
                          Template string. Recognized tokens:
                          {input_artifact_hashes}, {image_digest},
                          {model_name}. The literal `default` is
                          sugar for the canonical recipe
                          `{input_artifact_hashes}+{image_digest}+{model_name}`.
                          Any literal substring (e.g.
                          `npm-{image_digest}-v2`) is preserved
                          verbatim. Unrecognized {tokens} pass
                          through unchanged (forward-compat).
                      mountPath:
                        type: string
                        minLength: 1
                        description: |
                          Container path the cache contents land at on
                          restore; same path the sidecar walks on save.
                          The substrate never picks a path on the
                          agent's behalf (default-deny per the typed-I/O
                          mount-path discipline).
                # ---- v0.3.0-capabilities — Wave 2 / Caps sub-team.
                # The substrate's sealed-authority primitive per
                # docs/SUBSTRATE-V1.md §3.6. When set, the operator's
                # capability-issuer mints a JWT bundle scoped to these
                # claims for every task invoking this Agent.
                capabilityClaims:
                  type: object
                  description: |
                    Capability claims this Agent is permitted to mint
                    into a JWT bundle for any of its tasks. Each
                    claim category is a glob-pattern array (per
                    @kagent/capability-types glob dialect: `*` is the
                    only metacharacter). When set, the legacy fields
                    (allowedChildAgents, allowedChildTemplates) are
                    IGNORED with a deprecation warning.
                  properties:
                    tools:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    models:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    spawn:
                      type: array
                      description: |
                        Agent-name patterns this agent's tasks may
                        spawn as children. Replaces allowedChildAgents
                        / allowedChildTemplates.
                      items:
                        type: string
                        minLength: 1
                    read:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    write:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    egress:
                      type: array
                      description: |
                        Hostname patterns the HTTP-tool family may
                        reach. Replaces
                        KAGENT_BUILTIN_TOOLS_HTTP_ALLOW_DOMAINS.
                      items:
                        type: string
                        minLength: 1
                    tenant:
                      type: string
                      minLength: 1
                      description: |
                        Opaque tenant identifier. Wave 4 Tenancy will
                        narrow on this; v0.3.0 carries the field
                        without enforcement.
                    publish:
                      type: array
                      description: |
                        Wave 3 Events publish-topic patterns.
                      items:
                        type: string
                        minLength: 1
                    subscribe:
                      type: array
                      description: |
                        Wave 3 Events subscribe-topic patterns.
                      items:
                        type: string
                        minLength: 1
                    blackboard:
                      type: object
                      description: |
                        Wave 3 Blackboard KV ACL (v0.4.1-blackboard).
                        Each task tree gets one NATS JetStream KV
                        bucket; the four built-in tools
                        (read/write/list/append _blackboard) gate
                        against the glob lists below. Both lists
                        empty / unset = the blackboard tools are
                        unavailable to the task (fail-closed).
                      properties:
                        read:
                          type: array
                          description: |
                            Key-glob patterns the task may read /
                            list. `list_blackboard` is gated by
                            `read`.
                          items:
                            type: string
                            minLength: 1
                        write:
                          type: array
                          description: |
                            Key-glob patterns the task may write.
                            `append_blackboard` requires both `read`
                            (CAS-loop reads current revision) and
                            `write` (CAS-loop puts spliced array).
                          items:
                            type: string
                            minLength: 1
                # ---- v0.3.1-supervision — Wave 2 / Supervision sub-team.
                # Erlang/OTP-style supervision strategy + per-task
                # restart cap. See docs/WAVES.md §4.2 + the
                # `@kagent/supervision` package's strategy engine.
                supervisionStrategy:
                  type: string
                  enum:
                    - one_for_one
                    - one_for_all
                    - rest_for_one
                    - escalate
                  default: one_for_one
                  description: |
                    Strategy the operator applies when a child
                    AgentTask of THIS agent's task fails.
                    one_for_one (default): restart only the failed
                    child. one_for_all: terminate every sibling +
                    restart the subtree. rest_for_one: terminate the
                    failed child + every sibling started AFTER it
                    (start-order). escalate: propagate the failure to
                    the parent task; the parent's strategy handles
                    this subtree as a single failed child.
                maxRestarts:
                  type: integer
                  minimum: 0
                  default: 3
                  description: |
                    Per-AgentTask restart cap. The operator
                    increments AgentTask.status.restartCount each
                    time supervision restarts a task; once
                    restartCount >= maxRestarts the operator
                    fails-closed with reason=restart_limit_exceeded.
                    Setting 0 disables restarts entirely.
                # ---- v0.4.0-events — Wave 3 / Events sub-team.
                # Pub/sub on `kagent.events.*` per
                # docs/SUBSTRATE-V1.md §3.7 + WAVES.md §5.1.
                # Topics are CONCRETE (no NATS wildcards); the cap
                # claim list is the glob authority — admission
                # validates each topic ⊆ claims.publish / .subscribe.
                publishes:
                  type: array
                  description: |
                    Topics this Agent's tasks may emit on via the
                    in-pod publish_event tool. Each topic MUST be
                    admitted by capabilityClaims.publish — admission
                    refuses with reason=invalid_publishes otherwise.
                  items:
                    type: object
                    required:
                      - topic
                    properties:
                      topic:
                        type: string
                        minLength: 1
                        maxLength: 128
                        description: |
                          Concrete topic — [a-z0-9_-]+(\.[a-z0-9_-]+)*.
                          No NATS wildcards (* / >).
                      schema:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                        description: |
                          Optional JSON-Schema describing the payload
                          shape. Substrate-opaque at v0.4.0;
                          consumers introspect via
                          kubectl get agents -o yaml.
                subscribes:
                  type: array
                  description: |
                    Topics this Agent's tasks subscribe to. The
                    operator provisions a NATS pull-consumer per
                    entry; on delivery, mints an AgentTask whose
                    payload (or inputs[trigger.inputBinding] when
                    set) carries the event's data.
                  items:
                    type: object
                    required:
                      - topic
                    properties:
                      topic:
                        type: string
                        minLength: 1
                        maxLength: 128
                      schema:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      trigger:
                        type: object
                        description: |
                          Operator-side trigger config — input
                          binding for typed I/O (Wave 1).
                        properties:
                          inputBinding:
                            type: string
                            minLength: 1
                            description: |
                              When set, the dispatcher renders
                              AgentTask.spec.inputs[<inputBinding>]
                              = { scalar: <event.data> } so the
                              agent loop receives the payload via
                              the Wave 1 typed-input pipeline.
                              When unset, event.data is forwarded
                              as AgentTask.spec.payload.
                # ---- v0.5.1-egress — Wave 4 / Egress sub-team.
                # Per-Agent network egress allowlist materialized into
                # a NetworkPolicy (or CiliumNetworkPolicy when Cilium
                # is detected). Default-deny when unset; tenant
                # `defaultEgress` fills in if the Agent is tenant-
                # scoped. See docs/SUBSTRATE-V1.md §3.1 +
                # docs/WAVES.md §6.2.
                egress:
                  type: object
                  description: |
                    Declarative network egress allowlist. The
                    egress-controller materializes a per-Agent
                    NetworkPolicy / CiliumNetworkPolicy scoping
                    outbound traffic to the declared CIDRs / domains
                    / ports. Default-deny when unset.
                  properties:
                    domains:
                      type: array
                      description: |
                        FQDN allowlist. Cilium's `toFQDNs` evaluates
                        natively; plain NetworkPolicy is best-effort
                        CIDR-resolved at reconcile time.
                      items:
                        type: string
                        minLength: 1
                    cidrs:
                      type: array
                      description: |
                        Raw CIDR allowlist. Always supported by
                        every CNI; the substrate baseline.
                      items:
                        type: string
                        minLength: 1
                    ports:
                      type: array
                      description: |
                        Protocol+port pairs. Empty / unset = all
                        ports.
                      items:
                        type: object
                        required:
                          - protocol
                          - port
                        properties:
                          protocol:
                            type: string
                            enum:
                              - TCP
                              - UDP
                          port:
                            type: integer
                            minimum: 1
                            maximum: 65535
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Sandbox
          type: string
          jsonPath: .spec.sandboxProfile
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
