{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

Auto-generated DSN Secret — rendered ONLY when `database.bundled=true`.
Wires the Bitnami postgresql sub-chart's primary Service hostname,
configured database/user, and the Bitnami-provisioned password Secret
into a libpq DSN consumed by both the gateway Deployment and the
migration Job.

Why this is template-only (no `valueFrom` indirection): the gateway
container needs a single `DATABASE_URL` env, and Bitnami's password
Secret stores the password under `password` — but constructing the
DSN string requires concatenating user + password + host + db, which
isn't expressible via secretKeyRef. So we synthesize the DSN here at
template time and reference the Bitnami password Secret via
`stringData` with a `${POSTGRES_PASSWORD}` placeholder resolved at
runtime by an init-style env-injection... NOT. Helm doesn't have that.

Compromise: emit the DSN with the password literal pulled from the
Bitnami Secret via the chart's known release-naming convention. To
avoid leaking the password into the chart values, we use Helm's
`lookup` to read the live Secret on upgrade — and on first install
(when the Secret doesn't exist yet) we generate a bcrypt-strong
random password into BOTH this Secret (under `dsn`) AND the Bitnami
Secret (under `password`).

Bitnami chart honors `auth.existingSecret` so we feed it the same
Secret name and skip its own generator. Single source of truth.
*/}}
{{- if and .Values.enabled .Values.database.bundled -}}
{{- $secretName := printf "%s-db" (include "llm-gateway.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := "" -}}
{{- if $existing -}}
{{- $password = (index $existing.data "password" | b64dec) -}}
{{- else -}}
{{- $password = randAlphaNum 32 -}}
{{- end -}}
{{- $host := include "llm-gateway.bundledPostgres.host" . -}}
{{- $db := default "kagent_llm_gateway" .Values.database.bundledConfig.auth.database -}}
{{- $user := default "gateway" .Values.database.bundledConfig.auth.username -}}
{{- $dsn := printf "postgres://%s:%s@%s:5432/%s?sslmode=disable" $user $password $host $db -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # libpq DSN — what the gateway and migration Job consume.
  dsn: {{ $dsn | quote }}
  # Bitnami's auth.existingSecret expects keys named per its convention.
  # Setting `password` here and pointing the sub-chart at this Secret
  # keeps Bitnami from generating its own (single source of truth, no
  # password rotation drift between bundled-postgres-postgresql and the
  # gateway).
  password: {{ $password | quote }}
  postgres-password: {{ $password | quote }}
{{- end }}
