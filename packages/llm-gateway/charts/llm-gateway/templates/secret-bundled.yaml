{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

Auto-generated bundled-Postgres credential Secret ā€” rendered ONLY when
`database.bundled=true`.

AUDIT B7 ā€” split-credential format (NOT a libpq DSN string).

Previously this Secret held a `dsn` key with `postgres://USER:PASSWORD@
HOST:PORT/DB?sslmode=disable` ā€” the password was embedded right next
to the connection metadata, and ANY entity with `secrets:get` on the
namespace could read it. Worse, `sslmode=disable` meant the password
also crossed the wire in cleartext.

The audit-B7 fix: emit user / password / host / port / database as
SEPARATE `stringData` keys. The Deployment + migration Job consume
each via individual `secretKeyRef` env vars (PGHOST/PGUSER/PGPASSWORD/
PGDATABASE/PGPORT). The gateway code (`packages/llm-gateway/src/env.ts`
`parseDatabaseConn`) reads the split env into a `DatabaseConnConfig`
struct and `db/pool.ts` `createPool` constructs a `pg.Pool` config
directly ā€” the password is never re-stringified into a DSN.

For the bundled-Postgres path we DEFAULT to `sslmode=verify-ca`. The
Bitnami sub-chart auto-generates a self-signed cert + CA; the README
documents how to mount the CA bundle. `verify-full` is too strict
because the cert is bound to the Service DNS name, not the Pod's
internal hostname. Deployers who want the cleanest secure default
should set `database.bundledConfig.sslMode=verify-full` after
configuring the cert with the correct SANs, or move to a managed
Postgres via the BYO `dsnSecretRef` path.

Bitnami chart honors `auth.existingSecret` so we feed it the same
Secret name and skip its own generator. Single source of truth.
*/}}
{{- if and .Values.enabled .Values.database.bundled -}}
{{- $secretName := printf "%s-db" (include "llm-gateway.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := "" -}}
{{- if $existing -}}
{{- $password = (index $existing.data "password" | b64dec) -}}
{{- else -}}
{{- $password = randAlphaNum 32 -}}
{{- end -}}
{{- $host := include "llm-gateway.bundledPostgres.host" . -}}
{{- $db := default "kagent_llm_gateway" .Values.database.bundledConfig.auth.database -}}
{{- $user := default "gateway" .Values.database.bundledConfig.auth.username -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # Split-credential keys ā€” referenced via individual `secretKeyRef`
  # entries in the gateway Deployment + migration Job (audit B7).
  host: {{ $host | quote }}
  port: "5432"
  user: {{ $user | quote }}
  database: {{ $db | quote }}
  password: {{ $password | quote }}
  # Bitnami's auth.existingSecret expects keys named per its convention.
  # Setting `password` (above) and `postgres-password` here keeps the
  # sub-chart from generating its own ā€” single source of truth, no
  # password drift between bundled-postgres-postgresql and the gateway.
  postgres-password: {{ $password | quote }}
{{- end }}
