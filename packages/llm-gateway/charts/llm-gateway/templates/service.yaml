{{/*
SPDX-License-Identifier: MIT
Copyright (c) 2026 Chris Knuteson

ClusterIP Service exposing the gateway to in-cluster consumers
(chiefly kagent agent-pods). External exposure is opt-in via the
optional ingress.* values; this chart does not render an Ingress
or IngressRoute resource directly — homelab deployers wire that up
via the parent kagent-operator chart's existing Traefik patterns.

Default port is 4000 to match the operator chart's existing
`agentPod.litellmBaseUrl` fallback URL shape
(`http://litellm.kagent-system.svc.cluster.local:4000/v1`).
*/}}
{{- if .Values.enabled -}}
{{- include "llm-gateway.validateValues" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "llm-gateway.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
