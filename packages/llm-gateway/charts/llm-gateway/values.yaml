# kagent LLM Gateway — Helm sub-chart values.
# See docs/superpowers/specs/2026-05-03-llm-gateway-bundle-design.md §3.7.

# Enable/disable the entire gateway. Default off so `helm template` with
# no overrides renders zero resources (the spec §3.7 contract). Operator
# works without the gateway — agents talk to backends directly via
# litellmBaseUrl. Set to true to deploy the gateway. Operator-side
# wiring (LLM_GATEWAY_BASE_URL injection) is controlled by the OPERATOR
# chart's values, not this one.
enabled: false

image:
  repository: ghcr.io/ctkadvisors/kagent/llm-gateway
  tag: '' # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Image pull secret(s) for private registries. Empty = no secret.
# Example: imagePullSecrets: [{ name: ghcr-pull }]
imagePullSecrets: []

# Replica count. v1 ships 1 — in-flight counter is in-memory per Pod; HA
# requires Redis or leader-election (see spec §6).
replicaCount: 1

resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits: { cpu: 500m, memory: 512Mi }

service:
  type: ClusterIP
  port: 4000

# Provider dispatch safety controls.
providerDispatch:
  # Emergency hard kill switch. When true, /v1/chat/completions records
  # zero-token 503 rows but does not call any upstream provider.
  disabled: false

# Automatic per-(model, backendUrl) failure circuit. After N
# consecutive provider failures, the gateway returns 503 + Retry-After
# locally for the configured window instead of repeating the same
# upstream call.
failureBackoff:
  threshold: 3
  seconds: 300

# Bearer token clients use to authenticate. Recommended: provide via Secret.
adminApiToken:
  secretName: '' # required when enabled=true
  secretKey: token

# M23 — optional read-only admin bearer. When set, /admin/capacity and
# /admin/usage accept this token in addition to `adminApiToken`. Key-
# management endpoints (POST/GET/DELETE /admin/keys) continue to require
# the full `adminApiToken`. Workbench-api can be wired with this
# narrower token so a workbench memory-disclosure CVE cannot mint or
# revoke arbitrary `sk-<...>` keys.
#
# To opt in: provision a separate Secret with a different value than
# `adminApiToken`'s Secret, set `adminReadOnlyApiToken.secretName` to
# its name. Leave blank for the legacy single-token posture.
adminReadOnlyApiToken:
  secretName: '' # optional; empty = read-only token disabled
  secretKey: token

# Backend (provider) API keys. The gateway consults these when routing
# a request to a backendKind that requires an Authorization header
# (cloudflare, openai, anthropic, bedrock, groq, …). A backend with no
# key configured is sent unauthenticated — correct for ollama / localai
# / exo / mock; incorrect for the cloud providers (those will 401 at
# request time).
#
# `name` references a single Secret in the release namespace; `keys`
# maps each BackendKind to a key WITHIN that Secret. Backends not
# listed (or pointing at empty keys) are skipped — no env injection,
# no Authorization header at request time.
#
# Provisioning the Secret is the operator's responsibility. Example:
#   kubectl -n kagent-system create secret generic kagent-llm-gateway-backend-keys \
#     --from-literal=cf-api-token='...' \
#     --from-literal=openai-api-key='sk-...'
backendApiKeysSecret:
  name: ''
  keys:
    cloudflare: ''
    openai: ''
    anthropic: ''
    bedrock: ''
    groq: ''
    localai: ''
    ollama: ''
    exo: ''

# Database. See spec §3.7.
database:
  # REQUIRED when enabled=true (and bundled=false): where the DSN comes from.
  # The Secret must contain a libpq-style connection string
  # (postgres://user:pass@host:port/db?sslmode=require) under `key`.
  dsnSecretRef:
    name: '' # set this OR enable bundled
    key: dsn

  # Optional opt-in convenience: deploy an in-cluster Postgres alongside the
  # gateway. When true, the chart adds a Bitnami postgresql sub-chart
  # dependency AND auto-generates the DSN Secret pointing at it. Default
  # false (cloud deployers should point at managed Postgres).
  bundled: false

  # Knobs only used when bundled=true (ignored otherwise). Forwarded to
  # the Bitnami postgresql sub-chart's values.
  bundledConfig:
    storageClass: '' # defaults to cluster default
    storageSize: 10Gi
    version: '16'
    auth:
      database: kagent_llm_gateway
      username: gateway
      # Password auto-generated by chart on first install; persists in
      # the auto-created `<release>-llm-gateway-db` Secret. Audit B7:
      # the password lives in its own Secret key (NOT inside a DSN
      # string with sslmode=disable).
    # Audit B7 — TLS mode for the bundled-Postgres connection. Default
    # `verify-ca` (Bitnami auto-generates a self-signed cert + CA;
    # SANs may not match the Service hostname so verify-full is too
    # strict by default). `disable` is REJECTED at template time —
    # bundled-Postgres MUST encrypt in transit since the password
    # rides over the connection. See README §"Bundled-Postgres TLS".
    sslMode: 'verify-ca'
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 500m, memory: 512Mi }

# Migration Job runs as Helm post-install/post-upgrade hook. Idempotent.
migrations:
  enabled: true
  # When empty, inherits from `image.*` above. Override only if migrations
  # ship in a sidecar/different image; for v1 they're baked into the same
  # gateway image and run via `node dist/migrate.js`.
  image: {}
  # Command run by the Job container. The default points at the gateway
  # image's bundled migration entrypoint.
  command: ['node', 'dist/migrate.js']

# RBAC for the gateway's K8s API access. Reads ModelEndpoint CRs (cap
# definitions) and patches their /status subresource (AIMD observed
# in-flight). Scoped to the release namespace (kagent-system).
rbac:
  # Create the ServiceAccount + Role + RoleBinding. Set false if you
  # provision them out-of-band.
  create: true
  serviceAccountName: ''

# Optional: K3s/Traefik IngressRoute when you want the gateway exposed
# externally (default: cluster-internal only). Off by default.
ingress:
  enabled: false
  host: ''
  tls:
    enabled: false

# Pod-level extras
podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

# Pod + container security context (mirrors operator chart's WS-A baseline).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ['ALL']
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Log verbosity for the gateway. info|debug.
logLevel: 'info'

# Bitnami postgresql sub-chart values — scoped under `bundled-postgres`
# (matches the Chart.yaml dependency alias). Used only when
# `database.bundled=true`.
#
# Password handling — IMPORTANT: this chart's `secret-bundled.yaml`
# template auto-creates `<release>-llm-gateway-db`, which holds BOTH
# the libpq DSN consumed by the gateway AND the raw `password` /
# `postgres-password` keys Bitnami expects. To make Bitnami read from
# that Secret (rather than generate its own and drift), pass the
# release-templated name on install:
#
#   helm install <release> ./packages/llm-gateway/charts/llm-gateway/ \
#     --set database.bundled=true \
#     --set bundled-postgres.auth.existingSecret=<release>-llm-gateway-db
#
# The chart's NOTES.txt prints the exact name post-install. When
# `existingSecret` is empty (the default below), Bitnami generates its
# own password and the DSN Secret's password becomes stale on the
# second upgrade — workable for first-install dev, but the override
# above is the homelab-supported path.
bundled-postgres:
  auth:
    enablePostgresUser: false
    database: kagent_llm_gateway
    username: gateway
    existingSecret: ''
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 500m, memory: 512Mi }
