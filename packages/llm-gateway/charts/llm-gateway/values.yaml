# kagent LLM Gateway — Helm sub-chart values.
# See docs/superpowers/specs/2026-05-03-llm-gateway-bundle-design.md §3.7.

# Enable/disable the entire gateway. Default off — operator works without it
# (agents talk to backends directly via litellmBaseUrl). Set to true to deploy
# the gateway. Operator-side wiring (LLM_GATEWAY_BASE_URL injection) is
# controlled by the OPERATOR chart's values, not this one.
enabled: true

image:
  repository: ghcr.io/ctkadvisors/kagent/llm-gateway
  tag: '' # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Image pull secret(s) for private registries. Empty = no secret.
# Example: imagePullSecrets: [{ name: ghcr-pull }]
imagePullSecrets: []

# Replica count. v1 ships 1 — in-flight counter is in-memory per Pod; HA
# requires Redis or leader-election (see spec §6).
replicaCount: 1

resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits: { cpu: 500m, memory: 512Mi }

service:
  type: ClusterIP
  port: 4000

# Bearer token clients use to authenticate. Recommended: provide via Secret.
adminApiToken:
  secretName: '' # required when enabled=true
  secretKey: token

# Database. See spec §3.7.
database:
  # REQUIRED when enabled=true (and bundled=false): where the DSN comes from.
  # The Secret must contain a libpq-style connection string
  # (postgres://user:pass@host:port/db?sslmode=require) under `key`.
  dsnSecretRef:
    name: '' # set this OR enable bundled
    key: dsn

  # Optional opt-in convenience: deploy an in-cluster Postgres alongside the
  # gateway. When true, the chart adds a Bitnami postgresql sub-chart
  # dependency AND auto-generates the DSN Secret pointing at it. Default
  # false (cloud deployers should point at managed Postgres).
  bundled: false

  # Knobs only used when bundled=true (ignored otherwise). Forwarded to
  # the Bitnami postgresql sub-chart's values.
  bundledConfig:
    storageClass: '' # defaults to cluster default
    storageSize: 10Gi
    version: '16'
    auth:
      database: kagent_llm_gateway
      username: gateway
      # Password auto-generated by Bitnami chart on first install; persists
      # in a Secret. The dsnSecretRef Secret is auto-created from it.
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 500m, memory: 512Mi }

# Migration Job runs as Helm post-install/post-upgrade hook. Idempotent.
migrations:
  enabled: true
  # When empty, inherits from `image.*` above. Override only if migrations
  # ship in a sidecar/different image; for v1 they're baked into the same
  # gateway image and run via `node dist/migrate.js`.
  image: {}
  # Command run by the Job container. The default points at the gateway
  # image's bundled migration entrypoint.
  command: ['node', 'dist/migrate.js']

# RBAC for the gateway's K8s API access. Reads ModelEndpoint CRs (cap
# definitions) and patches their /status subresource (AIMD observed
# in-flight). Scoped to the release namespace (kagent-system).
rbac:
  # Create the ServiceAccount + Role + RoleBinding. Set false if you
  # provision them out-of-band.
  create: true
  serviceAccountName: ''

# Optional: K3s/Traefik IngressRoute when you want the gateway exposed
# externally (default: cluster-internal only). Off by default.
ingress:
  enabled: false
  host: ''
  tls:
    enabled: false

# Pod-level extras
podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

# Pod + container security context (mirrors operator chart's WS-A baseline).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ['ALL']
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Log verbosity for the gateway. info|debug.
logLevel: 'info'

# Bitnami postgresql sub-chart values are scoped under
# `bundled-postgres` (matches the Chart.yaml dependency alias). The
# helper template `llm-gateway.bundled-postgres.host` reads
# `bundled-postgres.fullnameOverride` (or builds one) when emitting
# the auto-generated DSN Secret. Override here when you need to tune
# the bundled Postgres beyond what `database.bundledConfig.*` exposes.
bundled-postgres:
  # Match what the auto-generated DSN Secret expects. Helm wires the
  # values from `database.bundledConfig.*` into these via templates,
  # but the keys also live here so they're discoverable and
  # overrideable from a single values overlay.
  auth:
    enablePostgresUser: false
    database: kagent_llm_gateway
    username: gateway
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 500m, memory: 512Mi }
