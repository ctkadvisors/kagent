#
# Gitea Actions workflow — runs ONLY in the homelab's Gitea mirror at
# git.knuteson.io/homelab/kagent (set up as a one-way push mirror from
# github.com/ctkadvisors/kagent). On push, BuildKit builds + pushes
# both images to the homelab's internal registry; ArgoCD then syncs.
#
# This file is harmless on github.com — github.com only reads
# .github/workflows/, so the public CI (ghcr.io build) keeps working.

name: BuildKit Container Build

on:
  push:
    tags:
      - 'v*-phase*'
      - 'v[0-9]+.[0-9]+.[0-9]+'
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: git.knuteson.io
  IMAGE_OPERATOR: git.knuteson.io/homelab/kagent-operator
  IMAGE_AGENT_POD: git.knuteson.io/homelab/kagent-agent-pod

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up BuildKit
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Log in to git.knuteson.io
        # gitea.actor + secrets.GITEA_TOKEN are auto-injected by the
        # runner — no manual secret setup needed for same-owner pushes.
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Extract operator metadata
        id: meta-operator
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_OPERATOR }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push operator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/operator/Dockerfile
          push: true
          tags: ${{ steps.meta-operator.outputs.tags }}
          labels: ${{ steps.meta-operator.outputs.labels }}

      - name: Extract agent-pod metadata
        id: meta-agent-pod
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_AGENT_POD }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push agent-pod
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/agent-pod/Dockerfile
          push: true
          tags: ${{ steps.meta-agent-pod.outputs.tags }}
          labels: ${{ steps.meta-agent-pod.outputs.labels }}
