name: CI

# Single-workflow CI gate. Verify (install / typecheck / lint / test /
# format / build) runs on every PR and main push. The CRD-drift job
# runs after verify and asserts that packages/operator/manifests/crds/
# *.yaml has not drifted from packages/operator/src/crds/types.ts. The
# image build job runs only on `v*` tags AND only after both verify +
# crd-drift are green — image releases never ship if CI is red.
#
# All `uses:` actions are pinned by SHA per the supply-chain hardening
# baseline. Update SHAs with `gh api repos/<owner>/<repo>/git/refs/
# tags/<v>` and the workflow `# vN` comment is the human-readable hint
# for what each SHA was at pin time.

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # Required for cosign keyless signing + buildkit provenance attestations
  # (`docker/build-push-action` reads OIDC tokens from this scope).
  id-token: write
  attestations: write

# Cancel in-progress runs on the same ref. Tag runs and main pushes get
# distinct refs so an image release won't cancel an in-flight CI run on
# main.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  verify:
    name: Install + Typecheck + Lint + Test + Build + Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.9
          run_install: false

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

      - name: Build (compile TS to JS for every non-UI package)
        # Verifies every package's `tsc -p .` emit succeeds — the same
        # build path the production Dockerfiles run.
        run: pnpm -r --filter '!@kagent/workbench-ui' build

      - name: Format check
        run: pnpm format:check

  crd-drift:
    name: CRD drift check
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.9
          run_install: false

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies (operator only)
        run: pnpm install --frozen-lockfile --filter @kagent/operator...

      - name: Check CRD YAML vs TS types drift
        run: pnpm --filter @kagent/operator crd:check

  helm-smoke:
    name: Helm chart smoke (lint + template)
    needs: verify
    # PRs + main runs validate every chart still lints and renders
    # cleanly. The Phase 4 / 5 deploy paths feed off these chart
    # outputs, so a templating regression silently broke the smoke
    # test for hours in v0.0.4. Catch it on PR.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: kagent-operator
            path: packages/operator/charts/kagent-operator
          - name: kagent-workbench
            path: packages/operator/charts/kagent-workbench
          - name: kagent-llm-gateway
            path: packages/llm-gateway/charts/llm-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4
        with:
          version: v3.16.3

      - name: helm lint
        # Static workflow-matrix values; not user input.
        env:
          CHART_PATH: ${{ matrix.path }}
        run: helm lint "$CHART_PATH"

      - name: helm template (default values)
        # Render with no overrides — exercises the chart's default-values
        # path, which is what `helm install` consumes when the operator
        # writes minimal Argo `values:` blobs.
        env:
          CHART_NAME: ${{ matrix.name }}
          CHART_PATH: ${{ matrix.path }}
        run: helm template "$CHART_NAME" "$CHART_PATH" > /dev/null

      - name: helm template (smoke-test values, operator chart only)
        if: matrix.name == 'kagent-operator'
        # The operator chart bundles a Phase-4 smoke test (`smokeTest.enabled`)
        # that ships an Agent + AgentTask + verifier Job. Render it here
        # so a templating regression in the smoke bundle surfaces on PR
        # rather than at next ArgoCD sync.
        env:
          CHART_NAME: ${{ matrix.name }}
          CHART_PATH: ${{ matrix.path }}
        run: helm template "$CHART_NAME" "$CHART_PATH" --set smokeTest.enabled=true > /dev/null

      - name: helm template (ci value overlays)
        # Each chart's `ci/values-*.yaml` is a documented opinionated
        # configuration the chart promises to support. Render every one
        # so a regression in any overlay (BYO postgres, bundled postgres,
        # backend-keys, …) surfaces here rather than in a homelab sync.
        # Skips silently when a chart has no `ci/` directory.
        # All inputs are static workflow-matrix values; not user input.
        env:
          CHART_NAME: ${{ matrix.name }}
          CHART_PATH: ${{ matrix.path }}
        run: |
          set -euo pipefail
          if [ ! -d "$CHART_PATH/ci" ]; then
            echo "no ci/ overlays for $CHART_NAME — skipping"
            exit 0
          fi
          shopt -s nullglob
          for f in "$CHART_PATH"/ci/values-*.yaml; do
            echo "::group::render $CHART_NAME with $(basename "$f")"
            helm template "$CHART_NAME" "$CHART_PATH" -f "$f" > /dev/null
            echo "::endgroup::"
          done

  helm-smoke-kind:
    name: Helm install + smoke (kind)
    needs: [verify, crd-drift, helm-smoke]
    # Catches Helm-template + operator-startup regressions BEFORE they
    # reach a live cluster:
    #   1. Build operator + workbench images locally (linux/amd64 only;
    #      no push, no QEMU emulation, fast).
    #   2. `kind load docker-image` so the kind nodes can run them.
    #   3. `helm install --wait` against both charts using the
    #      `ci/kind-smoke-values.yaml` overlay (image tag pinned to
    #      `ci-smoke`; smoke AgentTask + NetworkPolicy + artifact PVC
    #      disabled — see overlay headers).
    #   4. `kubectl wait` on the operator + workbench Deployments;
    #      assert CRDs land in `Established`.
    # The kind cluster is torn down by `helm/kind-action` post-job.
    #
    # We deliberately skip the AgentTask flow (no real LLM is reachable
    # from the kind cluster) — the gate's purpose is template + startup
    # validation per WAVES.md §2.4. End-to-end LLM round-trips are
    # exercised separately on the homelab via Argo.
    #
    # `agent-pod` is NOT built here because no AgentTasks are spawned;
    # `KAGENT_AGENT_POD_IMAGE` is set on the operator Deployment but
    # the image is never pulled.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build operator image (linux/amd64, local only)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: packages/operator/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: ghcr.io/ctkadvisors/kagent-operator:ci-smoke
          cache-from: type=gha,scope=operator
          cache-to: type=gha,mode=max,scope=operator

      - name: Build workbench-api image (linux/amd64, local only)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: packages/workbench-api/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: ghcr.io/ctkadvisors/kagent-workbench-api:ci-smoke
          cache-from: type=gha,scope=workbench-api
          cache-to: type=gha,mode=max,scope=workbench-api

      - name: Build workbench-ui image (linux/amd64, local only)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: packages/workbench-ui/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: ghcr.io/ctkadvisors/kagent-workbench-ui:ci-smoke
          cache-from: type=gha,scope=workbench-ui
          cache-to: type=gha,mode=max,scope=workbench-ui

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: kagent-smoke
          # Pin a recent kind node image. Bump in lockstep with kind
          # action upgrades; mismatch surfaces as image-pull errors at
          # cluster create.
          node_image: kindest/node:v1.31.2

      - name: Load operator + workbench images into kind
        run: |
          kind load docker-image \
            ghcr.io/ctkadvisors/kagent-operator:ci-smoke \
            ghcr.io/ctkadvisors/kagent-workbench-api:ci-smoke \
            ghcr.io/ctkadvisors/kagent-workbench-ui:ci-smoke \
            --name kagent-smoke

      - name: Setup Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4
        with:
          version: v3.16.3

      - name: Create kagent-system namespace
        run: kubectl create namespace kagent-system

      - name: Helm install kagent-operator (--wait)
        run: |
          helm install kagent-operator \
            packages/operator/charts/kagent-operator \
            --namespace kagent-system \
            --values packages/operator/charts/kagent-operator/ci/kind-smoke-values.yaml \
            --wait \
            --timeout 5m

      - name: Helm install kagent-workbench (--wait)
        run: |
          helm install kagent-workbench \
            packages/operator/charts/kagent-workbench \
            --namespace kagent-system \
            --values packages/operator/charts/kagent-workbench/ci/kind-smoke-values.yaml \
            --wait \
            --timeout 5m

      - name: Verify CRDs Established
        # `helm install` waits on Deployments/StatefulSets but does not
        # block on CustomResourceDefinition.status.conditions. Assert
        # explicitly so a CRD that fails to install (e.g. invalid
        # OpenAPI schema) fails this gate.
        run: |
          for crd in agents.kagent.knuteson.io \
                    agenttasks.kagent.knuteson.io \
                    agentcapabilities.kagent.knuteson.io \
                    agenttemplates.kagent.knuteson.io \
                    modelendpoints.kagent.knuteson.io; do
            kubectl wait --for=condition=Established \
              "crd/${crd}" \
              --timeout=60s
          done

      - name: Verify operator + workbench Deployments Available
        # Belt-and-suspenders alongside `helm --wait`. `helm --wait`
        # exits as soon as resource generation == observed, which on
        # ImagePullBackOff or CrashLoopBackOff still produces a
        # rollout-incomplete state. `kubectl wait --for=condition=Available`
        # is the strict gate.
        run: |
          kubectl wait --for=condition=Available \
            deployment/kagent-operator \
            -n kagent-system \
            --timeout=3m
          kubectl wait --for=condition=Available \
            deployment/kagent-workbench \
            -n kagent-system \
            --timeout=3m

      - name: Dump cluster state on failure
        if: failure()
        run: |
          echo '== Pods =='
          kubectl get pods -n kagent-system -o wide || true
          echo '== Events =='
          kubectl get events -n kagent-system --sort-by=.lastTimestamp || true
          echo '== Operator logs =='
          kubectl logs -n kagent-system deployment/kagent-operator --all-containers --tail=200 || true
          echo '== Workbench logs =='
          kubectl logs -n kagent-system deployment/kagent-workbench --all-containers --tail=200 || true

  build-images:
    name: Build + sign + SBOM (${{ matrix.name }})
    needs: [verify, crd-drift, helm-smoke, helm-smoke-kind]
    # Only build / push images on tag pushes (releases) or manual
    # dispatch. Plain main / PR runs skip this job — verify + crd-drift
    # is the per-commit gate; images are an explicit release artifact.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # Fail-fast so a broken Dockerfile in one image doesn't burn cosign
      # signatures on the others. Each matrix leg is independent
      # (separate context, file, image-ref pair).
      fail-fast: true
      matrix:
        include:
          - name: operator
            image: ghcr.io/ctkadvisors/kagent-operator
            file: packages/operator/Dockerfile
          - name: agent-pod
            image: ghcr.io/ctkadvisors/kagent-agent-pod
            file: packages/agent-pod/Dockerfile
          - name: workbench-api
            image: ghcr.io/ctkadvisors/kagent-workbench-api
            file: packages/workbench-api/Dockerfile
          - name: workbench-ui
            image: ghcr.io/ctkadvisors/kagent-workbench-ui
            file: packages/workbench-ui/Dockerfile
          - name: llm-gateway
            image: ghcr.io/ctkadvisors/kagent-llm-gateway
            file: packages/llm-gateway/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build + push image (linux/amd64)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          # v0.1.6-ga-hardening.4 — arm64 dropped from the matrix.
          # The Wave 4 expanded TS compile (operator + agent-pod
          # transitively pull every workspace package now) does not
          # finish under arm64 QEMU emulation inside the 30-minute
          # GitHub-hosted-runner budget. Homelab K3s is amd64-only;
          # arm64 returns when we wire native arm64 runners or split
          # per-arch jobs.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Belt-and-suspenders: buildkit-native attestations for SBOM
          # + provenance, plus a cosign-attached SBOM below. The two
          # are not redundant — buildkit's are stored as referrers on
          # the image manifest while cosign attaches separately and is
          # what `cosign verify` consumes.
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Generate SPDX SBOM (syft via anchore/sbom-action)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          # Upload as a workflow artifact so the SBOM is downloadable
          # alongside the image.
          artifact-name: sbom-${{ matrix.name }}.spdx.json
          output-file: ${{ runner.temp }}/sbom-${{ matrix.name }}.spdx.json

      - name: Cosign sign image (keyless OIDC)
        # Sigstore keyless flow — no static signing key. The OIDC token
        # GitHub mints from `id-token: write` is what cosign uses to
        # bind the signature to this workflow + tag.
        env:
          COSIGN_EXPERIMENTAL: '1'
          IMAGE_REF: ${{ matrix.image }}@${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "$IMAGE_REF"

      - name: Cosign attest SBOM (attach to image)
        env:
          COSIGN_EXPERIMENTAL: '1'
          IMAGE_REF: ${{ matrix.image }}@${{ steps.build.outputs.digest }}
          SBOM_PATH: ${{ runner.temp }}/sbom-${{ matrix.name }}.spdx.json
        run: |
          cosign attest --yes \
            --predicate "$SBOM_PATH" \
            --type spdxjson \
            "$IMAGE_REF"

      - name: Generate build provenance attestation
        # GitHub-native build provenance (separate from buildkit's
        # `provenance: mode=max` above). Belt-and-suspenders so consumers
        # can verify either via `gh attestation verify` or `cosign verify`.
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
