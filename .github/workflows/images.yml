name: Images

on:
  push:
    tags:
      - 'v*-phase*'
      - 'v[0-9]+.[0-9]+.[0-9]+'
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OPERATOR: ghcr.io/ctkadvisors/kagent-operator
  IMAGE_AGENT_POD: ghcr.io/ctkadvisors/kagent-agent-pod
  IMAGE_WORKBENCH_API: ghcr.io/ctkadvisors/kagent-workbench-api
  IMAGE_WORKBENCH_UI: ghcr.io/ctkadvisors/kagent-workbench-ui

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build + push images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract operator metadata
        id: meta-operator
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_OPERATOR }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build + push operator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/operator/Dockerfile
          push: true
          tags: ${{ steps.meta-operator.outputs.tags }}
          labels: ${{ steps.meta-operator.outputs.labels }}
          cache-from: type=gha,scope=operator
          cache-to: type=gha,mode=max,scope=operator

      - name: Extract agent-pod metadata
        id: meta-agent-pod
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_AGENT_POD }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build + push agent-pod
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/agent-pod/Dockerfile
          push: true
          tags: ${{ steps.meta-agent-pod.outputs.tags }}
          labels: ${{ steps.meta-agent-pod.outputs.labels }}
          cache-from: type=gha,scope=agent-pod
          cache-to: type=gha,mode=max,scope=agent-pod

      - name: Extract workbench-api metadata
        id: meta-workbench-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WORKBENCH_API }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build + push workbench-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/workbench-api/Dockerfile
          push: true
          tags: ${{ steps.meta-workbench-api.outputs.tags }}
          labels: ${{ steps.meta-workbench-api.outputs.labels }}
          cache-from: type=gha,scope=workbench-api
          cache-to: type=gha,mode=max,scope=workbench-api

      - name: Extract workbench-ui metadata
        id: meta-workbench-ui
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WORKBENCH_UI }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build + push workbench-ui
        # context is the repo root (not packages/workbench-ui) so the
        # build can pull @kagent/dto via the pnpm workspace.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/workbench-ui/Dockerfile
          push: true
          tags: ${{ steps.meta-workbench-ui.outputs.tags }}
          labels: ${{ steps.meta-workbench-ui.outputs.labels }}
          cache-from: type=gha,scope=workbench-ui
          cache-to: type=gha,mode=max,scope=workbench-ui
